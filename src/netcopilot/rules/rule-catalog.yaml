    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for process in device.ospf.processes:\n  for area in process.areas:\n    for vlink in area.virtual_links:\n\
    \      crypto = vlink.authentication.auth_trailer_key.crypto_algorithm\n      if crypto is None:\n        finding(\n \
    \         severity=\"warning\",\n          message=(\n            f\"OSPF virtual link {vlink.name} on {device.hostname}\
    \ has no \"\n            f\"authentication — configure MD5 or SHA for transit area security\"\n          ),\n        \
    \  evidence={\n            \"virtual_link_name\": vlink.name,\n            \"transit_area_id\": vlink.transit_area_id,\n\
    \            \"crypto_algorithm\": None\n          }\n        )\n"
  notes: '# Authentication on virtual links uses the same mechanism as regular interfaces.

    # Configure: area X virtual-link Y authentication message-digest


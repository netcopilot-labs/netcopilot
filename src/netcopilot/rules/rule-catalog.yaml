- rule_id: OSPF_AUTO_COST_BANDWIDTH_MISMATCH
  severity: warning
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF routers in the same domain have different auto-cost reference bandwidths — routing costs will be inconsistent
  genie_source:
    file: ospf.py
    line_range: 148-151
    add_leaf_ref: show ip ospf → [auto_cost][bandwidth]
  required_fields:
  - path: device.ospf.processes[].auto_cost.bandwidth
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].auto_cost.enable
    type: boolean
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/auto-cost/bandwidth
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: topology
  cross_device_compare: global_consistency
  check_logic: "# Phase 1: build index of process_id → bandwidth → [devices]\nbw_index = {}\nfor device in all_devices:\n\
    \  for process in device.ospf.processes:\n    if process.auto_cost.enable is not True:\n      continue   # auto-cost not\
    \ enabled — using default IOS bandwidth calculation\n    bw = process.auto_cost.bandwidth\n    if bw is None:\n      continue\n\
    \    pid = process.process_id\n    bw_index.setdefault(pid, {}).setdefault(bw, []).append(device.hostname)\n\n# Phase\
    \ 2: flag if multiple bandwidth values for the same process ID\nfor pid, bw_map in sorted(bw_index.items()):\n  if len(bw_map)\
    \ > 1:\n    finding(\n      severity=\"warning\",\n      message=(\n        f\"OSPF process {pid} has inconsistent auto-cost\
    \ reference bandwidth: \"\n        + \", \".join(f\"{bw}Mbps on {hosts}\" for bw, hosts in sorted(bw_map.items()))\n \
    \     ),\n      evidence={\n        \"process_id\": pid,\n        \"bandwidth_values\": {str(bw): hosts for bw, hosts\
    \ in bw_map.items()}\n      }\n    )\n"
  notes: '# The default auto-cost reference bandwidth in IOS XE is 100 Mbps.

    # If auto-cost is not explicitly enabled, cost = 100/interface_bw (default formula).

    # In modern networks with 10G/100G links, the default 100Mbps reference gives

    # all high-speed interfaces cost=1 — indistinguishable. Recommended: set to 100000

    # (100 Gbps) to give 10G links cost=10, 100G links cost=1.

    # This rule only fires if auto_cost.enable=True — if auto-cost is not configured,

    # the default formula applies and there''s nothing to compare.

    '
- rule_id: OSPF_SPF_TIMER_MISMATCH
  severity: informational
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF routers in the same domain have inconsistent SPF throttle timers — reconvergence rates differ
  genie_source:
    file: ospf.py
    line_range: 165-169
    add_leaf_ref: show ip ospf → spf_control.throttle.spf.[start|hold|maximum]
  required_fields:
  - path: device.ospf.processes[].spf_control.throttle.spf.start
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].spf_control.throttle.spf.hold
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].spf_control.throttle.spf.maximum
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/spf-control/throttle/spf-start
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/summary/ospf-summary/spf-init-msec
      confidence: medium
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/global/timers/spf/config/initial-delay
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: topology
  cross_device_compare: global_consistency
  check_logic: "# Compare SPF timer triplets (start, hold, maximum) across all devices\n# in the same OSPF process. All three\
    \ values must match for consistency.\ntimer_index = {}\nfor device in all_devices:\n  for process in device.ospf.processes:\n\
    \    spf = process.spf_control.throttle.spf\n    if spf.start is None:\n      continue\n    timer_tuple = (spf.start,\
    \ spf.hold, spf.maximum)\n    pid = process.process_id\n    timer_index.setdefault(pid, {}).setdefault(timer_tuple, []).append(device.hostname)\n\
    \nfor pid, timer_map in sorted(timer_index.items()):\n  if len(timer_map) > 1:\n    finding(\n      severity=\"informational\"\
    ,\n      message=(\n        f\"OSPF process {pid} has inconsistent SPF timers across the domain: \"\n        + \"; \"\
    .join(\n          f\"start={t[0]}ms hold={t[1]}ms max={t[2]}ms on {hosts}\"\n          for t, hosts in sorted(timer_map.items())\n\
    \        )\n      ),\n      evidence={\n        \"process_id\": pid,\n        \"timer_variants\": {\n          f\"{t[0]}/{t[1]}/{t[2]}\"\
    : hosts for t, hosts in timer_map.items()\n        }\n      }\n    )\n"
  notes: '# Cisco recommended SPF timers for modern networks (IOS XE best practice):

    #   spf-start 50ms, spf-hold 200ms, spf-maximum 5000ms

    # IOS XE default: 5000ms/10000ms/10000ms (much slower than recommended)

    # Aggressive timers (e.g., 50/200/5000) enable faster convergence but increase

    # CPU load during topology changes.

    # tunable default: — establish recommended timer values and add a

    # OSPF_SPF_TIMER_TOO_SLOW rule to flag the IOS XE defaults on production routers.

    '
- rule_id: OSPF_HELLO_INTERVAL_MISMATCH
  severity: critical
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF hello interval differs on the two ends of a link — adjacency cannot form
  genie_source:
    file: ospf.py
    line_range: 918-923
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][hello_interval]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].hello_interval
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].name
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/hello-interval
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/interfaces/interface/hello-interval
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/areas/area/interfaces/interface/timers/config/hello-interval
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: link
  cross_device_compare: bilateral
  check_logic: "# Bilateral check: for each link, compare hello_interval on both endpoints\nfor link in model.links:\n  local_intf\
    \ = get_ospf_interface(link.local_device_id, link.local_interface_id)\n  remote_intf = get_ospf_interface(link.remote_device_id,\
    \ link.remote_interface_id)\n\n  if local_intf is None or remote_intf is None:\n    continue   # One or both ends not\
    \ running OSPF on this interface — skip\n\n  local_hello = local_intf.hello_interval\n  remote_hello = remote_intf.hello_interval\n\
    \n  if local_hello is None or remote_hello is None:\n    continue\n\n  if local_hello != remote_hello:\n    finding(\n\
    \      severity=\"critical\",\n      message=(\n        f\"OSPF hello interval mismatch on link \"\n        f\"{link.local_device_id}:{link.local_interface_id}\
    \ ↔ \"\n        f\"{link.remote_device_id}:{link.remote_interface_id}: \"\n        f\"{local_hello}s vs {remote_hello}s\
    \ — adjacency will not form\"\n      ),\n      evidence={\n        \"link_id\": link.link_id,\n        \"local_device\"\
    : link.local_device_id,\n        \"local_interface\": link.local_interface_id,\n        \"local_hello_interval\": local_hello,\n\
    \        \"remote_device\": link.remote_device_id,\n        \"remote_interface\": link.remote_interface_id,\n        \"\
    remote_hello_interval\": remote_hello\n      }\n    )\n"
  notes: '# IOS XE default hello interval: 10s (broadcast), 30s (NBMA), 30s (point-to-multipoint)

    # Point-to-point: 10s default.

    # If a mismatch exists, OSPF will show the remote neighbor stuck in "INIT" state.

    # The bilateral check uses model["links"] — this requires LLDP-discovered links

    # to be present. If LLDP is not running on some interfaces, those links won''t be

    # in the model and hello mismatches on those interfaces won''t be detected.

    # confirm link discovery includes OSPF-only links (not just LLDP).

    '
  remediation:
    ios_xe: |
      ! Hello interval must match on both ends of a link.
      ! Set consistent hello interval (default 10s for broadcast):
      interface {interface}
       ip ospf hello-interval 10
    iosxr: |
      ! Hello interval must match on both ends of a link.
      router ospf {process_id}
       area {area_id}
        interface {interface}
         hello-interval 10
- rule_id: OSPF_DEAD_INTERVAL_MISMATCH
  severity: critical
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF dead interval differs on the two ends of a link — adjacency will flap or never stabilize
  genie_source:
    file: ospf.py
    line_range: 918-923
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][dead_interval]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].dead_interval
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/dead-interval
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/interfaces/interface/dead-interval
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/areas/area/interfaces/interface/timers/config/dead-interval
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: link
  cross_device_compare: bilateral
  check_logic: "for link in model.links:\n  local_intf = get_ospf_interface(link.local_device_id, link.local_interface_id)\n\
    \  remote_intf = get_ospf_interface(link.remote_device_id, link.remote_interface_id)\n\n  if local_intf is None or remote_intf\
    \ is None:\n    continue\n\n  local_dead = local_intf.dead_interval\n  remote_dead = remote_intf.dead_interval\n\n  if\
    \ local_dead is None or remote_dead is None:\n    continue\n\n  if local_dead != remote_dead:\n    finding(\n      severity=\"\
    critical\",\n      message=(\n        f\"OSPF dead interval mismatch on link \"\n        f\"{link.local_device_id}:{link.local_interface_id}\
    \ ↔ \"\n        f\"{link.remote_device_id}:{link.remote_interface_id}: \"\n        f\"{local_dead}s vs {remote_dead}s\
    \ — adjacency will be unstable\"\n      ),\n      evidence={\n        \"link_id\": link.link_id,\n        \"local_device\"\
    : link.local_device_id,\n        \"local_interface\": link.local_interface_id,\n        \"local_dead_interval\": local_dead,\n\
    \        \"remote_device\": link.remote_device_id,\n        \"remote_interface\": link.remote_interface_id,\n        \"\
    remote_dead_interval\": remote_dead\n      }\n    )\n"
  notes: '# IOS XE default dead interval: 4 × hello interval.

    # With default hello=10s, dead=40s. Mismatches are typically caused by

    # manually overriding hello on one end without the other.

    # A hello/dead mismatch also causes: the shorter-dead-interval router drops

    # the adjacency, tries to reform it, the other router''s hello is accepted,

    # adjacency forms, then the short timer drops it again → flapping.

    '
  remediation:
    ios_xe: |
      ! Dead interval must match on both ends of a link.
      ! Set consistent dead interval (default 40s = 4x hello):
      interface {interface}
       ip ospf dead-interval 40
    iosxr: |
      ! Dead interval must match on both ends of a link.
      router ospf {process_id}
       area {area_id}
        interface {interface}
         dead-interval 40
- rule_id: OSPF_AREA_HIGH_LSA_COUNT
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF area LSDB has an unusually high LSA count — SPF computation time and memory usage may be elevated
  genie_source:
    file: ospf.py
    line_range: 320-324
    add_leaf_ref: show ip ospf → [areas][area][statistics][area_scope_lsa_count]
  required_fields:
  - path: device.ospf.processes[].areas[].statistics.area_scope_lsa_count
    type: integer
    healthy_value: null
    threshold: 1000
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/num-lsas
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "LSA_COUNT_THRESHOLD = 1000  # tunable default\n\nfor process in device.ospf.processes:\n  for area in process.areas:\n\
    \    lsa_count = area.statistics.area_scope_lsa_count\n    if lsa_count is None:\n      continue\n    if lsa_count > LSA_COUNT_THRESHOLD:\n\
    \      finding(\n        severity=\"warning\",\n        message=(\n          f\"OSPF area {area.area_id} on {device.hostname}\
    \ has {lsa_count} \"\n          f\"LSAs (threshold: {LSA_COUNT_THRESHOLD}) — consider area summarization\"\n        ),\n\
    \        evidence={\n          \"area_id\": area.area_id,\n          \"lsa_count\": lsa_count,\n          \"threshold\"\
    : LSA_COUNT_THRESHOLD,\n          \"checksum_sum\": area.statistics.area_scope_lsa_cksum_sum\n        }\n      )\n"
  notes: '# tunable default: the 1000 LSA threshold is a starting point. Large service provider

    # networks can have tens of thousands of LSAs in a single area.

    # The area summarization recommendation in the finding message is a general guide.

    # calibrate threshold against actual lab and production LSDB sizes.

    # Also consider adding OSPF_AREA_HIGH_SPF_RUNS (requires run_comparison) to

    # complement this check — high LSA count + high SPF frequency = definitive problem.

    '
  remediation:
    ios_xe: |
      ! High LSA count in area — consider area summarization:
      router ospf {process_id}
       area {area_id} range <SUMMARY_PREFIX> <MASK>
      ! Or configure max-lsa to protect against LSA flooding:
       max-lsa 12000 75 warning-only
    iosxr: |
      ! High LSA count in area — consider area summarization:
      router ospf {process_id}
       area {area_id}
        range <SUMMARY_PREFIX>/<LEN>
- rule_id: OSPF_AREA_HIGH_SPF_RUNS
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF area SPF run count is increasing rapidly — possible routing instability or interface flapping
  genie_source:
    file: ospf.py
    line_range: 320-324
    add_leaf_ref: show ip ospf → [areas][area][statistics][spf_runs_count]
  required_fields:
  - path: device.ospf.processes[].areas[].statistics.spf_runs_count
    type: integer
    healthy_value: null
    threshold: 20
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/spf-count
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: run_comparison
  check_logic: "# NOTE: requires run_comparison. At collect and log only.\nSPF_DELTA_THRESHOLD = 20\
    \  # tunable default: events per collection interval\n\nfor process in device.ospf.processes:\n  for area in process.areas:\n\
    \    current = area.statistics.spf_runs_count\n    previous = context.previous_run.get_spf_runs_count(\n      device.hostname,\
    \ process.process_id, area.area_id\n    )\n    if current is None or previous is None:\n      continue\n    delta = current\
    \ - previous\n    if delta > SPF_DELTA_THRESHOLD:\n      finding(\n        severity=\"warning\",\n        message=(\n\
    \          f\"OSPF area {area.area_id} on {device.hostname} had {delta} SPF runs \"\n          f\"between collections\
    \ (threshold: {SPF_DELTA_THRESHOLD}) — \"\n          f\"possible routing instability\"\n        ),\n        evidence={\n\
    \          \"area_id\": area.area_id,\n          \"spf_runs_current\": current,\n          \"spf_runs_previous\": previous,\n\
    \          \"delta\": delta,\n          \"threshold\": SPF_DELTA_THRESHOLD\n        }\n      )\n"
  notes: '# Deferred to (requires run_comparison engine feature).

    # tunable default: 20 SPF runs per collection interval depends on collection frequency.

    # With 5-minute collection intervals, 20 runs = 4/minute = moderate instability.

    # also check SPF throttle timer to understand expected SPF frequency.

    '
  remediation:
    generic: '! Investigate cause of high SPF runs in area {area} (VRF {vrf})

      ! Current count: {spf_runs} (threshold: {threshold})

      ! Check for flapping interfaces or unstable neighbors:

      !   show ip ospf {process} statistics

      !   show ip ospf {process} neighbor'
- rule_id: OSPF_VIRTUAL_LINK_DOWN
  severity: critical
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF virtual link is not up — the non-backbone area connected via this link is isolated
  genie_source:
    file: ospf.py
    line_range: 683-686
    add_leaf_ref: show ip ospf virtual-links → [areas][area][virtual_links][vlink][state]
  required_fields:
  - path: device.ospf.processes[].areas[].virtual_links[].state
    type: string
    healthy_value: POINT_TO_POINT
    threshold: null
  - path: device.ospf.processes[].areas[].virtual_links[].neighbors[].state
    type: string
    healthy_value: FULL
    threshold: null
  collection:
    show_commands:
    - show ip ospf virtual-links
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/state
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for process in device.ospf.processes:\n  for area in process.areas:\n    for vlink in area.virtual_links:\n\
    \      state = vlink.state\n      if state is None:\n        continue\n      if state != \"POINT_TO_POINT\":\n       \
    \ finding(\n          severity=\"critical\",\n          message=(\n            f\"OSPF virtual link {vlink.name} in area\
    \ {area.area_id} on \"\n            f\"{device.hostname} is in state '{state}' — non-backbone area isolated\"\n      \
    \    ),\n          evidence={\n            \"virtual_link_name\": vlink.name,\n            \"transit_area_id\": vlink.transit_area_id,\n\
    \            \"state\": state,\n            \"router_id\": vlink.router_id\n          }\n        )\n      else:\n    \
    \    # Virtual link state is POINT_TO_POINT — also check neighbor state\n        for neighbor in vlink.neighbors:\n  \
    \        if neighbor.state not in (\"FULL\",):\n            finding(\n              severity=\"critical\",\n         \
    \     message=(\n                f\"OSPF virtual link {vlink.name} neighbor {neighbor.neighbor_router_id} \"\n       \
    \         f\"on {device.hostname} is in state '{neighbor.state}' (expected FULL)\"\n              ),\n              evidence={\n\
    \                \"virtual_link_name\": vlink.name,\n                \"neighbor_router_id\": neighbor.neighbor_router_id,\n\
    \                \"state\": neighbor.state\n              }\n            )\n"
  notes: '# Virtual links are discouraged in modern OSPF design (use proper area design instead)

    # but they exist in legacy networks. Not applicable: some environments

    # don''t use them — this rule won''t fire in some environments but is included for

    # production completeness.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*.areas.*.virtual_links.*
    condition:
      field: state
      operator: not_equals
      value: point-to-point
    element_id: '{hostname}/ospf/{vrf}/{instance}/area/{areas}/vlink/{virtual_links}'
    evidence: virtual_link={virtual_links}, state={state}, expected=point-to-point
    skip_if_missing: true
  remediation:
    generic: '! OSPF virtual link is down.

      ! Verify transit area connectivity and authentication:

      !   show ip ospf virtual-links'
- rule_id: OSPF_VIRTUAL_LINK_NO_AUTH
  severity: warning

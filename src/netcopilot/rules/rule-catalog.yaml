    \ on interfaces facing hosts (not other RIP routers).\n# This rule is informational — flags the existence of passive interfaces\
    \ for audit.\nfor vrf_data in device.rip.vrfs.values():\n    for af_data in vrf_data.address_families.values():\n    \
    \    for inst_data in af_data.instances.values():\n            for intf, intf_data in (inst_data.interfaces or {}).items():\n\
    \                if intf_data.passive:\n                    finding(severity=\"informational\",\n                    \

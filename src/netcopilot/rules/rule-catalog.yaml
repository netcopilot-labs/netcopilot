- rule_id: PLATFORM_RP_STATE_NOT_OK
  severity: critical
  category: platform_health
  protocol: platform
  tier: surface
  description: 'Route Processor (RP) slot is not in the expected operational state. Expected states for an active RP are "ok"
    or "active"; for a standby RP, "standby" or "ok". Any other state (e.g., "booting", "failed", "removed") is a critical
    platform problem.

    '
  genie_source:
    file: platform.py
    line_range: 141-143
    add_leaf_ref: ShowPlatform → [slot][rp][slot_id][state]
  required_fields:
  - path: device.platform.slot.rp[].state
    type: string
    healthy_value: ok
    threshold: null
  collection:
    show_commands:
    - show platform
    yang_cisco_native:
      path: Cisco-IOS-XE-platform-oper:components/component[name=*]/state/oper-status
      iosxr_path: Cisco-IOS-XR-plat-chas-invmgr-oper:platform-inventory/racks/rack[name=*]/slots/slot[name=*]/state/admin-state
      confidence: medium
    yang_openconfig:
      path: openconfig-platform:components/component[name=*]/state/oper-status
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "EXPECTED_RP_STATES = {\"ok\", \"active\", \"standby\"}\nfor slot_id, rp_info in device.platform.slot.get(\"\
    rp\", {}).items():\n  state = rp_info.get(\"state\", \"\").lower()\n  if state not in EXPECTED_RP_STATES:\n    finding(\n\
    \      severity=\"critical\",\n      message=(\n        f\"RP slot {slot_id} on {device.hostname} is in unexpected state:\
    \ \"\n        f\"'{state}' (expected: {EXPECTED_RP_STATES})\"\n      ),\n      evidence={\n        \"slot\": slot_id,\n\
    \        \"state\": state,\n        \"rp_name\": rp_info.get(\"name\")\n      }\n    )\n"
  notes: '# IOS XE show platform state strings: "ok", "active", "standby", "booting", "failed",

    # "hw-prog", "rom-monitor" — enumerate at implementation.

    # Virtual chassis (C9KV lab): typically single RP slot. Skip if state is empty.

    # determine exact state strings returned by Genie ShowPlatform parser.

    '
  eval:
    source: genie_platform
    iterate: slot.*.rp.*
    condition:
      field: state
      operator: not_equals
      value: ok, active
    element_id: '{hostname}/platform/slot/{slot}/rp/{rp}'
    evidence: slot={slot}, rp={rp}, state={state}
    skip_if_missing: true
  remediation:
    generic: '! Route processor is not in OK state.

      ! Investigate immediately — this may indicate hardware failure:

      !   show platform

      !   show redundancy'

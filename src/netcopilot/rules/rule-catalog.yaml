  cross_device: true
  cross_device_compare: Compare MD5 authentication presence between BGP neighbor pairs
  check_logic: |
    for each BGP neighbor pair (device_a <-> device_b):
      auth_a = device_a has password for neighbor device_b
      auth_b = device_b has password for neighbor device_a
      if auth_a != auth_b:
        finding(low, device_a, device_b, auth_a, auth_b)
  notes: Cannot compare password values — only presence. Actual key mismatch causes BGP_NEIGHBOR_NOT_ESTABLISHED.

    yang_cisco_native:
      path: Cisco-IOS-XE-isis-oper:isis-oper-data/isis-instance[instance-id=*]/isis-interface-list/isis-interface[interface-name=*]/priority
      confidence: low
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance[name=*]/protocols/protocol[identifier=ISIS]/isis/interfaces/interface[interface-id=*]/levels/level[level-number=*]/config/priority
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: link
  cross_device_compare:
    type: bilateral
    fields:
    - device.isis.instances[*].vrfs[*].interfaces[*].priority
    logic: DIS priority should differ between routers on same broadcast segment — identical priority causes non-deterministic
      DIS election based on highest SNPA
  check_logic: "# Cross-device: compare DIS priority on shared broadcast interfaces\n# IS-IS DIS election: highest priority\
    \ wins, ties broken by highest SNPA (MAC address)\n# Unlike OSPF DR which is sticky, IS-IS DIS can change on priority\
    \ change (preemptive)\n# Default priority: 64 for both levels\nfor level in [\"level_1\", \"level_2\"]:\n    pri_a = device_a.isis.interfaces[intf].priority.get(level,\
    \ {}).get(\"priority\")\n    pri_b = device_b.isis.interfaces[intf].priority.get(level, {}).get(\"priority\")\n    if\
    \ pri_a is not None and pri_b is not None and pri_a == pri_b:\n        finding(severity=\"informational\",\n         \
    \       message=f\"IS-IS DIS priority identical ({pri_a}) on {intf} {level} — non-deterministic DIS election\")\n"
  notes: '# Genie source: isis.py line 479-484, ShowClnsInterface per-level priority.

    # Informational severity — DIS election works fine with tie-breaking (highest SNPA/MAC),

    # but operators should be intentional about which router is DIS on each segment.

    # DIS generates pseudonode LSP and is responsible for flooding efficiency.

    # On point-to-point links, DIS is not applicable — rule should skip P2P interfaces.

    # Default priority 64 for both L1 and L2.

    '
- rule_id: ISIS_LSP_REMAINING_LIFETIME_LOW
  severity: warning
  category: routing_health
  protocol: isis
  tier: deep
  description: IS-IS LSP in the LSDB has low remaining lifetime — route withdrawal imminent if LSP is not refreshed
  genie_source:
    file: isis.py
    line_range: 623-627
    add_leaf_ref: ShowIsisDatabaseDetail → lsdb[instance][vrf][level_db][level][lsp_id][remaining_lifetime]
  cis_source: null
  required_fields:
  - path: device.isis.lsdb[*].level_db[*].lsp[*].remaining_lifetime
    type: integer
    healthy_value: '> 300'
    threshold: tunable default
  collection:
    show_commands:
    - show isis database detail
    yang_cisco_native:
      path: Cisco-IOS-XE-isis-oper:isis-oper-data/isis-instance[instance-id=*]/isis-db/isis-db-level[level-number=*]/lsp-list/lsp/remaining-lifetime
      confidence: medium
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# Deep check: scan all LSPs in LSDB, flag those with remaining_lifetime below threshold\n# Default LSP lifetime:\
    \ 1200 seconds (20 minutes), refreshed every 900 seconds (15 min)\n# If remaining_lifetime < 300s (5 min), the originating\
    \ router may be having refresh issues\n# tunable default: threshold 300s is conservative; adjust based on network convergence\
    \ requirements\nfor instance in device.isis.lsdb.values():\n    for level_db in instance.level_db.values():\n        for\
    \ lsp_id, lsp in level_db.items():\n            lifetime = lsp.get(\"remaining_lifetime\", 0)\n            if lifetime\
    \ < threshold:  # default tunable default: 300\n                finding(severity=\"warning\",\n                        message=f\"\
    IS-IS LSP {lsp_id} remaining lifetime {lifetime}s (threshold {threshold}s)\")\n"
  notes: '# Genie source: isis.py line 623-627, ShowIsisDatabaseDetail lsp_holdtime → remaining_lifetime.

    # An LSP with low remaining lifetime that is NOT being refreshed indicates:

    # 1. The originating router is down or isolated (LSP will age out and routes withdrawn)

    # 2. The originating router is overloaded and not sending refreshes in time

    # 3. There is a flooding issue preventing refresh LSPs from reaching this router

    # tunable default: 300s default. In high-convergence environments (broadcast/media), could lower to 120s.

    # Skip the device''s own LSPs — those are always being refreshed locally.

    '
- rule_id: ISIS_LSP_LOG_RECENT_CHANGES
  severity: informational
  category: routing_health
  protocol: isis
  tier: deep
  description: IS-IS LSP log shows recent topology changes — network may be in convergence or experiencing instability
  genie_source:
    file: isis.py
    line_range: 408-414
    add_leaf_ref: ShowIsisLspLog → info[instance][vrf][lsp_log][id,level,received_timestamp,change]
  cis_source: null
  required_fields:
  - path: device.isis.instances[*].vrfs[*].lsp_log
    type: dict
    healthy_value: empty or all entries older than threshold
    threshold: tunable default
  collection:
    show_commands:
    - show isis lsp-log
    yang_cisco_native:
      path: Cisco-IOS-XE-isis-oper:isis-oper-data/isis-instance[instance-id=*]/isis-lsp-log
      confidence: low
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# Deep check: examine LSP log entries for recent topology changes\n# Each entry has: id, level, received_timestamp,\
    \ change (trigger reason)\n# \"Recent\" = within the last collection interval or tunable default minutes\n# Multiple recent entries\
    \ = potential topology instability (flapping link, router reload)\nfor instance in device.isis.instances.values():\n \
    \   for vrf_data in instance.vrfs.values():\n        lsp_log = vrf_data.get(\"lsp_log\", {})\n        recent_count = 0\n\
    \        for entry_id, entry in lsp_log.items():\n            timestamp = entry.get(\"received_timestamp\")\n        \
    \    if is_recent(timestamp, threshold_minutes=tunable default):  # default: 15 min\n                recent_count += 1\n    \
    \    if recent_count > 0:\n            finding(severity=\"informational\",\n                    message=f\"IS-IS has {recent_count}\
    \ recent LSP log entries — topology changes detected\")\n"
  notes: '# Genie source: isis.py line 408-414, ShowIsisLspLog → get_lsp_log() helper.

    # LSP log records every SPF-triggering event with timestamp and trigger reason.

    # Common triggers: "NEWADJ" (new adjacency), "DELADJ" (lost adjacency),

    # "LSPEXPIRED" (LSP aged out), "PERIODIC" (normal refresh — not alarming).

    # implementation: parse received_timestamp and compare to collection time.

    # Informational because LSP changes are normal during maintenance windows.

    # Correlate with ISIS_SPF_RUNS_EXCESSIVE for a fuller stability picture.

    '
- rule_id: ISIS_NO_ADJACENCIES
  severity: critical
  category: routing_health
  protocol: isis
  tier: surface
  description: IS-IS instance is enabled but has zero adjacencies — the router is completely isolated from the IS-IS domain
  genie_source:
    file: isis.py
    line_range: 424-446
    add_leaf_ref: ShowClnsNeighborsDetail/ShowClnsIsNeighborsDetail → info[instance][vrf][interfaces][*][adjacencies]
  cis_source: null
  required_fields:
  - path: device.isis.instances[*].vrfs[*].interfaces[*].adjacencies
    type: dict
    healthy_value: non-empty (at least one adjacency)
    threshold: null
  collection:
    show_commands:
    - show clns neighbors detail
    - show clns is-neighbors detail
    yang_cisco_native:
      path: Cisco-IOS-XE-isis-oper:isis-oper-data/isis-instance[instance-id=*]/adjacency-list
      confidence: medium
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance[name=*]/protocols/protocol[identifier=ISIS]/isis/levels/level[level-number=*]/adjacencies
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# Check if IS-IS instance has at least one adjacency across all interfaces\n# Different from ISIS_ADJACENCY_NOT_UP\
    \ which checks individual adjacency state\n# This catches the case where IS-IS is enabled but ALL adjacencies are missing\n\
    for inst_name, inst in device.isis.instances.items():\n    for vrf_name, vrf_data in inst.vrfs.items():\n        if not\
    \ vrf_data.get(\"enable\"):\n            continue  # Skip disabled instances (covered by ISIS_NOT_ENABLED)\n        total_adj\
    \ = 0\n        for intf_name, intf_data in vrf_data.get(\"interfaces\", {}).items():\n            total_adj += len(intf_data.get(\"\
    adjacencies\", {}))\n        if total_adj == 0:\n            finding(severity=\"critical\",\n                    message=f\"\
    IS-IS instance {inst_name} vrf {vrf_name}: enabled but zero adjacencies — routing isolated\")\n"
  notes: '# Genie source: isis.py line 424-446, adjacencies populated from ShowClnsNeighborsDetail

    # and ShowClnsIsNeighborsDetail via get_adjacencies() helper.

    # This is a higher-severity variant of ISIS_ADJACENCY_NOT_UP — there the individual

    # adjacency is down, here the ENTIRE instance has no adjacencies at all.

    # Common causes: all interfaces in passive mode, MTU blocking CLNS frames,

    # authentication mismatch on all interfaces, or simply no IS-IS neighbors configured.

    # Critical because an isolated IS-IS router has no routing updates and will eventually

    # lose all IS-IS routes as LSPs expire.

    '

  category: cis_benchmark
  protocol: fortigate
  tier: surface
  description: CIS 6.1.1 L2 — Apply a Trusted Signed Certificate for SSL VPN Portal (manual review)
  genie_source: null
  required_fields:
  - path: fortigate.vpn.ssl.settings.servercert
    type: string
    healthy_value: not default self-signed certificate
    threshold: null
  collection:
    show_commands: []
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest:
    - /api/v2/cmdb/vpn/ssl/settings
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "# auto=False — certificate trust cannot be verified programmatically via REST API.\nssl_settings = fortigate_rest(\"\
    /api/v2/cmdb/vpn/ssl/settings\")\nif ssl_settings is None:\n  return  # No SSL VPN configured\ncert_name = ssl_settings.get(\"\
    servercert\", \"Fortinet_Factory\")\nif cert_name == \"Fortinet_Factory\":\n  finding(\n    f\"SSL VPN is using factory\
    \ default certificate '{cert_name}' — \"\n    f\"replace with a trusted CA-signed certificate\"\n  )\nelse:\n  finding(\n\
    \    f\"SSL VPN certificate is '{cert_name}' — verify this is signed by a trusted CA\",\n    severity=\"informational\"\
    \n  )\n"
  notes: '# CIS FortiGate Benchmark v1.1.0 — Check 6.1.1, Level 2, auto=False

    # Self-signed/factory certificates cause browser warnings and reduce user trust.

    # Certificate content retrieval has a known bug in python-anyconfig-fortios-backend.

    # cross-reference cert name against known CA issuers via /api/v2/cmdb/vpn/certificate/.

    '
  eval:
    source: fortigate_vpn_ssl
    condition:
      field: results.servercert
      operator: equals
      value: Fortinet_Factory
    element_id: '{hostname}/cis/fg/6.1.1/vpn-ssl-cert'
    evidence: SSL VPN uses factory default certificate (Fortinet_Factory)
    skip_if_missing: true
  remediation:
    fortios: "! Review SSL VPN configuration.\n! Ensure tunnel mode is used (not web-only):\nconfig vpn ssl settings\n set\
      \ tunnel-mode enable\nend"
- rule_id: CIS_FG_6_1_2
  severity: informational
  category: cis_benchmark
  protocol: fortigate
  tier: surface
  description: CIS 6.1.2 L2 — Enable limited TLS versions for SSL VPN (TLS 1.2 min, TLS 1.3 max)
  genie_source: null
  required_fields:
  - path: fortigate.vpn.ssl.settings.ssl-max-proto-ver
    type: string
    healthy_value: tls1-3
    threshold: null
  - path: fortigate.vpn.ssl.settings.ssl-min-proto-ver
    type: string
    healthy_value: tls1-2
    threshold: null
  - path: fortigate.vpn.ssl.settings.algorithm
    type: string
    healthy_value: high or default
    threshold: null
  collection:
    show_commands: []
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest:
    - /api/v2/cmdb/vpn/ssl/settings
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "ssl_settings = fortigate_rest(\"/api/v2/cmdb/vpn/ssl/settings\")\nif ssl_settings is None:\n  return  # No\
    \ SSL VPN configured\nmax_ver = ssl_settings.get(\"ssl-max-proto-ver\", \"\")\nmin_ver = ssl_settings.get(\"ssl-min-proto-ver\"\
    , \"\")\nalgorithm = ssl_settings.get(\"algorithm\", \"\")\nif max_ver != \"tls1-3\":\n  finding(f\"SSL VPN ssl-max-proto-ver='{max_ver}'\
    \ — should be 'tls1-3'\")\nif min_ver not in (\"tls1-2\", \"tls1-3\"):\n  finding(f\"SSL VPN ssl-min-proto-ver='{min_ver}'\
    \ — should be 'tls1-2' minimum\")\nif algorithm != \"high\":\n  finding(f\"SSL VPN algorithm='{algorithm}' — should be\
    \ 'high' for strong ciphers only\")\n"
  notes: '# CIS FortiGate Benchmark v1.1.0 — Check 6.1.2, Level 2, auto=True

    # TLS 1.0/1.1 have known vulnerabilities (POODLE, BEAST, etc.).

    # algorithm=high disables RC4, 3DES, and other weak cipher suites for VPN sessions.

    # Also check banned-cipher list for additional weak cipher exclusions.

    '
  eval:
    source: fortigate_vpn_ssl
    conditions:
      logic: any
      checks:
      - field: results.ssl-min-proto-ver
        operator: equals
        value: tls1-0
      - field: results.ssl-min-proto-ver
        operator: equals
        value: tls1-1
    element_id: '{hostname}/cis/fg/6.1.2/vpn-ssl-tls'
    evidence: SSL VPN allows TLS versions below 1.2
    skip_if_missing: true
  remediation:
    fortios: "! Review SSL VPN client certificate requirements.\nconfig vpn ssl settings\n set reqclientcert enable\nend"

  check_logic: "SKIP_VRFS = {\"default\", \"Mgmt-vrf\", \"management\", \"MGMT\"}\nTHRESHOLD_PCT = 0.80\nfor vrf_name, vrf\
    \ in device.vrfs.items():\n  if vrf_name in SKIP_VRFS:\n    continue\n  for af_name, af in (vrf.get(\"address_family\"\
    ) or {}).items():\n    limit_cfg = (af.get(\"routing_table_limit\") or {})\n    limit = limit_cfg.get(\"routing_table_limit_number\"\

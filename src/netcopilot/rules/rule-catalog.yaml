    - show ip protocols
    yang_cisco_native:
      path: Cisco-IOS-XE-rip-oper:rip-oper-data/rip-state/vrf-states/vrf-state[vrf-name=*]/redistribute[protocol=*]/route-map
      confidence: low
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# route_policy is the route-map name applied to redistribution\n# If route_policy is None/empty, redistribution\
    \ has no filter (all routes imported)\nfor vrf_data in device.rip.vrfs.values():\n    for af_data in vrf_data.address_families.values():\n\
    \        for inst_data in af_data.instances.values():\n            for proto, redist_data in (inst_data.redistribute or\
    \ {}).items():\n                if not redist_data.route_policy:\n                    finding(severity=\"warning\",\n\
    \                            message=f\"RIP redistributing from {proto} without route-map filter\")\n"
  notes: '# Unfiltered redistribution into RIP can cause: (a) route table explosion,

    # (b) unexpected routing paths, (c) routing loops if RIP routes redistribute back.

    # This pattern mirrors EIGRP_REDISTRIBUTION_WITHOUT_FILTER in the existing catalog.

    '
- rule_id: RIP_TIMERS_MODIFIED
  severity: informational
  category: routing_health
  protocol: rip
  tier: deep
  description: RIP update/invalid/holddown/flush timers have been modified from defaults — verify cross-router consistency
  genie_source:
    file: rip.py
    line_range: 215-235
    add_leaf_ref: show ipv6 rip vrf {vrf} → info[vrf][af][instance][timers][update_interval/invalid_interval/holddown_interval/flush_interval]
  required_fields:

- rule_id: BGP_ADDRESS_FAMILY_MISMATCH
  severity: low
  category: cross_device
  protocol: bgp
  tier: deep
  description: BGP neighbors are configured with different address families, preventing route exchange for the mismatched AFI/SAFI
  genie_source: null
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].address_family
    type: dict
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all summary
    - show bgp all neighbors
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare address families activated between BGP neighbor pairs
  check_logic: |
    for each BGP neighbor pair (device_a.neighbor == device_b.ip):
      af_a = set of activated address families on device_a toward neighbor
      af_b = set of activated address families on device_b toward neighbor
      if af_a != af_b:
        finding(low, device_a, device_b, af_a - af_b, af_b - af_a)
  notes: Cross-device rule. Requires both peers to be managed devices.
  remediation:
    ios_xe: |
      ! Address family mismatch with neighbor {neighbor}.
      ! Activate the missing address family:
      router bgp {local_as}
       address-family {missing_af}
        neighbor {neighbor} activate
    iosxr: |
      ! Address family mismatch with neighbor {neighbor}.
      router bgp {local_as}
       address-family {missing_af} unicast
       neighbor {neighbor}
        address-family {missing_af} unicast

  check_logic: "# Cross-device: compare level_type on link endpoints\n# Incompatible levels: L1 vs L2 (no adjacency forms)\n\
    # L1L2 is compatible with either L1 or L2 (but forms only appropriate adjacency)\nlt_a = get_isis_level_type(device_a,\
    \ link.endpoint_a.interface)\nlt_b = get_isis_level_type(device_b, link.endpoint_b.interface)\ndef are_compatible(a, b):\n\
    \    if a == b: return True\n    if \"L1L2\" in (a, b): return True  # L1L2 is compatible with L1 or L2\n    return False\n\
    if lt_a and lt_b and not are_compatible(lt_a, lt_b):\n    finding(severity=\"critical\",\n            message=f\"IS-IS\
    \ level mismatch on {link.id}: {device_a.hostname}={lt_a} vs {device_b.hostname}={lt_b}\")\n"
  notes: '# IS-IS level mismatch is critical because adjacency will never form between L1-only and L2-only.


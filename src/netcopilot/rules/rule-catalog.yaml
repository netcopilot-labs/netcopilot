  remediation:
    generic: '! Interface {interface} has high error rate.

      ! Input errors: {in_errors}, Output errors: {out_errors}

      ! Check physical layer: cable, SFP, port.

      !   show interface {interface}

      !   show interface {interface} transceiver'
- rule_id: INTF_CRC_ERROR_RATE_HIGH
  severity: warning
  category: interface_health
  protocol: interface
  tier: deep
  description: 'Interface CRC error counter is incrementing between two consecutive collection runs. CRC errors indicate frame
    corruption — almost always a physical layer problem: bad cable, faulty SFP, EMI, or duplex mismatch causing late collisions.

    '
  genie_source:
    file: interface.py
    line_range: 302-321
    add_leaf_ref: show interfaces → info[interface][counters][in_crc_errors] (req_keys line 305)
  required_fields:
  - path: device.interfaces[].counters.in_crc_errors
    type: integer
    healthy_value: 0
    threshold: delta > 0 between runs
  collection:
    show_commands:
    - show interfaces
    yang_cisco_native:
      path: Cisco-IOS-XE-interfaces-oper:interfaces/interface[name=*]/statistics/in-crc-errors
      iosxr_path: Cisco-IOS-XR-pfi-im-cmd-oper:interfaces/interface-xr/interface[interface-name=*]/if-input/crc-errors
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/state/counters/in-fcs-errors
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: run_comparison
  check_logic: "# Requires two runs (t0 and t1) to compute delta\nfor intf in device.interfaces:\n  crc_delta = intf.counters.in_crc_errors\
    \ - prev.interfaces[intf.name].counters.in_crc_errors\n  if crc_delta > 0:\n    finding(\n      severity=\"warning\",\n\
    \      message=(\n        f\"Interface {intf.name} on {device.hostname} has incrementing CRC errors: \"\n        f\"+{crc_delta}\
    \ since last run\"\n      ),\n      evidence={\n        \"interface\": intf.name,\n        \"crc_errors_delta\": crc_delta,\n\
    \        \"crc_errors_total\": intf.counters.in_crc_errors\n      }\n    )\n"
  notes: '# CRC errors are layer-1 indicators — nearly always hardware/cabling.

    # run_comparison required. Single-run fallback: flag if in_crc_errors > 100.

    # OpenConfig uses in-fcs-errors as the CRC equivalent (FCS = Frame Check Sequence).

    # IOS XR: may report crc-errors and input-errors separately in pfi-im-cmd-oper.

    '
  remediation:
    generic: '! Interface {interface} has high CRC errors.

      ! Check physical layer: cable integrity, SFP, duplex mismatch.

      !   show interface {interface}

      !   show controllers {interface}'
- rule_id: INTF_MTU_MISMATCH
  severity: critical
  deferred_to: sprint_15
  category: interface_health
  protocol: interface
  tier: surface
  description: 'MTU values differ on the two endpoints of a physical link. MTU mismatch causes silent packet drops for large
    frames that exceed the smaller side''s MTU, leading to intermittent application failures — especially hard to diagnose.

    '
  genie_source:
    file: interface.py
    line_range: 32-88
    add_leaf_ref: show interfaces → info[interface][mtu] (mtu in req_keys line 33)
  required_fields:
  - path: device.interfaces[].mtu
    type: integer
    healthy_value: null
    threshold: both link endpoints must be equal
  collection:
    show_commands:
    - show interfaces
    yang_cisco_native:
      path: Cisco-IOS-XE-interfaces-oper:interfaces/interface[name=*]/mtu
      iosxr_path: Cisco-IOS-XR-pfi-im-cmd-oper:interfaces/interface-xr/interface[interface-name=*]/mtu
      confidence: high
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/state/mtu
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: link
  cross_device_compare:
    type: link/bilateral
    fields:
    - device.interfaces[].mtu
    logic: link.endpoint_a.interfaces[a_intf].mtu == link.endpoint_b.interfaces[b_intf].mtu
  check_logic: "for link in model.links:\n  a_mtu = get_interface(link.endpoint_a.device, link.endpoint_a.interface).mtu\n\
    \  b_mtu = get_interface(link.endpoint_b.device, link.endpoint_b.interface).mtu\n  if a_mtu is not None and b_mtu is not\
    \ None and a_mtu != b_mtu:\n    finding(\n      severity=\"critical\",\n      message=(\n        f\"MTU mismatch on link\
    \ \"\n        f\"{link.endpoint_a.device}:{link.endpoint_a.interface} ({a_mtu}) vs \"\n        f\"{link.endpoint_b.device}:{link.endpoint_b.interface}\
    \ ({b_mtu})\"\n      ),\n      evidence={\n        \"link\": link.id,\n        \"endpoint_a\": {\"device\": link.endpoint_a.device,\n\
    \                       \"interface\": link.endpoint_a.interface, \"mtu\": a_mtu},\n        \"endpoint_b\": {\"device\"\
    : link.endpoint_b.device,\n                       \"interface\": link.endpoint_b.interface, \"mtu\": b_mtu}\n      }\n\
    \    )\n"
  notes: '# Requires model.links topology data — data model must include link adjacencies.

    # MTU mismatch is one of the hardest issues to diagnose in production.

    # Sub-interface MTU can differ from parent; check physical interface MTU for this rule.

    # IOS XR reports per-interface MTU in pfi-im-cmd-oper; same path.

    '
  remediation:
    ios_xe: |
      ! MTU mismatch on link — align MTU on both ends:
      interface {interface}
       mtu {expected_mtu}
    iosxr: |
      ! MTU mismatch on link — align MTU on both ends:
      interface {interface}
       mtu {expected_mtu}
- rule_id: INTF_DUPLEX_MISMATCH
  severity: critical
  deferred_to: sprint_15
  category: interface_health
  protocol: interface
  tier: surface
  description: 'Duplex settings differ on the two endpoints of a link. Duplex mismatch causes late collisions and dramatically
    reduced throughput — the full-duplex side sends continuously while the half-duplex side expects collisions, causing excessive
    CRC errors and retransmissions.

    '

      iosxr_path: Cisco-IOS-XR-drivers-media-eth-oper:ethernet-interface/interfaces/interface[interface-name=*]/layer1-info/duplex
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/ethernet/state/duplex-mode
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: link
  cross_device_compare:
    type: link/bilateral
    fields:
    - device.interfaces[].duplex_mode
    logic: link.endpoint_a.interfaces[a_intf].duplex_mode == link.endpoint_b.interfaces[b_intf].duplex_mode
  check_logic: "for link in model.links:\n  a_duplex = get_interface(link.endpoint_a.device, link.endpoint_a.interface).duplex_mode\n\
    \  b_duplex = get_interface(link.endpoint_b.device, link.endpoint_b.interface).duplex_mode\n  if a_duplex is not None\
    \ and b_duplex is not None and a_duplex != b_duplex:\n    finding(\n      severity=\"critical\",\n      message=(\n  \
    \      f\"Duplex mismatch on link \"\n        f\"{link.endpoint_a.device}:{link.endpoint_a.interface} ({a_duplex}) vs\
    \ \"\n        f\"{link.endpoint_b.device}:{link.endpoint_b.interface} ({b_duplex})\"\n      ),\n      evidence={\n   \
    \     \"link\": link.id,\n        \"endpoint_a\": {\"device\": link.endpoint_a.device,\n                       \"interface\"\
    : link.endpoint_a.interface, \"duplex_mode\": a_duplex},\n        \"endpoint_b\": {\"device\": link.endpoint_b.device,\n\
    \                       \"interface\": link.endpoint_b.interface, \"duplex_mode\": b_duplex}\n      }\n    )\n"
  notes: '# Duplex mismatch symptoms overlap with CRC errors — correlate with INTF_CRC_ERROR_RATE_HIGH.

    # Genie stores duplex_mode as "full", "half", or "auto" — normalize before compare.

    # confirm duplex_mode is populated by ShowInterfaces parser for C9KV images.

    # Copper ports only — fiber/SFP+ ports are always full-duplex.

    '
  remediation:
    ios_xe: |
      ! Duplex mismatch on link — align duplex on both ends:

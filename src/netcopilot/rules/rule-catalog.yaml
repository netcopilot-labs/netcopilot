- rule_id: BGP_CLUSTER_ID_DUPLICATE
  severity: critical
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: bgp
  tier: surface
  description: Two BGP route reflectors in different clusters share the same cluster-id — route reflector loop prevention
    will discard valid routes
  genie_source:
    file: bgp.py
    line_range: 150-152
    add_leaf_ref: show bgp all cluster-ids → [vrf][vrf][cluster_id]
  required_fields:
  - path: device.bgp.instances[].vrfs[].cluster_id
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all cluster-ids
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/bgp-route-vrfs/bgp-route-vrf/bgp-route-afs/bgp-route-af/bgp-route-neighbors/bgp-route-neighbor/cluster-id
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: openconfig-bgp:bgp/global/route-reflector/config/route-reflector-cluster-id
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: topology
  cross_device_compare: global_consistency
  check_logic: "# Phase 1: collect cluster_id per device\ncluster_index = {}\nfor device in all_devices:\n  for instance in\
    \ device.bgp.instances:\n    for vrf in instance.vrfs:\n      cid = vrf.cluster_id\n      if cid is None:\n        continue\
    \   # Not a route reflector — skip\n      cluster_index.setdefault(cid, []).append(\n        f\"{device.hostname}:{vrf.vrf_id}\"\
    \n      )\n\n# Phase 2: flag cluster_ids shared by more than one RR\n# (valid sharing: multiple RRs in the SAME cluster\
    \ use the SAME cluster_id —\n# but the topology checker must verify they are in the same cluster.\n# Without topology\
    \ context, flag all duplicates as potential issues.)\nfor cid, rrs in sorted(cluster_index.items()):\n  if len(rrs) >\
    \ 1:\n    finding(\n      severity=\"critical\",\n      message=(\n        f\"BGP cluster-id {cid} is used by {len(rrs)}\
    \ devices: \"\n        f\"{', '.join(sorted(rrs))}. If these are in different RR clusters, \"\n        f\"route reflector\
    \ loop prevention will discard valid routes.\"\n      ),\n      evidence={\n        \"cluster_id\": cid,\n        \"devices\"\
    : sorted(rrs)\n      }\n    )\n"
  notes: '# IMPORTANT: Multiple RRs in the SAME cluster legitimately share a cluster-id.

    # This rule fires for any shared cluster-id and lets the operator confirm whether

    # the sharing is intentional (same cluster) or a misconfiguration (different clusters).

    # In practice: most deployments have 1-2 RRs per cluster, so a duplicate

    # cluster-id is almost always a misconfiguration.

    # Not applicable: RR topology not confirmed in some environments.

    '
  remediation:
    ios_xe: |
      ! Duplicate BGP cluster ID detected across route reflectors.
      ! Assign unique cluster IDs unless intentional redundant RR design:
      router bgp {asn}
       bgp cluster-id <UNIQUE_ID>
    iosxr: |
      ! Duplicate BGP cluster ID — assign unique IDs per RR:
      router bgp {asn}
       bgp cluster-id <UNIQUE_ID>

  tier: surface
  description: 'Standby RP is not in STANDBY HOT state. When the standby RP is not hot-standby, the device cannot perform
    a stateful switchover (SSO), meaning any RP failure will cause a disruptive reload. Expected: one slot ACTIVE, one slot
    STANDBY HOT.

    '
  genie_source:
    file: platform.py
    line_range: 145-148
    add_leaf_ref: 'ShowRedundancy → red[rp][slot_num][redundancy_state] mapped from [slot][slot_num][curr_sw_state] (ACTIVE
      / STANDBY HOT)

      '
  required_fields:
  - path: device.platform.slot.rp[].redundancy_state
    type: string
    healthy_value: STANDBY HOT
    threshold: null
  collection:
    show_commands:
    - show redundancy
    yang_cisco_native:
      path: Cisco-IOS-XE-redundancy-oper:redundancy-oper-data/redundancy-oper-data-slot/standby-state
      iosxr_path: Cisco-IOS-XR-rgmgr-oper:redundancy-group-manager/nodes/node[node-name=*]/redundancy-node-detailed
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "rp_slots = device.platform.slot.get(\"rp\", {})\nif len(rp_slots) < 2:\n  # Single-RP device — redundancy\
    \ not applicable, skip\n  return\nstandby_found = False\nfor slot_id, rp_info in rp_slots.items():\n  red_state = rp_info.get(\"\
    redundancy_state\", \"\")\n  if \"STANDBY HOT\" in red_state:\n    standby_found = True\nif not standby_found:\n  finding(\n\
    \    severity=\"warning\",\n    message=(\n      f\"No standby RP in STANDBY HOT state on {device.hostname} \"\n     \

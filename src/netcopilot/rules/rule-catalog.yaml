      operator: is_null
    element_id: '{hostname}/bgp/{instance}/{vrf}/neighbor/{neighbor}/inbound-policy'
    evidence: neighbor={neighbor}, inbound_policy=none
    skip_if_missing: true
  remediation:
    generic: '! BGP neighbor {neighbor} has no inbound route policy.

      ! Apply a route-map to filter inbound routes:

      !   router bgp <AS>

      !    neighbor {neighbor} route-map <POLICY_NAME> in'

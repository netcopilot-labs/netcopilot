- rule_id: BGP_NO_MAX_PREFIX
  severity: warning
  category: routing_health
  protocol: bgp
  tier: deep
  description: Established eBGP neighbor has no maximum-prefix limit configured, risking RIB/FIB exhaustion from a route leak
  genie_source:
    file: bgp_advanced.py
    line_range: 841-900
  required_fields:
  - path: device.bgp.instance[].vrf[].neighbor[].session_state
    type: string
    healthy_value: established
    threshold: null
  - path: device.bgp.instance[].vrf[].neighbor[].address_family[].maximum_prefix_max_prefix_no
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all neighbors
    - show bgp all summary
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for each device:\n  load genie_bgp; get local AS from instance\n  for each (inst, vrf, nbr_addr, nbr) in neighbors:\n\
    \    if session_state != \"established\": skip\n    if iBGP (local_as == remote_as): skip\n    for each address_family:\n\
    \      if maximum_prefix_max_prefix_no is missing or 0:\n        finding(warning, message, evidence)\n"
  notes: 'Only fires on eBGP neighbors in established state.

    iBGP neighbors are intentionally excluded — max-prefix is primarily an eBGP concern.

    '
  remediation:
    ios_xe: |
      ! Configure maximum-prefix limit on eBGP neighbor:
      router bgp {asn}
       address-family ipv4 unicast
        neighbor {neighbor} maximum-prefix <MAX_ROUTES> 80 restart 5
    iosxr: |
      ! Configure maximum-prefix limit on eBGP neighbor:
      router bgp {asn}
       neighbor {neighbor}
        address-family ipv4 unicast
         maximum-prefix <MAX_ROUTES> 80 restart 5
- rule_id: BGP_EBGP_NO_PREFIX_FILTER
  severity: warning
  category: routing_health
  protocol: bgp
  tier: deep
  description: Established eBGP neighbor uses a pass-all inbound or outbound route policy providing no real prefix filtering
  genie_source:
    file: bgp_advanced.py
    line_range: 907-1010
  required_fields:
  - path: device.bgp.instance[].vrf[].neighbor[].address_family[].route_map_name_in
    type: string
    healthy_value: null
    threshold: null
  - path: device.bgp.instance[].vrf[].neighbor[].address_family[].route_map_name_out
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all neighbors
    - show running-config
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for each device:\n  load genie_bgp and running_config\n  for each established eBGP neighbor address_family:\n\
    \    check inbound/outbound policy names\n    if policy exists and _is_passall_policy(config, policy_name):\n      finding(warning,\
    \ direction, policy_name, evidence)\n_is_passall_policy: matches IOS XR \"route-policy X\\n  pass\\nend-policy\"\nand\
    \ IOS XE \"route-map X permit N\" with no match clauses\n"
  notes: 'Distinct from BGP_NEIGHBOR_MISSING_INBOUND_POLICY which catches absent policies.

    This rule catches policies that exist but are pass-all (no match conditions).

    '
  remediation:
    ios_xe: |
      ! eBGP neighbor {neighbor} has a pass-all route-map.
      ! Add match clauses to restrict prefixes:
      ip prefix-list PEER_PREFIXES permit <PREFIX>/<LEN>
      !
      route-map {policy_name} permit 10
       match ip address prefix-list PEER_PREFIXES
    iosxr: |
      ! eBGP neighbor {neighbor} has a pass-all route-policy.
      ! Add match conditions to restrict prefixes:
      prefix-set PEER_PREFIXES
        <PREFIX>/<LEN>
      end-set
      !
      route-policy {policy_name}
        if destination in PEER_PREFIXES then
          pass
        endif
      end-policy

    - show ip ospf border-routers
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Count ABRs per OSPF area across all devices
  check_logic: |
    area_to_abrs = group ABRs by OSPF area
    for each non-backbone area with only 1 ABR:
      finding(low, area_id, abr_device)
  notes: Backbone area with single ABR is a different concern. This targets non-backbone areas.
  remediation:
    ios_xe: |
      ! OSPF area {area_id} has only one ABR ({abr}).
      ! Add a second ABR for redundancy on another device:
      router ospf {process_id}
       network {backbone_network} {wildcard} area 0
       network {area_network} {wildcard} area {area_id}
    iosxr: |
      ! OSPF area {area_id} has only one ABR ({abr}).
      router ospf {process_id}
       area 0
        interface {backbone_interface}
       area {area_id}
        interface {area_interface}

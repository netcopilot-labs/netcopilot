- rule_id: LAG_STATIC_BUNDLE
  severity: warning
  category: l2_health
  protocol: lag
  tier: surface
  description: 'Port-channel is using static bundling (protocol="on") instead of LACP or PAgP. Static bundles have no dynamic
    negotiation — a misconfiguration or cable issue on one side will not be detected, and the bundle may forward traffic while
    the remote side does not consider it active, causing a one-sided black hole.

    '
  genie_source:
    file: lag.py
    line_range: 33-37
    add_leaf_ref: show etherchannel summary → info[interfaces][po_name][protocol]
  required_fields:
  - path: device.lag.interfaces[].protocol
    type: string
    healthy_value: lacp
    threshold: null
  collection:
    show_commands:
    - show etherchannel summary
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/interface/Port-channel[name=*]/channel-group/mode
      iosxr_path: Cisco-IOS-XR-bundlemgr-cfg:bundles/bundle[bundle-id=*]/bundle-load-balancing/hash-function
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=Port-channel*]/aggregation/config/lag-type
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for po_name, po_data in device.lag.get(\"interfaces\", {}).items():\n  protocol = po_data.get(\"protocol\"\
    , \"\").lower()\n  if protocol == \"on\" or protocol == \"static\":\n    finding(\n      severity=\"warning\",\n     \
    \ message=(\n        f\"Port-channel {po_name} on {device.hostname} uses static bundling \"\n        f\"(protocol='on')\
    \ — no LACP/PAgP negotiation, failure detection is manual\"\n      ),\n      evidence={\n        \"port_channel\": po_name,\n\
    \        \"protocol\": po_data.get(\"protocol\"),\n        \"bundle_id\": po_data.get(\"bundle_id\"),\n        \"oper_status\"\
    : po_data.get(\"oper_status\")\n      }\n    )\n"
  notes: '# "on" mode means no dynamic negotiation — equivalent to static LAG in IEEE 802.1AX.

    # Dangerous because if one end goes down silently, the other end keeps forwarding.

    # Best practice: always use LACP (active/active or active/passive) for dynamic detection.

    # PAgP is Cisco-proprietary; LACP is standards-based and preferred in multi-vendor environments.

    # OpenConfig lag-type: "LACP" vs "STATIC" maps directly.

    '
  eval:
    source: parsed_lag
    iterate: interfaces.*
    condition:
      field: protocol
      operator: not_equals
      value: lacp
    element_id: '{hostname}/lag/{interfaces}/protocol'
    evidence: lag={name}, protocol={protocol} (expected=lacp)
    skip_if_missing: true
  remediation:
    generic: '! LAG is configured as static (no LACP).

      ! Consider enabling LACP for better failure detection:

      !   interface Port-channel<N>

      !    channel-protocol lacp'

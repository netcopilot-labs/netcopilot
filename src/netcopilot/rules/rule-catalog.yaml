    type: integer
    healthy_value: '30'
    threshold: null
  collection:
    show_commands:
    - show ipv6 rip vrf {vrf}
    yang_cisco_native:
      path: Cisco-IOS-XE-rip-oper:rip-oper-data/rip-state/vrf-states/vrf-state[vrf-name=*]/update-timer
      confidence: low
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# RIP defaults: update=30s, invalid=180s, holddown=180s, flush=240s\n# Non-default timers are an audit finding\
    \ — not necessarily wrong but should be documented\nRIP_DEFAULTS = {\"update_interval\": 30, \"invalid_interval\": 180,\
    \ \"holddown_interval\": 180, \"flush_interval\": 240}\nfor vrf_data in device.rip.vrfs.values():\n    for af_data in\
    \ vrf_data.address_families.values():\n        for inst_data in af_data.instances.values():\n            timers = inst_data.timers\n\
    \            for key, default in RIP_DEFAULTS.items():\n                if getattr(timers, key, None) and getattr(timers,\
    \ key) != default:\n                    finding(severity=\"informational\",\n                            message=f\"RIP\
    \ timer {key}={getattr(timers, key)} (default {default})\")\n"
  notes: '# Modified RIP timers are only a problem if they differ between routers.

    # RIP timers must be consistent across all routers in the same RIP domain.

    # add cross-device check for timer consistency (similar to ISIS_HELLO_TIMER_MISMATCH).

    '

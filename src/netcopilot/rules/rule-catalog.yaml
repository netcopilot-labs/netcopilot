    threshold: 5
  collection:
    show_commands:
    - show ip bgp template peer-session
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor/ebgp-max-hops
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-bgp:bgp/neighbors/neighbor/ebgp-config/multihop-ttl
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "MULTIHOP_THRESHOLD = 5  # tunable default\n\nfor instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n\
    \    for neighbor in vrf.neighbors:\n      hops = neighbor.ebgp_multihop_max_hop\n      if hops is None:\n        continue\
    \   # Single-hop eBGP (default) — not multihop\n      if hops > MULTIHOP_THRESHOLD:\n        finding(\n          severity=\"\
    warning\",\n          message=(\n            f\"eBGP neighbor {neighbor.neighbor_id} on {device.hostname} \"\n       \
    \     f\"has multihop TTL of {hops} (threshold: {MULTIHOP_THRESHOLD}) \"\n            f\"— session may traverse untrusted\
    \ segments\"\n          ),\n          evidence={\n            \"neighbor_id\": neighbor.neighbor_id,\n            \"remote_as\"\
    : neighbor.remote_as,\n            \"ebgp_multihop_max_hop\": hops,\n            \"threshold\": MULTIHOP_THRESHOLD\n \
    \         }\n        )\n"
  notes: '# eBGP multihop is sometimes required for loopback-to-loopback peerings

    # (e.g., in MPLS VPN or when BGP peers over a non-connected path).

    # TTL of 2 is common for loopback peering over a single hop.

    # TTL > 5 is unusual and warrants review.

    # tunable default: calibrate based on actual network topology in .

    '
  remediation:
    ios_xe: |

    type: string
    healthy_value: configured
    threshold: null
  - path: fortigate.firewall.policy[].internet-service-dst-name
    type: string
    healthy_value: configured
    threshold: null
  - path: fortigate.firewall.policy[].action
    type: string
    healthy_value: not disable
    threshold: null
  collection:
    show_commands: []
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest:
    - /api/v2/cmdb/firewall/policy
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "TOR_SERVICES = {\"Tor-Exit.Node\", \"Tor-Relay.Node\"}\npolicies = fortigate_rest(\"/api/v2/cmdb/firewall/policy\"\
    )\nfound_tor_src = False\nfound_tor_dst = False\nfor policy in policies:\n  if policy.get(\"action\") != \"deny\":\n \
    \   continue\n  src_names = {s.get(\"name\") for s in policy.get(\"internet-service-src-name\", [])}\n  dst_names = {s.get(\"\
    name\") for s in policy.get(\"internet-service-dst-name\", [])}\n  if TOR_SERVICES & src_names:\n    found_tor_src = True\n\
    \  if TOR_SERVICES & dst_names:\n    found_tor_dst = True\nif not found_tor_src:\n  finding(\"No deny policy found blocking\
    \ inbound traffic from Tor nodes (Tor-Exit.Node/Tor-Relay.Node)\")\nif not found_tor_dst:\n  finding(\"No deny policy\
    \ found blocking outbound traffic to Tor nodes (Tor-Exit.Node/Tor-Relay.Node)\")\n"
  notes: '# CIS FortiGate Benchmark v1.1.0 — Check 3.5, Level 1, auto=True

    # Tor blocks prevent exfiltration and C2 via anonymization networks.

    # Requires FortiGuard Internet Service Database (ISDB) subscription for Tor objects.

    '
  remediation:
    fortios: |
      ! Create deny policies for Tor exit and relay nodes:
      config firewall policy
       edit 0
        set name "Block-Tor-Inbound"
        set srcintf <WAN_INTF>
        set dstintf any
        set internet-service-src-name "Tor-Exit.Node" "Tor-Relay.Node"
        set dstaddr all
        set action deny
        set schedule always
        set logtraffic all
       next
      end

  severity: warning
  category: cis_benchmark
  protocol: ios_xr
  tier: surface
  description: 'CIS XR 1.5.1-1.5.8 L1/L2 — SNMP: no default communities, no RW, ACL, host, SNMPv3 priv+AES'

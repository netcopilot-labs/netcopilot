- rule_id: BGP_PEER_AS_MISMATCH
  severity: low
  category: cross_device
  protocol: bgp
  tier: deep
  description: BGP neighbor remote-as does not match the actual local-as of the peer device, preventing session establishment
  genie_source: null
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].remote_as
    type: integer
    healthy_value: null
    threshold: null
  - path: device.bgp.instances[].bgp_id
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all summary
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare configured remote-as against actual local-as of the peer
  check_logic: |
    for each BGP neighbor on device_a pointing to device_b:
      configured_remote_as = device_a.neighbor.remote_as
      actual_as = device_b.bgp.local_as
      if configured_remote_as != actual_as:
        finding(low, device_a, device_b, configured_remote_as, actual_as)
  notes: This typically causes BGP NOTIFICATION — session never reaches Established.
  remediation:
    ios_xe: |
      ! remote-as mismatch: configured {configured_as}, actual {actual_as}.
      router bgp {local_as}
       no neighbor {neighbor} remote-as {configured_as}
       neighbor {neighbor} remote-as {actual_as}
    iosxr: |
      ! remote-as mismatch: configured {configured_as}, actual {actual_as}.
      router bgp {local_as}
       neighbor {neighbor}
        remote-as {actual_as}

  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "config = show_running_config(device)\nimport re\nfor line in config.splitlines():\n  m = re.match(r'snmp-server\
    \ community (\\S+)\\s*(RO|RW)?', line)\n  if m:\n    community, mode = m.group(1), (m.group(2) or \"\").strip()\n    if\
    \ community.lower() in (\"private\", \"public\"):\n      finding(f\"Default SNMP community '{community}' configured —\
    \ remove it (1.5.1/1.5.2)\")\n    if mode == \"RW\":\n      finding(f\"SNMP community '{community}' has RW — must be RO\
    \ only (1.5.3)\")\n    if len(line.split()) < 4:\n      finding(f\"SNMP community '{community}' has no ACL (1.5.4)\")\n\
    if \"snmp-server\" in config and \"snmp-server host\" not in config:\n  finding(\"SNMP configured but no 'snmp-server\
    \ host' — traps have no destination (1.5.5)\")\nif \"snmp-server enable traps snmp\" not in config and \"snmp-server\"\
    \ in config:\n  finding(\"'snmp-server enable traps snmp' not configured (1.5.6)\")\nfor line in config.splitlines():\n\
    \  if re.match(r'snmp-server group', line) and \"v3\" in line and \"priv\" not in line:\n    finding(f\"SNMPv3 group without\
    \ priv: '{line.strip()}' (1.5.7)\")\n  if re.match(r'snmp-server user', line) and \"v3\" in line and \"des\" in line and\
    \ \"aes\" not in line:\n    finding(f\"SNMPv3 user using DES — use AES-128+: '{line.strip()}' (1.5.8)\")\n"
  notes: '# CIS IOS XR Benchmark v1.0.1 — Checks 1.5.1-1.5.8, Level 1 (1.5.7/1.5.8 = L2)


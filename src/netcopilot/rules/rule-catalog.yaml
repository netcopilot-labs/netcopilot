    protocol: {route_data.get('source_protocol', 'unknown')}\"\n          ),\n          evidence={\n            \"prefix\"\
    : prefix,\n            \"vrf\": vrf_name,\n            \"address_family\": af,\n            \"active\": False,\n     \
    \       \"source_protocol\": route_data.get(\"source_protocol\"),\n            \"route_preference\": route_data.get(\"\
    route_preference\"),\n            \"metric\": route_data.get(\"metric\")\n          }\n        )\n"
  notes: '# Inactive routes in the RIB are informational in normal operation when a better

    # route exists; they become significant when the better route disappears suddenly.

    # filter default routes (0.0.0.0/0 and ::/0) — often inactive by design.

    # High volume potential — consider filtering by source_protocol (e.g. only flag OSPF/BGP).

    # IOS XR YANG: rib oper model differs significantly from IOS XE — confidence=low.

    '
  eval:
    source: genie_routing
    iterate: vrf.*.address_family.*.routes.*
    condition:
      field: active
      operator: not_equals
      value: 'true'
    element_id: '{hostname}/routing/{vrf}/{address_family}/route/{routes}'
    evidence: vrf={vrf}, route={route}, active=false, protocol={source_protocol}
    skip_if_missing: true
  remediation:
    generic: '! Route is present in RIB but inactive.

      ! Verify next-hop reachability and recursive resolution:

      !   show ip route {prefix}'
- rule_id: STATIC_ROUTE_INACTIVE
  severity: warning
  category: routing_health
  protocol: static
  tier: surface
  description: 'A configured static route is not active. A static route becomes inactive when its next-hop is unreachable
    or its outgoing interface is down. Unlike dynamic routing protocols, static routes have no automatic failover — an inactive
    static route creates a silent black hole for traffic destined to that prefix.

    '
  genie_source:
    file: static_routing.py
    line_range: 78-93
    add_leaf_ref: 'show ip static route → info[vrf][vrf][af][routes][route][next_hop][outgoing_interface][intf][active] and
      [next_hop][next_hop_list][index][active]

      '
  required_fields:
  - path: device.static_routing.vrf[].address_family[].routes[].next_hop.outgoing_interface[].active
    type: boolean
    healthy_value: true
    threshold: null
  - path: device.static_routing.vrf[].address_family[].routes[].route
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip static route
    - show ipv6 static detail
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/ip/route/ip-route-interface-forwarding-list[prefix=*][mask=*]
      iosxr_path: Cisco-IOS-XR-ip-static-cfg:router-static/vrfs/vrf[vrf-name=*]/address-family/vrfipv4/vrf-unicast/vrf-prefixes/vrf-prefix[prefix=*][prefix-length=*]
      confidence: low
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance[name=*]/protocols/protocol[identifier=STATIC]/static-routes/static[prefix=*]/state/preference
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for vrf_name, vrf_data in device.static_routing.get(\"vrf\", {}).items():\n  for af, af_data in vrf_data.get(\"\
    address_family\", {}).items():\n    for prefix, route_data in af_data.get(\"routes\", {}).items():\n      nh = route_data.get(\"\
    next_hop\", {})\n      # Check outgoing-interface nexthops\n      for intf_name, intf_data in nh.get(\"outgoing_interface\"\
    , {}).items():\n        if intf_data.get(\"active\") is False:\n          finding(\n            severity=\"warning\",\n\
    \            message=(\n              f\"Static route {prefix} via {intf_name} (vrf={vrf_name}) \"\n              f\"\
    on {device.hostname} is INACTIVE (interface may be down)\"\n            ),\n            evidence={\n              \"prefix\"\
    : prefix, \"vrf\": vrf_name, \"address_family\": af,\n              \"outgoing_interface\": intf_name, \"active\": False\n\
    \            }\n          )\n      # Check next-hop-list nexthops\n      for idx, hop_data in nh.get(\"next_hop_list\"\
    , {}).items():\n        if hop_data.get(\"active\") is False:\n          finding(\n            severity=\"warning\",\n\
    \            message=(\n              f\"Static route {prefix} via {hop_data.get('next_hop')} \"\n              f\"(vrf={vrf_name})\
    \ on {device.hostname} is INACTIVE\"\n            ),\n            evidence={\n              \"prefix\": prefix, \"vrf\"\
    : vrf_name, \"address_family\": af,\n              \"next_hop\": hop_data.get(\"next_hop\"),\n              \"outgoing_interface\"\
    : hop_data.get(\"outgoing_interface\"),\n              \"active\": False\n            }\n          )\n"
  notes: '# Critical operational risk: unlike dynamic protocols, there is no automatic re-route.

    # Inactive static routes for floating statics (backup routes) are normal — filter by

    # checking if a more-preferred dynamic route covers the same prefix.

    # cross-reference static routes against the dynamic routing table to determine

    # if an inactive static is being backed up by a dynamic route (normal) or is a black hole.

    '
  remediation:
    ios_xe: |
      ! Static route is inactive — next-hop is unreachable.
      ! Verify next-hop reachability:
      !   show ip route {next_hop}
      !   ping {next_hop}
      ! If next-hop interface is down, bring it up or update the route:
      ip route {prefix} {mask} {next_hop}
    iosxr: |
      ! Static route inactive — check next-hop:
      !   show route {next_hop}
      !   ping {next_hop}
      router static
       address-family ipv4 unicast
        {prefix}/{len} {next_hop}
- rule_id: ARP_INCOMPLETE_ENTRIES
  severity: warning
  category: l3_health
  protocol: arp
  tier: surface
  description: 'ARP table has incomplete entries (incomplete_total > 0). An incomplete ARP entry means the device sent an
    ARP request but has not yet received a reply. Persistent incomplete entries indicate hosts that are unreachable, have
    failed, or are being blocked by a firewall/ACL. Packet drops occur for traffic to these hosts until the ARP resolves or
    times out.

    '
  genie_source:
    file: arp.py
    line_range: 92-95
    add_leaf_ref: ShowIpArpSummary → info[statistics][incomplete_total]
  required_fields:
  - path: device.arp.statistics.incomplete_total
    type: integer
    healthy_value: 0
    threshold: '> 0'
  collection:
    show_commands:
    - show ip arp summary
    yang_cisco_native:
      path: Cisco-IOS-XE-arp-oper:arp-data/arp-vrf[vrf=*]/arp-entry[address=*]/state
      iosxr_path: Cisco-IOS-XR-ipv4-arp-oper:arp/nodes/node[node-name=*]/entries/entry[address=*][interface-name=*]/state
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/subinterfaces/subinterface[index=*]/ipv4/neighbors/neighbor[ip=*]/state/origin
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "incomplete = device.arp.get(\"statistics\", {}).get(\"incomplete_total\", 0)\nif incomplete and incomplete\
    \ > 0:\n  finding(\n    severity=\"warning\",\n    message=(\n      f\"ARP table on {device.hostname} has {incomplete}\
    \ incomplete \"\n      f\"entry/entries — hosts may be unreachable or ARP replies are being dropped\"\n    ),\n    evidence={\n\
    \      \"incomplete_total\": incomplete,\n      \"entries_total\": device.arp.get(\"statistics\", {}).get(\"entries_total\"\
    )\n    }\n  )\n"
  notes: '# Incomplete ARP entries are transient during normal ARP resolution; persistent ones

    # (surviving multiple collection cycles) indicate a real problem.

    # run_comparison — flag only if incomplete_total persists across two runs.

    # IOS XR: ARP incomplete state visible in arp oper model per-entry state field.

    # Correlate with INTF_OPER_DOWN_ADMIN_UP — a down interface causes ARP failures.

    '
  eval:
    source: genie_arp
    iterate: interfaces.*.ipv4.neighbors.*
    condition:
      field: link_layer_address
      operator: equals
      value: incomplete
    element_id: '{hostname}/arp/{interfaces}/{neighbors}'
    evidence: interface={interfaces}, ip={ip}, link_layer_address=incomplete
    skip_if_missing: true
  remediation:
    generic: '! ARP table has incomplete entries.

      ! Verify L2/L3 connectivity to the target:

      !   show arp | include Incomplete'
- rule_id: ARP_PROXY_ENABLED
  severity: informational
  category: cis
  protocol: arp
  tier: surface
  description: 'Proxy ARP is enabled on an interface (proxy_enable=True). Proxy ARP causes the router to respond to ARP requests
    on behalf of remote hosts, making the router appear as the destination. This can cause hosts to send all traffic to the
    router even when direct paths exist, increasing router load and potentially masking network topology issues.

    '
  genie_source:
    file: arp.py
    line_range: 85-88
    add_leaf_ref: 'ShowIpInterface → info[interfaces][intf][arp_dynamic_learning][proxy_enable] (src: [intf][proxy_arp])

      '
  required_fields:
  - path: device.arp.interfaces[].arp_dynamic_learning.proxy_enable
    type: boolean
    healthy_value: false
    threshold: null
  collection:
    show_commands:
    - show ip interface
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/interface/*/ip/proxy-arp
      iosxr_path: Cisco-IOS-XR-ipv4-io-cfg:ipv4-network/interfaces/interface[interface-name=*]/primary/proxy-arp
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/subinterfaces/subinterface[index=*]/ipv4/proxy-arp/config/mode
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for intf_name, intf_data in device.arp.get(\"interfaces\", {}).items():\n  proxy = intf_data.get(\"arp_dynamic_learning\"\
    , {}).get(\"proxy_enable\")\n  if proxy is True:\n    finding(\n      severity=\"warning\",\n      message=(\n       \
    \ f\"Proxy ARP is enabled on {device.hostname} interface {intf_name} — \"\n        f\"router will respond to ARP requests\
    \ on behalf of remote hosts\"\n      ),\n      evidence={\n        \"interface\": intf_name,\n        \"proxy_enable\"\
    : True,\n        \"local_proxy_enable\": intf_data.get(\"arp_dynamic_learning\", {}).get(\"local_proxy_enable\")\n   \
    \   }\n    )\n"
  notes: '# Proxy ARP is enabled by default on IOS XE routed interfaces — this rule may

    # generate significant volume. Filter to known access-facing interfaces.

    # add interface-role tagging to suppress for designated gateway interfaces.

    # CIS IOS XE benchmark: proxy ARP should be disabled on interfaces not requiring it.

    # local_proxy_enable (same-subnet proxy) is even more unusual — consider critical.

    # DISABLED: Proxy ARP is the Cisco IOS XE default. Duplicate of CIS 3.1.2 (L2).

    # Generating 131 findings for factory defaults is noise — disabled .

    '
  remediation:
    ios_xe: |
      ! Disable Proxy ARP on interface:
      interface {interface}
       no ip proxy-arp
    iosxr: |
      ! Disable Proxy ARP on interface:
      interface {interface}
       no proxy-arp
- rule_id: LLDP_DISABLED_GLOBALLY
  severity: warning
  category: l2_health
  protocol: lldp
  tier: surface
  description: 'LLDP is not globally enabled on the device. Without LLDP, neighbor discovery is unavailable — the network
    topology cannot be automatically mapped, cable verification is manual, and tools relying on LLDP for device discovery
    will not function. LLDP is required for automated topology building in NetCopilot.

    '
  genie_source:
    file: lldp.py
    line_range: 95-98
    add_leaf_ref: show lldp → info[enabled]
  required_fields:
  - path: device.lldp.enabled
    type: boolean
    healthy_value: true
    threshold: null
  collection:
    show_commands:
    - show lldp
    yang_cisco_native:
      path: Cisco-IOS-XE-lldp-oper:lldp-entries/lldp-intf-details[if-name=*]
      iosxr_path: Cisco-IOS-XR-ethernet-lldp-oper:lldp/global-lldp/lldp-info/enabled
      confidence: medium
    yang_openconfig:
      path: openconfig-lldp:lldp/state/enabled
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "lldp_enabled = device.lldp.get(\"enabled\")\nif lldp_enabled is False or lldp_enabled is None:\n  finding(\n\
    \    severity=\"warning\",\n    message=(\n      f\"LLDP is disabled on {device.hostname} — neighbor discovery and \"\n\
    \      f\"automated topology mapping are not available\"\n    ),\n    evidence={\n      \"enabled\": lldp_enabled,\n \
    \     \"hello_timer\": device.lldp.get(\"hello_timer\"),\n      \"hold_timer\": device.lldp.get(\"hold_timer\")\n    }\n\
    \  )\n"
  notes: '# LLDP being disabled blocks NetCopilot''s topology link discovery entirely.

    # IOSvL2 (e.g. L2 switches in lab): LLDP may not be enabled by default on L2 switches.

    # IOS XR: LLDP is enabled via ''lldp'' global config — same semantics.

    # CDP is not modeled in Genie Ops — LLDP is the preferred standard.

    # LLDP neighbor data is the primary source for model.links construction.

    '
  eval:
    source: genie_lldp
    iterate: null
    condition:
      field: enabled
      operator: equals
      value: 'false'
    element_id: '{hostname}/lldp/global'
    evidence: lldp=disabled globally
    skip_if_missing: true
  remediation:
    ios_xe: lldp run
    iosxr: lldp
- rule_id: LLDP_NEIGHBOR_TOPOLOGY_MISMATCH
  severity: warning
  category: l2_health
  protocol: lldp
  tier: surface
  description: 'LLDP reports a neighbor on an interface that does not match the expected neighbor in the topology model (model.links).
    This may indicate a cabling error, unauthorized device, or stale topology data. Also fires if LLDP reports no neighbor
    on an interface that should have one per the model.

    '
  genie_source:
    file: lldp.py
    line_range: 109-132
    add_leaf_ref: 'show lldp neighbors detail / show lldp entry * → info[interfaces][intf][port_id][p_id][neighbors][nei][system_name]
      info[interfaces][intf][port_id][p_id][neighbors][nei][chassis_id]

      '
  required_fields:
  - path: device.lldp.interfaces[].neighbors[].system_name
    type: string
    healthy_value: null
    threshold: matches model.links expected neighbor
  - path: device.lldp.interfaces[].neighbors[].chassis_id
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show lldp neighbors detail
    - show lldp entry *
    yang_cisco_native:
      path: Cisco-IOS-XE-lldp-oper:lldp-entries/lldp-intf-details[if-name=*]/lldp-neighbor-details/id
      iosxr_path: Cisco-IOS-XR-ethernet-lldp-oper:lldp/nodes/node[node-name=*]/neighbors/details/detail[interface-name=*][device-id=*]/lldp-neighbor/device-id
      confidence: medium
    yang_openconfig:
      path: openconfig-lldp:lldp/interfaces/interface[name=*]/neighbors/neighbor[id=*]/state/system-name
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: link
  cross_device_compare:
    type: link/bilateral
    fields:
    - device.lldp.interfaces[].neighbors[].system_name
    - device.lldp.interfaces[].neighbors[].chassis_id
    logic: lldp neighbor system_name matches model.links expected peer hostname
  check_logic: "for link in model.links:\n  # Check endpoint A sees endpoint B as LLDP neighbor on the expected interface\n\
    \  a_intf = link.endpoint_a.interface\n  expected_b_name = link.endpoint_b.device\n  lldp_neighbors_on_a = (\n    device_a.lldp.get(\"\
    interfaces\", {})\n                  .get(a_intf, {})\n                  .get(\"port_id\", {})\n  )\n  found_b = False\n\
    \  for p_id, p_data in lldp_neighbors_on_a.items():\n    for nei_id, nei_data in p_data.get(\"neighbors\", {}).items():\n\
    \      if expected_b_name in (nei_data.get(\"system_name\", \"\") or \"\"):\n        found_b = True\n  if not found_b:\n\
    \    finding(\n      severity=\"warning\",\n      message=(\n        f\"LLDP topology mismatch: {link.endpoint_a.device}:{a_intf}\
    \ \"\n        f\"does not see expected neighbor '{expected_b_name}' via LLDP\"\n      ),\n      evidence={\n        \"\
    link\": link.id,\n        \"local_device\": link.endpoint_a.device,\n        \"local_interface\": a_intf,\n        \"\
    expected_neighbor\": expected_b_name,\n        \"actual_lldp_neighbors\": list(lldp_neighbors_on_a.keys())\n      }\n\
    \    )\n"
  notes: '# This rule requires model.links to be pre-populated from LLDP or manual inventory.

    # Bootstrapping: first run uses LLDP to build model.links; subsequent runs validate.

    # LLDP neighbor discovery is the primary mechanism for building model.links.

    # system_name may be short hostname or FQDN — normalize before compare.

    # Exclude management interfaces — LLDP over mgmt is valid but not topology-relevant.

    '
- rule_id: NTP_NOT_SYNCHRONIZED
  severity: critical
  category: time_sync
  protocol: ntp
  tier: surface
  description: 'Device clock is not synchronized to an NTP source (clock_state != "synchronized"). An unsynchronized clock
    causes log timestamp corruption, certificate validation failures, OSPF/BGP authentication issues, syslog correlation failures,
    and security event timeline distortion. All network devices must be time-synchronized.

    '
  genie_source:
    file: ntp.py
    line_range: 90-92
    add_leaf_ref: ShowNtpAssociations → info[clock_state]
  required_fields:
  - path: device.ntp.clock_state
    type: string
    healthy_value: synchronized
    threshold: null
  collection:
    show_commands:
    - show ntp associations
    - show ntp status
    yang_cisco_native:
      path: Cisco-IOS-XE-ntp-oper:ntp-oper-data/ntp-state-data/clock-state
      iosxr_path: Cisco-IOS-XR-ip-ntp-oper:ntp/racks/rack[number=*]/slots/slot[number=*]/instances/instance[number=*]/status/clock-info/clock-state
      confidence: high
    yang_openconfig:
      path: openconfig-system:system/ntp/state/enabled
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "clock_state = device.ntp.get(\"clock_state\")\nif clock_state is None:\n  # NTP not configured at all — flag\
    \ as critical\n  finding(\n    severity=\"critical\",\n    message=(f\"NTP clock_state not available on {device.hostname}\
    \ — \"\n             f\"NTP may not be configured\"),\n    evidence={\"clock_state\": None}\n  )\nelif \"synchronized\"\
    \ not in str(clock_state).lower():\n  finding(\n    severity=\"critical\",\n    message=(\n      f\"NTP clock is NOT synchronized\
    \ on {device.hostname}: \"\n      f\"clock_state='{clock_state}'\"\n    ),\n    evidence={\n      \"clock_state\": clock_state,\n\
    \      \"reference_time\": device.ntp.get(\"clock_state\", {})\n                                   .get(\"system_status\"\
    , {})\n                                   .get(\"reference_time\"),\n      \"root_dispersion\": device.ntp.get(\"clock_state\"\
    , {})\n                                    .get(\"system_status\", {})\n                                    .get(\"root_dispersion\"\
    )\n    }\n  )\n"
  notes: '# Critical — unsynchronized time is a security and operations risk.

    # finding NETCONF-007 noted PKI boot issue on C9KV (non-authoritative clock).

    # IOS clock_state values: "synchronized", "unsynchronized", "invalid".

    # IOS XR: clock state is per-slot/per-instance — normalize at .

    # Reference: lab note — C9KV needs manual ''crypto pki enroll'' on boot;

    #            unsynchronized clock is the root cause.

    '
  eval:
    source: genie_ntp
    iterate: null
    condition:
      field: clock_state.system_status.clock_state
      operator: not_equals
      value: synchronized
    element_id: '{hostname}/ntp/sync'
    evidence: clock_state=unsynchronized, expected=synchronized
    skip_if_missing: true
  remediation:
    generic: '! NTP is not synchronized.

      ! Verify NTP server reachability and configuration:

      !   show ntp status

      !   show ntp associations'
- rule_id: NTP_HIGH_STRATUM
  severity: warning
  category: time_sync
  protocol: ntp
  tier: surface
  description: 'The device''s NTP reference source has a high stratum level (stratum > 5). Stratum indicates distance from
    the authoritative time source. High stratum (8-15) means the time source is many hops from the primary reference clock,
    increasing clock drift and jitter. Networks should use stratum 1-4 sources.

    '
  genie_source:
    file: ntp.py
    line_range: 117-123
    add_leaf_ref: 'ShowNtpAssociations → info[associations][address][peer][local_mode][mode][stratum]

      '
  required_fields:
  - path: device.ntp.vrf[].associations.address[].local_mode[].stratum
    type: integer
    healthy_value: null
    threshold: < 5 for synchronized peer
  collection:
    show_commands:
    - show ntp associations
    yang_cisco_native:
      path: Cisco-IOS-XE-ntp-oper:ntp-oper-data/ntp-assoc-detail/assoc-detail[address=*]/stratum
      iosxr_path: Cisco-IOS-XR-ip-ntp-oper:ntp/racks/rack[number=*]/slots/slot[number=*]/instances/instance[number=*]/associations/peer-summary-info[peer-info-common=*]/stratum
      confidence: medium
    yang_openconfig:
      path: openconfig-system:system/ntp/servers/server[address=*]/state/stratum
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "STRATUM_THRESHOLD = 5\nfor vrf_name, vrf_data in device.ntp.get(\"vrf\", {}).items():\n  for peer_addr, peer_outer\
    \ in vrf_data.get(\"associations\", {}).get(\"address\", {}).items():\n    for mode_name, mode_data in peer_outer.get(\"\
    local_mode\", {}).items():\n      for is_conf, conf_data in mode_data.get(\"isconfigured\", {}).items():\n        stratum\
    \ = conf_data.get(\"stratum\")\n        if stratum is not None and isinstance(stratum, int) and stratum > STRATUM_THRESHOLD:\n\
    \          finding(\n            severity=\"warning\",\n            message=(\n              f\"NTP peer {peer_addr} (vrf={vrf_name})\
    \ on {device.hostname} \"\n              f\"has high stratum: {stratum} (threshold: {STRATUM_THRESHOLD})\"\n         \
    \   ),\n            evidence={\n              \"peer\": peer_addr,\n              \"vrf\": vrf_name,\n              \"\
    stratum\": stratum,\n              \"refid\": conf_data.get(\"refid\"),\n              \"offset\": conf_data.get(\"offset\"\
    ),\n              \"delay\": conf_data.get(\"delay\")\n            }\n          )\n"
  notes: '# Stratum 16 = unreachable (clock has lost sync). Stratum 0 = undefined.

    # Stratum 1 = GPS/atomic reference; stratum 2-4 = typical enterprise NTP servers.

    # Stratum > 5 means you are 6+ hops from an authoritative clock — unacceptable for

    # networks requiring tight time accuracy (financial, security, telecommunications).

    # confirm Genie NTP associations model structure — nested dicts are complex.

    '
  eval:
    source: genie_ntp
    iterate: vrf.*.associations.address.*.local_mode.*.isconfigured.*
    condition:
      field: stratum
      operator: greater_than
      value: '10'
    element_id: '{hostname}/ntp/peer/{address}'
    evidence: peer={address}, stratum={stratum}, threshold=10
    skip_if_missing: true
  remediation:
    generic: '! NTP peer {peer} at stratum {stratum} (threshold: {threshold}).

      ! Verify NTP server reachability:

      !   show ntp associations

      !   show ntp status'
- rule_id: NTP_PEER_UNREACHABLE
  severity: warning
  category: time_sync
  protocol: ntp
  tier: surface
  description: 'A configured NTP peer/server has a reach value of 0, meaning no NTP responses have been received in the last
    8 poll intervals. An unreachable NTP server is not contributing to clock synchronization. If all configured peers are
    unreachable, the device will lose synchronization.

    '
  genie_source:
    file: ntp.py
    line_range: 117-123
    add_leaf_ref: 'ShowNtpAssociations → info[associations][address][peer][local_mode][mode][reach]

      '
  required_fields:
  - path: device.ntp.vrf[].associations.address[].local_mode[].reach
    type: integer
    healthy_value: null
    threshold: '> 0 (any bit set = some responses received)'
  collection:
    show_commands:
    - show ntp associations
    yang_cisco_native:
      path: Cisco-IOS-XE-ntp-oper:ntp-oper-data/ntp-assoc-detail/assoc-detail[address=*]/reachability
      iosxr_path: Cisco-IOS-XR-ip-ntp-oper:ntp/racks/rack[number=*]/slots/slot[number=*]/instances/instance[number=*]/associations/peer-summary-info[peer-info-common=*]/reachability
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for vrf_name, vrf_data in device.ntp.get(\"vrf\", {}).items():\n  for peer_addr, peer_outer in vrf_data.get(\"\
    associations\", {}).get(\"address\", {}).items():\n    for mode_name, mode_data in peer_outer.get(\"local_mode\", {}).items():\n\
    \      for is_conf, conf_data in mode_data.get(\"isconfigured\", {}).items():\n        reach = conf_data.get(\"reach\"\
    )\n        if reach is not None and reach == 0:\n          finding(\n            severity=\"warning\",\n            message=(\n\
    \              f\"NTP peer {peer_addr} (vrf={vrf_name}) on {device.hostname} \"\n              f\"is unreachable (reach=0\
    \ — no responses in last 8 polls)\"\n            ),\n            evidence={\n              \"peer\": peer_addr,\n    \
    \          \"vrf\": vrf_name,\n              \"reach\": 0,\n              \"poll\": conf_data.get(\"poll\"),\n       \
    \       \"stratum\": conf_data.get(\"stratum\")\n            }\n          )\n"
  notes: '# reach is an 8-bit octal shift register: 0 = no responses; 377 (octal) = all 8 received.

    # Genie may store reach as integer (0-255) or octal string — normalize at .

    # If all configured peers have reach=0, NTP_NOT_SYNCHRONIZED will also fire.

    # Common causes: firewall blocking UDP/123, wrong source address, peer misconfiguration.

    '
  eval:
    source: genie_ntp
    iterate: vrf.*.associations.address.*.local_mode.*.isconfigured.*
    condition:
      field: reach
      operator: equals
      value: '0'
    element_id: '{hostname}/ntp/peer/{address}/reachability'
    evidence: peer={address}, reach=0 (unreachable)
    skip_if_missing: true
  remediation:
    generic: '! NTP peer {peer} is unreachable (reach: {reach}).

      ! Verify connectivity and NTP configuration:

      !   show ntp associations detail

      !   ping {peer}'
- rule_id: FDB_MAC_AGING_DISABLED
  severity: warning
  category: l2_health
  protocol: fdb
  tier: surface
  description: 'MAC address table aging is disabled (mac_aging_time = 0). When aging is disabled, MAC entries never expire
    — stale entries accumulate indefinitely. This can cause traffic to be forwarded to incorrect ports after devices move
    or are replaced, resulting in reachability failures and security concerns (traffic directed to wrong port).

    '
  genie_source:
    file: fdb.py
    line_range: 23-25
    add_leaf_ref: show mac address-table aging-time → info[mac_aging_time]
  required_fields:
  - path: device.fdb.mac_aging_time
    type: integer
    healthy_value: null
    threshold: '> 0 (non-zero means aging is enabled)'
  collection:
    show_commands:
    - show mac address-table aging-time
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/mac/address-table/aging-time
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance[name=*]/fdb/config/mac-aging-time
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "aging_time = device.fdb.get(\"mac_aging_time\")\nif aging_time is not None and aging_time == 0:\n  finding(\n\
    \    severity=\"warning\",\n    message=(\n      f\"MAC address table aging is DISABLED on {device.hostname} \"\n    \
    \  f\"(mac_aging_time=0) — stale entries will never expire\"\n    ),\n    evidence={\n      \"mac_aging_time\": 0,\n \
    \     \"total_mac_addresses\": device.fdb.get(\"total_mac_addresses\")\n    }\n  )\n"
  notes: '# Default aging time on IOS XE: 300 seconds (5 minutes).

    # Aging time of 0 is explicitly configured (''no mac address-table aging-time'').

    # Per-VLAN aging times can override global — check vlan-specific mac_aging_time too.

    # extend to check per-VLAN aging time from fdb.mac_table.vlans[vlan].mac_aging_time.

    '
  eval:
    source: genie_fdb
    iterate: null
    condition:
      field: mac_aging_time
      operator: equals
      value: '0'
    element_id: '{hostname}/fdb/mac-aging'
    evidence: mac_aging_time=0 (disabled)
    skip_if_missing: true
  remediation:
    ios_xe: mac address-table aging-time 300
- rule_id: FDB_MAC_LEARNING_DISABLED
  severity: warning
  category: l2_health
  protocol: fdb
  tier: surface
  description: 'MAC address learning is disabled on a VLAN (mac_learning=False). When MAC learning is disabled, the switch
    cannot learn which port a MAC address is behind — all unicast traffic for unknown MACs is flooded out all ports in the
    VLAN. Intentional in some designs (e.g., proxy ARP VLAN), but unexpected disabling causes significant unnecessary traffic
    flooding.

    '
  genie_source:
    file: fdb.py
    line_range: 35-37
    add_leaf_ref: show mac address-table learning → info[mac_table][vlans][vlan][mac_learning]
  required_fields:
  - path: device.fdb.mac_table.vlans[].mac_learning
    type: boolean
    healthy_value: true
    threshold: null
  collection:
    show_commands:
    - show mac address-table learning
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/vlan/Vlan-list[id=*]/no-mac-learning
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance[name=*]/fdb/config/mac-learning
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for vlan_id, vlan_data in device.fdb.get(\"mac_table\", {}).get(\"vlans\", {}).items():\n  mac_learning =\
    \ vlan_data.get(\"mac_learning\")\n  if mac_learning is False:\n    finding(\n      severity=\"warning\",\n      message=(\n\
    \        f\"MAC learning is DISABLED on {device.hostname} VLAN {vlan_id} — \"\n        f\"all unicast traffic will be\
    \ flooded within this VLAN\"\n      ),\n      evidence={\n        \"vlan\": vlan_id,\n        \"mac_learning\": False\n\
    \      }\n    )\n"
  notes: '# MAC learning disabled is sometimes intentional (proxy ARP VLANs, hub-spoke designs).

    # add VLAN-to-role tagging so known exceptions can be suppressed.

    # IOS XR: uses different L2 forwarding model; this rule is IOS XE / IOSvL2 only.

    # Correlate with ARP_PROXY_ENABLED — proxy ARP VLANs often have MAC learning disabled.

    '
  eval:
    source: genie_fdb
    iterate: null
    condition:
      field: mac_learning
      operator: equals
      value: 'false'
    element_id: '{hostname}/fdb/mac-learning'
    evidence: mac_learning=disabled globally
    skip_if_missing: true
  remediation:
    generic: '! MAC learning is disabled on this interface/VLAN.

      ! If unintentional, re-enable MAC learning.'
- rule_id: ACL_DENY_ACE_ZERO_HITS
  severity: informational
  category: security
  protocol: acl
  tier: surface
  description: 'A deny ACE in an access-list has zero hit counts. This may indicate a misconfigured ACL (the deny rule is
    never reached because a broader permit above it catches all traffic), a dead security rule that can be cleaned up, or
    a rule for a threat that has never materialized. Informational — requires operator judgment to determine if the rule is
    stale or correctly positioned.

    '
  genie_source:
    file: acl.py
    line_range: 53-55
    add_leaf_ref: 'show access-lists → info[acls][name][aces][ace_name][actions] and info[acls][name][aces][ace_name][statistics]

      '
  required_fields:
  - path: device.acl.acls[].aces[].actions
    type: object
    healthy_value: null
    threshold: null
  - path: device.acl.acls[].aces[].statistics
    type: object
    healthy_value: null
    threshold: matched_packets > 0 for long-standing deny rules
  collection:
    show_commands:
    - show access-lists
    yang_cisco_native:
      path: Cisco-IOS-XE-acl-oper:acl-oper-data/acl[acl-name=*]/acl-type[acl-type=*]/access-list-entries/access-list-entry[rule-name=*]/access-list-entries-fwd-summary/fwd-cntr
      iosxr_path: Cisco-IOS-XR-ipv4-acl-oper:ipv4-acl-and-prefix-list/access-list-manager-counters/inbound/accesses/access[access-list-name=*]/access-list-sequences/access-list-sequence[sequence-number=*]/hardware-counters
      confidence: medium
    yang_openconfig:
      path: openconfig-acl:acl/acl-sets/acl-set[name=*][type=*]/acl-entries/acl-entry[sequence-id=*]/state/matched-packets
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for acl_name, acl_data in device.acl.get(\"acls\", {}).items():\n  for ace_name, ace_data in acl_data.get(\"\
    aces\", {}).items():\n    actions = ace_data.get(\"actions\", {})\n    stats = ace_data.get(\"statistics\", {})\n    #\
    \ Check if this is a deny rule with statistics available\n    forwarding_action = actions.get(\"forwarding\", \"\")\n\
    \    if \"deny\" in str(forwarding_action).lower():\n      matched = stats.get(\"matched_packets\", stats.get(\"matched_bytes\"\
    ))\n      if matched is not None and matched == 0:\n        finding(\n          severity=\"informational\",\n        \
    \  message=(\n            f\"ACL '{acl_name}' on {device.hostname}: deny ACE '{ace_name}' \"\n            f\"has zero\
    \ hit count — rule may be stale or unreachable\"\n          ),\n          evidence={\n            \"acl_name\": acl_name,\n\
    \            \"ace_name\": ace_name,\n            \"forwarding_action\": forwarding_action,\n            \"matched_packets\"\
    : matched\n          }\n        )\n"
  notes: '# Informational — zero hits may be expected (security rules for rare/never-seen threats).

    # add time-since-last-clear context to distinguish new vs old ACLs.

    # IOS XE ''show access-lists'' shows hit counts only when ''ip access-list'' has log/count.

    # Ensure ACL has ''permit ip any any count'' at the end to capture implicit deny hits.

    # OpenConfig matched-packets is the most reliable cross-platform counter field.

    # verify Genie populates statistics field — may require explicit ''log'' keyword.

    '
  eval:
    source: genie_acl
    iterate: acls.*.aces.*
    conditions:
      logic: all
      checks:
      - field: actions.forwarding
        operator: equals
        value: deny
      - field: statistics.matched_packets
        operator: equals
        value: '0'
    element_id: '{hostname}/acl/{acls}/ace/{aces}'
    evidence: acl={acls}, ace={aces}, action=deny, matched_packets=0
    skip_if_missing: true
    python_severity: low
  remediation:
    generic: '! ACL deny ACE has zero hits — may be unused or shadowed.

      ! Review ACL ordering and remove dead entries:

      !   show access-lists'

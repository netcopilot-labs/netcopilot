    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Verify each OSPF neighbor entry has a reciprocal entry on the peer
  check_logic: |
    for each OSPF neighbor on device_a with router_id matching device_b:
      check device_b has neighbor entry pointing back to device_a.router_id
      if not found:
        finding(low, device_a, device_b, area, interface)
  notes: Asymmetric adjacency may be transient during convergence. Persistent asymmetry indicates a real problem.
  remediation:
    ios_xe: |
      ! OSPF adjacency asymmetric: {device_a} sees {device_b} but not vice versa.
      ! Check interface state and OSPF config on {device_b}:
      show ip ospf interface {interface}
      show ip ospf neighbor detail
    iosxr: |
      ! OSPF adjacency asymmetric: {device_a} sees {device_b} but not vice versa.
      show ospf interface {interface}
      show ospf neighbor detail
- rule_id: OSPF_AREA_ID_MISMATCH
  severity: low
  category: cross_device

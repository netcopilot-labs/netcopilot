- rule_id: BGP_NEIGHBOR_UPTIME_TOO_SHORT
  severity: warning
  category: genie_infrastructure
  protocol: bgp
  tier: deep
  description: BGP neighbor session uptime is very short — session may have recently recovered from a reset
  genie_source:
    file: bgp.py
    line_range: 711-719
    add_leaf_ref: show bgp all summary → routes_per_peer.[vrf][neighbor][address_family][up_down]
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].address_family[].up_down
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all summary
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/address-families/address-family/bgp-neighbor-summaries/bgp-neighbor-summary/up-time
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-bgp:bgp/neighbors/neighbor/state/last-established
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "import re\nUPTIME_THRESHOLD_SECONDS = 300  # tunable default: flag if established < 5 minutes ago\n\ndef parse_elapsed_seconds(elapsed_str):\n\
    \  if elapsed_str is None or elapsed_str.lower() in (\"never\", \"idle\"):\n    return None\n  m = re.match(r\"(\\d+):(\\\
    d+):(\\d+)\", elapsed_str)\n  if m:\n    return int(m.group(1))*3600 + int(m.group(2))*60 + int(m.group(3))\n  return\
    \ None\n\nfor instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    for neighbor in vrf.neighbors:\n   \
    \   if neighbor.session_state != \"Established\":\n        continue   # Non-established caught by BGP_NEIGHBOR_NOT_ESTABLISHED\n\
    \      for af in neighbor.address_family:\n        uptime = parse_elapsed_seconds(af.up_down)\n        if uptime is None:\n\
    \          continue\n        if uptime < UPTIME_THRESHOLD_SECONDS:\n          finding(\n            severity=\"warning\"\
    ,\n            message=(\n              f\"BGP neighbor {neighbor.neighbor_id} on {device.hostname} \"\n             \
    \ f\"({af.af_name}) has been established for only {uptime}s \"\n              f\"— session recently recovered, routes\
    \ may still be converging\"\n            ),\n            evidence={\n              \"neighbor_id\": neighbor.neighbor_id,\n\
    \              \"address_family\": af.af_name,\n              \"uptime_seconds\": uptime,\n              \"threshold_seconds\"\
    : UPTIME_THRESHOLD_SECONDS\n            }\n          )\n"
  notes: '# A short uptime alone is not a problem — all sessions start with short uptime.

    # It becomes a problem when combined with BGP_NEIGHBOR_FREQUENT_RESET (session

    # keeps resetting). consider linking these two findings.

    # tunable default: 5 minutes is conservative. BGP convergence typically takes 30-90s

    # for a full table; reduce threshold to 2 minutes if false positives are high.

    '
  remediation:
    ios_xe: |
      ! BGP session uptime is very short — session may be flapping.
      ! Investigate recent resets:
      !   show bgp neighbors {neighbor} | include reset
      !   show logging | include BGP
      ! Common fixes: stabilize the underlying link, check timers,
      ! verify authentication.
    iosxr: |
      ! BGP session uptime is very short — possible flapping.
      !   show bgp neighbors {neighbor} | include reset
      !   show logging | include BGP
- rule_id: BGP_HOLD_TIME_TOO_SHORT
  severity: warning
  category: genie_infrastructure
  protocol: bgp
  tier: deep
  description: BGP negotiated hold time is very short — transient delays may cause unexpected session drops
  genie_source:
    file: bgp.py
    line_range: 297-305
    add_leaf_ref: show bgp {af} all neighbors → [vrf][vrf][neighbor][neighbor_id][bgp_negotiated_keepalive_timers][hold_time]
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].bgp_negotiated_keepalive_timers.hold_time
    type: integer
    healthy_value: null
    threshold: 30
  collection:
    show_commands:
    - show bgp all neighbors
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor/negotiated-hold-time
      iosxr_path: Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor/hold-time
      confidence: high
    yang_openconfig:
      path: openconfig-bgp:bgp/neighbors/neighbor/timers/state/negotiated-hold-time
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "HOLD_TIME_MIN = 30    # tunable default: flag if negotiated hold time < 30s\nHOLD_TIME_WARN = 90   # Additional warning\
    \ if < 90s (below Cisco recommended)\n\nfor instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    for neighbor\
    \ in vrf.neighbors:\n      hold_time = neighbor.bgp_negotiated_keepalive_timers.hold_time\n      if hold_time is None:\n\
    \        continue\n      # Hold time of 0 = keepalives disabled — separate concern, also flag\n      if hold_time == 0:\n\
    \        finding(\n          severity=\"warning\",\n          message=(\n            f\"BGP neighbor {neighbor.neighbor_id}\
    \ on {device.hostname} \"\n            f\"has hold time of 0 — keepalives disabled, session will not \"\n            f\"\
    detect peer failures via hold timer\"\n          ),\n          evidence={\n            \"neighbor_id\": neighbor.neighbor_id,\n\
    \            \"hold_time\": 0\n          }\n        )\n      elif hold_time < HOLD_TIME_MIN:\n        finding(\n     \
    \     severity=\"warning\",\n          message=(\n            f\"BGP neighbor {neighbor.neighbor_id} on {device.hostname}\
    \ \"\n            f\"has very short negotiated hold time ({hold_time}s) \"\n            f\"— transient CPU load or packet\
    \ loss may drop the session\"\n          ),\n          evidence={\n            \"neighbor_id\": neighbor.neighbor_id,\n\
    \            \"hold_time\": hold_time,\n            \"minimum_recommended\": 90\n          }\n        )\n"
  notes: '# IOS XE default hold time: 180s (negotiated to lower of both peers'' configured value).

    # If a peer configures hold-time 20 and the local router has 180, the session

    # negotiates to 20 — which will trigger this rule on the local router even if

    # the local configuration is correct.

    # tunable default: consider two severity levels — warning for < 90s, critical for < 20s.

    # Hold time of 0 is a special case: some ISP peerings disable keepalive timers.

    # add suppression for eBGP peers where 0 is a known configuration.

    '
  remediation:
    ios_xe: |
      ! BGP hold time is too short — session may drop on brief congestion.
      ! Increase hold timer (recommended minimum 90s):
      router bgp {asn}
       neighbor {neighbor} timers 30 90
    iosxr: |
      ! BGP hold time is too short — increase to at least 90s:
      router bgp {asn}
       neighbor {neighbor}
        timers 30 90
- rule_id: BGP_NEIGHBOR_ZERO_PREFIXES
  severity: warning
  category: genie_infrastructure

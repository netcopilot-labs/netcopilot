- rule_id: STP_TOPOLOGY_CHANGE_RECENT
  severity: warning
  category: l2_health
  protocol: stp
  tier: surface
  description: 'Spanning-tree topology change occurred recently (time_since_topology_change below threshold). A recent TC
    indicates a link flap, device reload, or STP reconvergence event. Frequent or recent topology changes cause MAC table
    flushes and temporary flooding across the VLAN, causing network instability.

    '
  genie_source:
    file: stp.py
    line_range: 64-70
    add_leaf_ref: 'show spanning-tree detail → info[mode][default][mode_inst_type][inst][time_since_topology_change]

      '
  required_fields:
  - path: device.stp[].instances[].time_since_topology_change
    type: integer
    healthy_value: null
    threshold: '> 300 seconds (5 minutes since last TC)'
  collection:
    show_commands:
    - show spanning-tree detail
    yang_cisco_native:
      path: Cisco-IOS-XE-spanning-tree-oper:stp-details/stp-detail[vlan-id=*]/time-since-topology-change
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-spanning-tree:stp/rapid-pvst/vlan[vlan-id=*]/state/topology-change-time
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "THRESHOLD_SECONDS = 300  # configurable — 5 minutes\nfor mode, mode_data in device.stp.items():\n  for inst_type,\
    \ instances in mode_data.get(\"default\", {}).items():\n    if inst_type not in (\"vlans\", \"mst_instances\"):\n    \
    \  continue\n    for inst_id, inst_data in instances.items():\n      tc_age = inst_data.get(\"time_since_topology_change\"\
    )\n      if tc_age is not None and tc_age < THRESHOLD_SECONDS:\n        finding(\n          severity=\"warning\",\n  \
    \        message=(\n            f\"STP topology change on {device.hostname} {mode} {inst_id}: \"\n            f\"{tc_age}s\
    \ ago (threshold: {THRESHOLD_SECONDS}s)\"\n          ),\n          evidence={\n            \"mode\": mode,\n         \
    \   \"instance\": inst_id,\n            \"time_since_topology_change_sec\": tc_age,\n            \"topology_changes_total\"\
    : inst_data.get(\"topology_changes\")\n          }\n        )\n"
  notes: '# time_since_topology_change is in seconds as parsed by Genie.

    # verify units — IOS outputs "X seconds/minutes/hours" — confirm Genie normalizes to seconds.

    # Threshold of 300s catches recent events without false-positiving stable networks.

    # Correlate with INTF_OPER_DOWN_ADMIN_UP — a link flap is the most common TC trigger.

    # IOS XR does not run STP (L3-only) — skip for XR device types.

    '
  remediation:
    generic: '! {topology_changes} topology changes on VLAN {vlan_id} ({mode}).

      ! Time since last change: {time_since_topology_change}.

      ! Investigate flapping ports:

      !   show spanning-tree vlan {vlan_id} detail

      !   show logging | include TOPOLOGY'
- rule_id: STP_TOPOLOGY_CHANGE_RATE_HIGH
  severity: warning
  category: l2_health
  protocol: stp
  tier: deep
  description: 'Spanning-tree topology change counter is incrementing between two consecutive collection runs. A growing TC
    count indicates repeated reconvergence — either a flapping port, a misbehaving device sending spurious BPDUs, or a loop
    triggering continuous STP recalculation.

    '
  genie_source:
    file: stp.py
    line_range: 64-70
    add_leaf_ref: 'show spanning-tree detail → info[mode][default][mode_inst_type][inst][topology_changes]

      '
  required_fields:
  - path: device.stp[].instances[].topology_changes
    type: integer
    healthy_value: null
    threshold: delta > 0 between runs
  collection:
    show_commands:
    - show spanning-tree detail
    yang_cisco_native:
      path: Cisco-IOS-XE-spanning-tree-oper:stp-details/stp-detail[vlan-id=*]/topology-changes
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-spanning-tree:stp/rapid-pvst/vlan[vlan-id=*]/state/topology-changes
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: run_comparison
  check_logic: "for mode, mode_data in device.stp.items():\n  for inst_type, instances in mode_data.get(\"default\", {}).items():\n\
    \    if inst_type not in (\"vlans\", \"mst_instances\"):\n      continue\n    for inst_id, inst_data in instances.items():\n\
    \      tc_now = inst_data.get(\"topology_changes\")\n      tc_prev = prev.stp[mode][\"default\"][inst_type][inst_id].get(\"\
    topology_changes\")\n      if tc_now is not None and tc_prev is not None:\n        delta = tc_now - tc_prev\n        if\
    \ delta > 0:\n          finding(\n            severity=\"warning\",\n            message=(\n              f\"STP topology\
    \ change counter incrementing on {device.hostname} \"\n              f\"{mode} {inst_id}: +{delta} TCs since last run\"\
    \n            ),\n            evidence={\n              \"mode\": mode,\n              \"instance\": inst_id,\n      \
    \        \"topology_changes_delta\": delta,\n              \"topology_changes_total\": tc_now\n            }\n       \
    \   )\n"
  notes: '# run_comparison required.

    # Single-run complement: STP_TOPOLOGY_CHANGE_RECENT catches recent events without deltas.

    # A delta > 5 per collection interval is often indicative of a loop or flapping port.

    # add threshold (e.g. warn if delta > 3, critical if delta > 10 per interval).

    '
- rule_id: STP_PORT_ROLE_UNEXPECTED
  severity: warning
  category: l2_health
  protocol: stp
  tier: surface
  description: 'A spanning-tree port has an unexpected role. For a known uplink/trunk port, "designated" or "root" are expected;
    "alternate" or "backup" indicate a blocked redundant path (normal in a well-designed topology). "disabled" is abnormal
    and may indicate a config error or errdisable condition.

    '
  genie_source:
    file: stp.py
    line_range: 115-119
    add_leaf_ref: 'show spanning-tree → info[mode][default][mode_inst_type][inst][interfaces][intf][role]

      '
  required_fields:
  - path: device.stp[].instances[].interfaces[].role
    type: string
    healthy_value: null
    threshold: not 'disabled'
  - path: device.stp[].instances[].interfaces[].port_state
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show spanning-tree
    yang_cisco_native:
      path: Cisco-IOS-XE-spanning-tree-oper:stp-details/stp-detail[vlan-id=*]/stp-port-detail[interface-name=*]/port-role
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: openconfig-spanning-tree:stp/rapid-pvst/vlan[vlan-id=*]/interfaces/interface[name=*]/state/role
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for mode, mode_data in device.stp.items():\n  for inst_type, instances in mode_data.get(\"default\", {}).items():\n\
    \    if inst_type not in (\"vlans\", \"mst_instances\"):\n      continue\n    for inst_id, inst_data in instances.items():\n\
    \      for intf_name, intf_data in inst_data.get(\"interfaces\", {}).items():\n        role = intf_data.get(\"role\",\
    \ \"\").lower()\n        port_state = intf_data.get(\"port_state\", \"\").lower()\n        if role == \"disabled\":\n\
    \          finding(\n            severity=\"warning\",\n            message=(\n              f\"STP port {intf_name} on\
    \ {device.hostname} {mode} {inst_id} \"\n              f\"is in 'disabled' role (port_state: {port_state})\"\n       \
    \     ),\n            evidence={\n              \"mode\": mode,\n              \"instance\": inst_id,\n              \"\
    interface\": intf_name,\n              \"role\": role,\n              \"port_state\": port_state\n            }\n    \
    \      )\n"
  notes: '# Only flag "disabled" role as unexpected — alternate/backup/root/designated are all valid.

    # "disabled" STP role means the port is excluded from STP participation entirely,

    # which is different from a port being in BLK state (alternate role is normal for BLK).


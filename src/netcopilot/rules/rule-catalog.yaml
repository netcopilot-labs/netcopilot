      ! Secondary root:
      spanning-tree vlan {vlan_id} priority 8192
- rule_id: VLAN_ALLOWED_MISMATCH
  severity: low
  category: cross_device
  protocol: vlan
  tier: deep
  description: Trunk link has different allowed VLAN lists on each end, causing traffic blackholing for mismatched VLANs
  genie_source: null
  required_fields:
  - path: device.interfaces[].trunk_vlans
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show interfaces trunk
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare allowed VLAN list on each end of a trunk link
  check_logic: |
    for each trunk link between device_a and device_b:
      vlans_a = set of allowed VLANs on device_a trunk port
      vlans_b = set of allowed VLANs on device_b trunk port
      if vlans_a != vlans_b:
        finding(low, device_a, device_b, vlans_a - vlans_b, vlans_b - vlans_a)
  notes: Mismatched allowed VLANs cause silent traffic drops. Very common misconfiguration.
  remediation:
    ios_xe: |
      ! Trunk VLAN mismatch on link to {peer}.
      ! Add missing VLANs:
      interface {interface}
       switchport trunk allowed vlan add {missing_vlans}
      ! Or prune extra VLANs:
       switchport trunk allowed vlan remove {extra_vlans}
- rule_id: VLAN_CONSISTENCY
  severity: low
  category: cross_device
  protocol: vlan
  tier: deep
  description: VLAN exists on some switches in a site but not others, indicating incomplete provisioning
  genie_source: null
  required_fields:
  - path: device.vlans[].vlan_id
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show vlan brief
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare VLAN database across all switches in the same site
  check_logic: |
    site_vlans = union of all VLANs across switches in site
    for each switch:
      missing = site_vlans - switch.vlans
      if missing and missing VLANs are in use on trunks:
        finding(low, switch, missing_vlans)
  notes: Not all switches need all VLANs. Only flag VLANs on trunks connecting to the switch.
  remediation:
    ios_xe: |
      ! VLAN {vlan_id} missing on {device} but present on peers.
      ! Add the VLAN if traffic needs to traverse this switch:
      vlan {vlan_id}
       name {vlan_name}
- rule_id: VLAN_FRAGMENTED
  severity: high
  category: cross_device
  protocol: vlan
  tier: deep
  description: A single VLAN id exists as two or more separate L2 broadcast domains (islands with no L2 trunk between them), so hosts in different islands cannot communicate at Layer 2
  genie_source: null
  required_fields:
  - path: model.l2_domains[].vlan_id
    type: integer
    healthy_value: null
    threshold: null
  - path: model.l2_domains[].member_devices
    type: list
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show vlan brief
    - show interfaces trunk
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Count connectivity-based L2 broadcast domains per VLAN id (model.l2_domains)
  check_logic: |
    group l2_domains by vlan_id
    for each vlan_id with >= 2 domains:
      finding(low, vlan_id, domain_count, islands)
  notes: A VLAN appearing as multiple broadcast domains is usually a missing trunk allow-list entry; sometimes intentional VLAN-id reuse, so verify intent. Quiet on a healthy contiguous network; fires only where a VLAN id genuinely spans disconnected islands.
  remediation:
    ios_xe: |
      ! VLAN {vlan_id} is split into {domain_count} separate L2 domains.
      ! If it should be one segment, carry the VLAN on the connecting trunk(s):
      interface {trunk_interface}
       switchport trunk allowed vlan add {vlan_id}
- rule_id: VRF_RD_INCONSISTENT
  severity: low
  category: cross_device
  protocol: vrf
  tier: deep
  description: Same VRF name uses different Route Distinguishers across devices, potentially causing MPLS VPN route confusion
  genie_source: null
  required_fields:
  - path: device.vrf[].name
    type: string
    healthy_value: null
    threshold: null
  - path: device.vrf[].rd
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show vrf detail
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare Route Distinguisher for same-named VRF across all devices
  check_logic: |
    for each VRF name present on multiple devices:
      rd_values = set of RD values across devices
      if len(rd_values) > 1:
        finding(low, vrf_name, rd_variants, affected_devices)
  notes: RD uniqueness is required per-PE in some designs (auto-RD). Only flag if uniform RD expected.
  remediation:
    ios_xe: |
      ! VRF {vrf_name} has inconsistent RD values.
      ! Align RD across all PEs:
      vrf definition {vrf_name}
       rd {correct_rd}
    iosxr: |
      ! VRF {vrf_name} has inconsistent RD values.
      vrf {vrf_name}
       address-family ipv4 unicast
        import route-target
        export route-target
       rd {correct_rd}
- rule_id: VRF_RT_ASYMMETRIC
  severity: low
  category: cross_device
  protocol: vrf
  tier: deep
  description: VRF import/export Route Targets are asymmetric across PE devices, causing routes to not be imported where expected
  genie_source: null
  required_fields:
  - path: device.vrf[].import_rt
    type: list
    healthy_value: null
    threshold: null
  - path: device.vrf[].export_rt
    type: list
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show vrf detail
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Verify export RT on one PE matches import RT on peer PEs for the same VRF
  check_logic: |
    for each VRF on PE_A:
      export_rts = PE_A.vrf.export_rt
      for each other PE_B with same VRF:
        if not all(rt in PE_B.vrf.import_rt for rt in export_rts):
          finding(low, PE_A, PE_B, vrf_name, missing_rts)
  notes: RT asymmetry is intentional in hub-and-spoke VPN designs. Review topology first.
  remediation:
    ios_xe: |
      ! VRF {vrf_name} RT asymmetry — {peer} not importing routes from {device}.
      ! Add missing import RT:
      vrf definition {vrf_name}
       address-family ipv4
        route-target import {missing_rt}
    iosxr: |
      ! VRF {vrf_name} RT asymmetry.
      vrf {vrf_name}
       address-family ipv4 unicast
        import route-target
         {missing_rt}
- rule_id: XD_STATIC_ROUTE_ASYMMETRIC
  severity: low
  category: cross_device
  protocol: routing
  tier: deep
  description: Static route exists on one device of a redundant pair but not on its peer, risking blackhole on failover
  genie_source: null
  required_fields:
  - path: device.routing.static_routes[].prefix
    type: string
    healthy_value: null
    threshold: null
  - path: device.routing.static_routes[].next_hop
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip route static
    - show running-config | section ip route
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: config
    rpc: null
  cross_device: true
  cross_device_compare: Compare static route tables across redundant device pairs
  check_logic: |
    for each redundant device pair (device_a, device_b):
      routes_a = set of static route prefixes on device_a
      routes_b = set of static route prefixes on device_b
      if routes_a != routes_b:
        finding(low, device_a, device_b, routes_a - routes_b, routes_b - routes_a)
  notes: Requires redundant pair identification (e.g., HSRP/VRRP peers, stacked switches).
  remediation:
    generic: |
      ! Static route asymmetry between {device_a} and {device_b}.
      ! Missing routes on {device_b}:
      !   ip route {prefix} {mask} {next_hop}
      ! Verify this is not intentional (e.g., primary/backup routing design).

  check_logic: "# healthy is cast_bool from oper_state: \"on\" → True, \"off\"/\"fault\" → False\n# Only fire when a port\
    \ has a connected device (admin_state=auto or static) but oper=off\nfor intf, poe_data in (device.power_inline.interfaces\
    \ or {}).items():\n    if poe_data.admin_state in (\"auto\", \"static\") and poe_data.healthy is False:\n        finding(severity=\"\
    warning\",\n                message=f\"PoE port {intf}: admin={poe_data.admin_state}, oper_state not delivering power\"\
    )\n"
  notes: '# PoE failure affects IP cameras, access points, IP phones at venue access layer.

    # For broadcast networks: venue WiFi APs and IP cameras may lose power if PoE fails on access switches.


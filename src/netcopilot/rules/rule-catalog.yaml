      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# poison_reverse advertises routes with infinite metric (16) back to source\n# It adds faster convergence\
    \ on top of split horizon\nfor vrf_data in device.rip.vrfs.values():\n    for af_data in vrf_data.address_families.values():\n\
    \        for inst_data in af_data.instances.values():\n            if inst_data.poison_reverse is False:\n           \
    \     finding(severity=\"informational\", message=\"RIP poison-reverse disabled\")\n"
  notes: '# Poison reverse is a stronger loop prevention than split horizon alone.

    # Informational because split horizon alone is sufficient for loop prevention;


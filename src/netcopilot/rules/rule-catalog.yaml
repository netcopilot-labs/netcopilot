    lacp_errors\")\n    err_prev = (prev.lag.get(\"interfaces\", {})\n                     .get(po_name, {})\n           \
    \          .get(\"members\", {})\n                     .get(mem_name, {})\n                     .get(\"counters\", {})\n\
    \                     .get(\"lacp_errors\"))\n    if err_now is not None and err_prev is not None:\n      delta = err_now\
    \ - err_prev\n      if delta > 0:\n        finding(\n          severity=\"warning\",\n          message=(\n          \
    \  f\"LACP errors incrementing on {device.hostname} \"\n            f\"{po_name} member {mem_name}: +{delta} errors since\
    \ last run\"\n          ),\n          evidence={\n            \"port_channel\": po_name,\n            \"member\": mem_name,\n\
    \            \"lacp_errors_delta\": delta,\n            \"lacp_errors_total\": err_now,\n            \"lacp_in_pkts\"\
    : mem_data.get(\"counters\", {}).get(\"lacp_in_pkts\"),\n            \"lacp_out_pkts\": mem_data.get(\"counters\", {}).get(\"\

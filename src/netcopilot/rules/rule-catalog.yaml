    \ key=lambda x: int(x[0]))\n  deny_seen = False\n  for seq, ace in sorted_aces:\n    action = (ace.get(\"actions\", {}).get(\"\
    forwarding\") or \"\").lower()\n    src = str(ace.get(\"matches\", {}).get(\"l3\", {}).get(\"ipv4\", {}).get(\"source\"\

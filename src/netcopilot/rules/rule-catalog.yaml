- rule_id: OSPF_SHAM_LINK_DOWN
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF sham link is not up — intra-area OSPF routes may be replaced by BGP super-backbone paths
  genie_source:
    file: ospf.py
    line_range: 801-804
    add_leaf_ref: show ip ospf sham-links → [areas][area][sham_links][slink][state]
  required_fields:
  - path: device.ospf.processes[].areas[].sham_links[].state
    type: string
    healthy_value: POINT_TO_POINT
    threshold: null
  - path: device.ospf.processes[].areas[].sham_links[].neighbors[].state
    type: string
    healthy_value: FULL
    threshold: null
  collection:
    show_commands:
    - show ip ospf sham-links
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: null
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for process in device.ospf.processes:\n  for area in process.areas:\n    for slink in area.sham_links:\n \
    \     state = slink.state\n      if state is None:\n        continue\n      if state != \"POINT_TO_POINT\":\n        finding(\n\
    \          severity=\"warning\",\n          message=(\n            f\"OSPF sham link {slink.name} ({slink.local_id} →\
    \ {slink.remote_id}) \"\n            f\"in area {area.area_id} on {device.hostname} is in state '{state}'\"\n        \
    \  ),\n          evidence={\n            \"sham_link_name\": slink.name,\n            \"local_id\": slink.local_id,\n\
    \            \"remote_id\": slink.remote_id,\n            \"state\": state\n          }\n        )\n      else:\n    \
    \    for neighbor in slink.neighbors:\n          if neighbor.state not in (\"FULL\",):\n            finding(\n       \
    \       severity=\"warning\",\n              message=(\n                f\"OSPF sham link neighbor {neighbor.neighbor_router_id}\
    \ on \"\n                f\"{device.hostname} is in state '{neighbor.state}' (expected FULL)\"\n              ),\n   \
    \           evidence={\n                \"sham_link_name\": slink.name,\n                \"neighbor_router_id\": neighbor.neighbor_router_id,\n\
    \                \"state\": neighbor.state\n              }\n            )\n"
  notes: '# Sham links are only relevant in MPLS VPN (L3VPN) deployments where OSPF

    # is used as the CE-PE routing protocol. Not applicable: not applicable

    # in some environments. Included for production MPLS VPN deployments.

    # Sham links require MPLS LDP/RSVP and BGP VPNv4 — a rich prerequisite stack.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*.areas.*.sham_links.*
    condition:
      field: state
      operator: not_equals
      value: point-to-point
    element_id: '{hostname}/ospf/{vrf}/{instance}/area/{areas}/sham/{sham_links}'
    evidence: sham_link={sham_links}, state={state}, expected=point-to-point
    skip_if_missing: true
  remediation:
    generic: '! OSPF sham-link is down.

      ! Verify endpoint reachability and BGP route advertisement:

      !   show ip ospf sham-links'
- rule_id: OSPF_LSA_TIMER_MISMATCH
  severity: informational
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF routers in the same domain have inconsistent LSA throttle timers — LSA flooding rates differ
  genie_source:
    file: ospf.py
    line_range: 165-169
    add_leaf_ref: show ip ospf → spf_control.throttle.lsa.[start|hold|maximum]
  required_fields:
  - path: device.ospf.processes[].spf_control.throttle.lsa.start
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].spf_control.throttle.lsa.hold
    type: integer
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].spf_control.throttle.lsa.maximum
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/spf-control/throttle/lsa-start
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/summary/ospf-summary/lsa-start-msec
      confidence: medium
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/global/timers/lsa-generation/config/initial-delay
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: topology
  cross_device_compare: global_consistency
  check_logic: "# Identical structure to OSPF_SPF_TIMER_MISMATCH — compare LSA timer triplets\nlsa_timer_index = {}\nfor device\
    \ in all_devices:\n  for process in device.ospf.processes:\n    lsa = process.spf_control.throttle.lsa\n    if lsa.start\
    \ is None:\n      continue\n    timer_tuple = (lsa.start, lsa.hold, lsa.maximum)\n    pid = process.process_id\n    lsa_timer_index.setdefault(pid,\
    \ {}).setdefault(timer_tuple, []).append(device.hostname)\n\nfor pid, timer_map in sorted(lsa_timer_index.items()):\n\
    \  if len(timer_map) > 1:\n    finding(\n      severity=\"informational\",\n      message=(\n        f\"OSPF process {pid}\
    \ has inconsistent LSA throttle timers across the domain: \"\n        + \"; \".join(\n          f\"start={t[0]}ms hold={t[1]}ms\
    \ max={t[2]}ms on {hosts}\"\n          for t, hosts in sorted(timer_map.items())\n        )\n      ),\n      evidence={\n\
    \        \"process_id\": pid,\n        \"lsa_timer_variants\": {\n          f\"{t[0]}/{t[1]}/{t[2]}\": hosts for t, hosts\
    \ in timer_map.items()\n        }\n      }\n    )\n"
  notes: '# Cisco recommended LSA timers: start=50ms, hold=200ms, maximum=5000ms

    # (same as SPF recommendation — consistent approach).

    # IOS XE default: 0ms/5000ms/5000ms (LSA sent immediately, then throttled).

    # See also OSPF_SPF_TIMER_MISMATCH — both timer pairs should be consistent.

    '
- rule_id: OSPF_INTERFACE_AUTH_MISMATCH
  severity: critical
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF interfaces on the same link use different authentication algorithms — adjacency cannot form
  genie_source:
    file: ospf.py
    line_range: 944-947
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][authentication][auth_trailer_key][crypto_algorithm]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].authentication.auth_trailer_key.crypto_algorithm
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/auth-type
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: link
  cross_device_compare: bilateral
  check_logic: "for link in model.links:\n  local_intf = get_ospf_interface(link.local_device_id, link.local_interface_id)\n\
    \  remote_intf = get_ospf_interface(link.remote_device_id, link.remote_interface_id)\n\n  if local_intf is None or remote_intf\
    \ is None:\n    continue\n\n  local_crypto = local_intf.authentication.auth_trailer_key.crypto_algorithm\n  remote_crypto\
    \ = remote_intf.authentication.auth_trailer_key.crypto_algorithm\n\n  # If both are None, this is covered by OSPF_INTERFACE_NO_AUTHENTICATION\n\
    \  if local_crypto is None and remote_crypto is None:\n    continue\n\n  if local_crypto != remote_crypto:\n    finding(\n\
    \      severity=\"critical\",\n      message=(\n        f\"OSPF authentication mismatch on link \"\n        f\"{link.local_device_id}:{link.local_interface_id}\
    \ ↔ \"\n        f\"{link.remote_device_id}:{link.remote_interface_id}: \"\n        f\"'{local_crypto}' vs '{remote_crypto}'\
    \ — adjacency cannot form\"\n      ),\n      evidence={\n        \"link_id\": link.link_id,\n        \"local_device\"\
    : link.local_device_id,\n        \"local_interface\": link.local_interface_id,\n        \"local_crypto_algorithm\": local_crypto,\n\
    \        \"remote_device\": link.remote_device_id,\n        \"remote_interface\": link.remote_interface_id,\n        \"\
    remote_crypto_algorithm\": remote_crypto\n      }\n    )\n"
  notes: '# Common mismatch scenario: one end has MD5, other end has no authentication.

    # This also fires when one end has SHA and the other has MD5 — both are "configured"

    # but the algorithms differ. SHA → MD5 downgrade is a security concern even if

    # the adjacency would form with compatible type negotiation.

    # OSPF does not negotiate authentication type — both ends must be identical.

    '
- rule_id: OSPF_INTERFACE_COST_MISMATCH
  severity: warning
  deferred_to: sprint_15
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF interface cost is configured differently on the two ends of a link — asymmetric routing will occur
  genie_source:
    file: ospf.py
    line_range: 961-966
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][cost]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].cost
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/cost
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/interfaces/interface/interface-cost
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/areas/area/interfaces/interface/config/metric
      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: link
  cross_device_compare: bilateral
  check_logic: "for link in model.links:\n  local_intf = get_ospf_interface(link.local_device_id, link.local_interface_id)\n\
    \  remote_intf = get_ospf_interface(link.remote_device_id, link.remote_interface_id)\n\n  if local_intf is None or remote_intf\
    \ is None:\n    continue\n\n  local_cost = local_intf.cost\n  remote_cost = remote_intf.cost\n\n  if local_cost is None\
    \ or remote_cost is None:\n    continue\n\n  if local_cost != remote_cost:\n    finding(\n      severity=\"warning\",\n\
    \      message=(\n        f\"OSPF cost mismatch on link \"\n        f\"{link.local_device_id}:{link.local_interface_id}\
    \ (cost={local_cost}) ↔ \"\n        f\"{link.remote_device_id}:{link.remote_interface_id} (cost={remote_cost}): \"\n \
    \       f\"asymmetric routing will occur\"\n      ),\n      evidence={\n        \"link_id\": link.link_id,\n        \"\
    local_device\": link.local_device_id,\n        \"local_interface\": link.local_interface_id,\n        \"local_cost\":\
    \ local_cost,\n        \"remote_device\": link.remote_device_id,\n        \"remote_interface\": link.remote_interface_id,\n\
    \        \"remote_cost\": remote_cost\n      }\n    )\n"
  notes: '# Intentional asymmetric cost is a valid traffic engineering technique.

    # If asymmetric cost is intentional, suppress this finding for the specific link.

    # The finding is still worth surfacing — operators should confirm it is intentional.

    # Note: OSPF cost is per-direction. A → B uses B''s inbound cost (from A''s perspective:

    # A''s interface cost to reach B). Asymmetric cost means A prefers the link in one

    # direction but B may prefer a different path in the return direction.

    # consider adding a suppression whitelist for known-intentional asymmetries.

    '
- rule_id: BGP_NEIGHBOR_NOT_ESTABLISHED
  severity: critical
  category: genie_infrastructure
  protocol: bgp
  tier: surface
  description: BGP neighbor session is not in Established state — no routing information is being exchanged
  genie_source:
    file: bgp.py
    line_range: 263-273
    add_leaf_ref: show bgp {af} all neighbors → [vrf][vrf][neighbor][neighbor_id][session_state]
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].session_state
    type: string
    healthy_value: Established
    threshold: null
  - path: device.bgp.instances[].vrfs[].neighbors[].neighbor_id
    type: string
    healthy_value: null
    threshold: null
  - path: device.bgp.instances[].vrfs[].neighbors[].remote_as
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all summary
    - show bgp all neighbors
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor/session-state
      iosxr_path: Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor/connection-state
      confidence: high
    yang_openconfig:
      path: openconfig-bgp:bgp/neighbors/neighbor/state/session-state
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    for neighbor in vrf.neighbors:\n \
    \     state = neighbor.session_state\n      if state is None:\n        continue\n      if state != \"Established\":\n\
    \        # Determine severity based on state — Idle/Active suggest ongoing failure\n        finding(\n          severity=\"\
    critical\",\n          message=(\n            f\"BGP neighbor {neighbor.neighbor_id} (AS {neighbor.remote_as}) \"\n  \
    \          f\"on {device.hostname} VRF {vrf.vrf_id} is in state '{state}' \"\n            f\"— no routes being exchanged\"\
    \n          ),\n          evidence={\n            \"neighbor_id\": neighbor.neighbor_id,\n            \"remote_as\": neighbor.remote_as,\n\
    \            \"session_state\": state,\n            \"vrf\": vrf.vrf_id\n          }\n        )\n"
  notes: '# "Idle (Admin)" = neighbor is administratively shut down — BGP_NEIGHBOR_SHUTDOWN

    # will also fire in this case. Both are intentional — different fix actions.

    # "Active" state means TCP SYN is being sent but not accepted by the peer.

    # Common causes: wrong IP, ACL blocking TCP 179, wrong AS number, auth mismatch.

    # "OpenConfirm" persisting = capability negotiation failing (BGP version, auth).

    '
  eval:
    source: genie_bgp
    iterate: instance.*.vrf.*.neighbor.*
    condition:
      field: session_state
      operator: not_equals
      value: established
    element_id: '{hostname}/bgp/{instance}/{vrf}/neighbor/{neighbor}'
    evidence: neighbor={neighbor}, session_state={session_state}, expected=established
    skip_if_missing: true
  remediation:
    generic: '! BGP neighbor {neighbor} is not established.

      ! Check reachability, AS number, and authentication:

      !   show bgp neighbor {neighbor}

      !   ping {neighbor}'

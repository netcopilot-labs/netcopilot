    \ b_speed is not None and a_speed != b_speed:\n    finding(\n      severity=\"warning\",\n      message=(\n        f\"\
    Speed mismatch on link \"\n        f\"{link.endpoint_a.device}:{link.endpoint_a.interface} ({a_speed}) vs \"\n       \
    \ f\"{link.endpoint_b.device}:{link.endpoint_b.interface} ({b_speed})\"\n      ),\n      evidence={\n        \"link\"\
    : link.id,\n        \"endpoint_a\": {\"device\": link.endpoint_a.device,\n                       \"interface\": link.endpoint_a.interface,\

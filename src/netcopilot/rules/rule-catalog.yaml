    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].area_id
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare OSPF area ID on each end of a link between neighbors
  check_logic: |
    for each link between OSPF-enabled interfaces:
      area_a = area ID on device_a interface
      area_b = area ID on device_b interface
      if area_a != area_b:
        finding(low, device_a, device_b, interface, area_a, area_b)
  notes: Area ID mismatch causes OSPF to reject Hello packets. Adjacency never forms.
  remediation:
    ios_xe: |
      ! OSPF area mismatch on link to {peer}: local={local_area}, peer={peer_area}.
      ! Correct the area assignment:
      router ospf {process_id}
       no network {network} {wildcard} area {wrong_area}
       network {network} {wildcard} area {correct_area}
    iosxr: |
      ! OSPF area mismatch on link to {peer}.
      router ospf {process_id}
       area {correct_area}
        interface {interface}
- rule_id: OSPF_AREA_SINGLE_ABR
  severity: low
  category: cross_device
  protocol: ospf
  tier: deep
  description: OSPF area has only one ABR, creating a single point of failure for inter-area routing
  genie_source: null
  required_fields:
  - path: device.ospf.processes[].areas[].area_id
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:

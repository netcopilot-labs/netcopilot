  tier: deep
  description: Established BGP neighbor has sent zero prefixes — possible route policy misconfiguration or stub peer
  genie_source:
    file: bgp.py
    line_range: 711-719
    add_leaf_ref: show bgp all summary → routes_per_peer.[vrf][neighbor][address_family][state_pfxrcd]
  required_fields:

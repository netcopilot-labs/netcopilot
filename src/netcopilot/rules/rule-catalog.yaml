- rule_id: DEVICE_CONFIG_REGISTER_ANOMALY
  severity: warning
  category: platform_health
  protocol: device
  tier: surface
  description: Config register is not set to the standard value (0x2102) — device may boot into ROMMON, ignore startup-config,
    or use unexpected boot behavior
  genie_source:
    file: device.py
    line_range: 335-342
    add_leaf_ref: ShowBootvar → info[bootvar][config_register]
  cis_source: null
  required_fields:
  - path: device.device.bootvar.config_register
    type: string
    healthy_value: '0x2102'
    threshold: null
  collection:
    show_commands:
    - show bootvar
    yang_cisco_native: null
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# Check config register value — 0x2102 is the standard production value\n# Common anomalies:\n#   0x2142 —\
    \ skips startup-config (password recovery mode, left accidentally)\n#   0x0    — boots to ROMMON (catastrophic after reload)\n\
    #   0x2101 — boots first image in flash (ignores boot variable)\nbootvar = device.device.get(\"bootvar\", {})\nconfig_reg\
    \ = bootvar.get(\"config_register\", \"\")\nif config_reg and config_reg.lower() != \"0x2102\":\n    finding(severity=\"\
    warning\",\n            message=f\"Config register {config_reg} (expected 0x2102) — non-standard boot behavior\")\n"
  notes: '# Genie source: device.py line 335-342, ShowBootvar → info[bootvar].

    # 0x2102 is the universal standard for normal IOS boot:

    #   bit 6 (0x0040) = ignore system config

    #   bit 8 (0x0100) = break disabled

    #   bits 0-3 = boot field (0x2 = boot from flash per boot variable)

    # 0x2142 is the #1 accidental finding — left after password recovery.

    # In production, non-standard config register after a reload could cause a device

    # to come up without its configuration (0x2142) or drop to ROMMON (0x0).

    # CIS Benchmark also flags non-standard config register (see CIS_XE_* rules).

    '
  eval:
    source: genie_platform
    iterate: null
    condition:
      field: config_register
      operator: not_equals
      value: '0x2102'
    element_id: '{hostname}/device/config-register'
    evidence: config_register={config_register}, expected=0x2102
    skip_if_missing: true
  remediation:
    generic: '! Config register anomaly detected.

      ! Verify and correct boot register:

      !   show version | include Configuration register

      !   config-register 0x2102'

- rule_id: BGP_NEIGHBOR_FREQUENT_RESET
  severity: warning
  category: genie_infrastructure
  protocol: bgp
  tier: deep
  description: BGP neighbor session was recently reset — possible session instability or route flapping
  genie_source:
    file: bgp.py
    line_range: 323-340
    add_leaf_ref: show bgp {af} all neighbors → [vrf][vrf][neighbor][neighbor_id][bgp_session_transport][connection][last_reset]
  required_fields:
  - path: device.bgp.instances[].vrfs[].neighbors[].bgp_session_transport.connection.last_reset
    type: string
    healthy_value: null
    threshold: null
  - path: device.bgp.instances[].vrfs[].neighbors[].bgp_session_transport.connection.reset_reason
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show bgp all neighbors
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor/bgp-neighbor-counters/last-reset
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "import re\nRESET_THRESHOLD_SECONDS = 300  # tunable default: flag if reset within last 5 minutes\n\ndef parse_elapsed_seconds(elapsed_str):\n\
    \  # Parse \"HH:MM:SS\" or \"never\" to seconds\n  if elapsed_str is None or elapsed_str.lower() == \"never\":\n    return\
    \ None\n  m = re.match(r\"(\\d+):(\\d+):(\\d+)\", elapsed_str)\n  if m:\n    return int(m.group(1))*3600 + int(m.group(2))*60\
    \ + int(m.group(3))\n  return None\n\nfor instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    for neighbor\
    \ in vrf.neighbors:\n      # Only check established neighbors — non-established are caught by\n      # BGP_NEIGHBOR_NOT_ESTABLISHED\n\
    \      if neighbor.session_state != \"Established\":\n        continue\n      elapsed = parse_elapsed_seconds(\n     \
    \   neighbor.bgp_session_transport.connection.last_reset\n      )\n      if elapsed is None:\n        continue\n     \
    \ if elapsed < RESET_THRESHOLD_SECONDS:\n        finding(\n          severity=\"warning\",\n          message=(\n    \
    \        f\"BGP neighbor {neighbor.neighbor_id} on {device.hostname} \"\n            f\"was reset {elapsed}s ago (reason:\
    \ \"\n            f\"'{neighbor.bgp_session_transport.connection.reset_reason}') \"\n            f\"— session recently\
    \ re-established, route churn may be occurring\"\n          ),\n          evidence={\n            \"neighbor_id\": neighbor.neighbor_id,\n\
    \            \"last_reset_elapsed_seconds\": elapsed,\n            \"reset_reason\": neighbor.bgp_session_transport.connection.reset_reason,\n\
    \            \"threshold_seconds\": RESET_THRESHOLD_SECONDS\n          }\n        )\n"
  notes: '# IOS XE ''show bgp neighbors'' shows last_reset as elapsed time (HH:MM:SS).

    # A 5-minute threshold means: if the session reset within the last collection

    # cycle AND is now Established again, flag it.

    # tunable default: threshold should be set to ~2× the collection interval.

    # Common reset reasons worth noting: "Hold timer expired" = keepalive failure,

    # "BGP Notification received" = explicit error (check notification type),

    # "Peer closed the session" = remote peer restarted.

    '
  remediation:
    ios_xe: |
      ! Investigate BGP session reset cause:
      !   show bgp neighbors {neighbor} | include reset
      ! Common fixes:
      !   - Hold timer expired: increase timers or fix path
      !     router bgp {asn}
      !      neighbor {neighbor} timers 30 90
      !   - Notification received: check error sub-code
      !     debug bgp updates (use with caution)
    iosxr: |
      ! Investigate BGP session reset cause:
      !   show bgp neighbors {neighbor} | include reset
      ! Common fixes:
      !   router bgp {asn}
      !    neighbor {neighbor}
      !     timers 30 90

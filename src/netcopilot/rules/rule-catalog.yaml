- rule_id: OSPF_NEIGHBOR_NOT_FULL
  severity: critical
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF neighbor is not in FULL state — LSDBs are not synchronized and routing may be incorrect
  genie_source:
    file: ospf.py
    line_range: 992-998
    add_leaf_ref: show ip ospf neighbor detail → [areas][area][interfaces][intf][neighbors][neighbor][state]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].state
    type: string
    healthy_value: FULL
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].passive
    type: boolean
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].neighbor_router_id
    type: string
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].name
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/ospf-neighbor/state
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/neighbors/neighbor/state
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/areas/area/interfaces/interface/neighbors/neighbor/state/adjacency-state
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# Iterate over all OSPF processes on this device\nfor process in device.ospf.processes:\n  for area in process.areas:\n\
    \    for intf in area.interfaces:\n      # Passive interfaces have no neighbors — skip to avoid false positives\n    \
    \  if intf.passive is True:\n        continue\n\n      for neighbor in intf.neighbors:\n        state = neighbor.state\n\
    \        # Null state = no evidence — skip (null-over-guessing principle)\n        if state is None:\n          continue\n\
    \n        # \"FULL\" = healthy adjacency, LSDB fully synchronized\n        # \"2WAY\" = normal on multi-access (broadcast/NBMA)\
    \ segments between\n        #          non-DR/BDR routers. They see each other but don't sync LSDBs.\n        #      \
    \    2WAY between DR and any other router would be abnormal but\n        #          is hard to distinguish here — flag\
    \ only non-FULL/non-2WAY.\n        if state not in (\"FULL\", \"2WAY\"):\n          finding(\n            severity=\"\
    critical\",\n            message=(\n              f\"OSPF neighbor {neighbor.neighbor_router_id} on \"\n             \
    \ f\"{intf.name} (area {area.area_id}) of {device.hostname} \"\n              f\"is in state '{state}' — adjacency not\
    \ established\"\n            ),\n            evidence={\n              \"process_id\": process.process_id,\n         \
    \     \"area_id\": area.area_id,\n              \"interface\": intf.name,\n              \"neighbor_router_id\": neighbor.neighbor_router_id,\n\
    \              \"state\": state,\n              \"expected\": \"FULL\"\n            }\n          )\n"
  notes: '# "2WAY" handling: on a broadcast segment with 3+ routers, two non-DR/BDR

    # routers will be "2WAY" with each other — this is correct OSPF behavior.

    # Flagging 2WAY would generate massive false positives on multi-router segments.

    # Only flag states outside {FULL, 2WAY}: INIT, EXSTART, EXCHANGE, LOADING, DOWN, ATTEMPT.

    # EXSTART/EXCHANGE/LOADING are transient — if seen at collection time, they indicate

    # an adjacency is forming or a problem exists. Flag them: transient states should

    # not persist across a collection cycle (typically 5+ minutes).

    # tuning: consider suppressing EXSTART/EXCHANGE/LOADING if they self-clear

    # within two consecutive runs.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*.areas.*.interfaces.*.neighbors.*
    condition:
      field: state
      operator: not_equals
      value: full
    element_id: '{hostname}/ospf/{vrf}/{instance}/area/{areas}/intf/{interfaces}/nbr/{neighbors}'
    evidence: neighbor={neighbor_router_id}, state={state}, expected=full
    skip_if_missing: true
  remediation:
    generic: '! OSPF neighbor is not in FULL state.

      ! Check interface MTU match, area type match, and authentication:

      !   show ip ospf neighbor

      !   show ip ospf interface'
- rule_id: OSPF_NEIGHBOR_HIGH_RETRANS_QUEUE
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF neighbor has a high retransmission queue — LSAs are not being acknowledged promptly
  genie_source:
    file: ospf.py
    line_range: 1006-1010
    add_leaf_ref: show ip ospf neighbor detail → [areas][area][interfaces][intf][neighbors][neighbor][statistics][nbr_retrans_qlen]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].statistics.nbr_retrans_qlen
    type: integer
    healthy_value: 0
    threshold: 5
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].neighbor_router_id
    type: string
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].name
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/ospf-neighbor/stat-retrans-q-len
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/neighbors/neighbor/retrans-list-count
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "RETRANS_THRESHOLD = 5  # tunable default: flag if queue length exceeds this value\n\nfor process in device.ospf.processes:\n\
    \  for area in process.areas:\n    for intf in area.interfaces:\n      for neighbor in intf.neighbors:\n        qlen =\
    \ neighbor.statistics.nbr_retrans_qlen\n        if qlen is None:\n          continue\n        if qlen > RETRANS_THRESHOLD:\n\
    \          finding(\n            severity=\"warning\",\n            message=(\n              f\"OSPF neighbor {neighbor.neighbor_router_id}\
    \ on {intf.name} \"\n              f\"of {device.hostname} has {qlen} LSAs queued for retransmission \"\n            \
    \  f\"(threshold: {RETRANS_THRESHOLD})\"\n            ),\n            evidence={\n              \"interface\": intf.name,\n\
    \              \"neighbor_router_id\": neighbor.neighbor_router_id,\n              \"nbr_retrans_qlen\": qlen,\n     \
    \         \"threshold\": RETRANS_THRESHOLD\n            }\n          )\n"
  notes: '# Retransmission queue of 0 is ideal. A brief spike to 1-2 is normal during

    # topology changes. Persistent values > 5 indicate a problem.

    # Common causes: MTU mismatch (OSPF packets too large), one-way packet loss,

    # congested link, or a neighbor that is overloaded.

    # tunable default: measure baseline in lab runs. Start threshold at 5.

    # This is not a run_comparison rule — the current qlen at collection time is

    # sufficient evidence (unlike event count which requires a delta).

    '
  remediation:
    ios_xe: |
      ! High retransmission queue indicates LSAs not being acknowledged.
      ! Check for MTU mismatch or packet loss on the link:
      !   show ip ospf interface {interface}
      !   show ip ospf neighbor {neighbor_router_id} detail
      ! Fix MTU if mismatched:
      interface {interface}
       ip mtu 1500
    iosxr: |
      ! High retransmission queue — check MTU and link health:
      !   show ospf neighbor {neighbor_router_id} detail
      !   show interface {interface}
      ! Fix MTU if mismatched:
      interface {interface}
       mtu 1500
- rule_id: OSPF_NEIGHBOR_EVENT_RATE_HIGH
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF neighbor state machine event counter is rising rapidly — possible adjacency instability
  genie_source:
    file: ospf.py
    line_range: 1006-1010
    add_leaf_ref: show ip ospf neighbor detail → [areas][area][interfaces][intf][neighbors][neighbor][statistics][nbr_event_count]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].statistics.nbr_event_count
    type: integer
    healthy_value: null
    threshold: 10
  collection:
    show_commands:
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/ospf-neighbor/stat-num-nbrs-changes
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: run_comparison
  check_logic: "# NOTE: This rule requires run_comparison capability.\n# The engine must pass previous run's nbr_event_count\
    \ for each neighbor.\n# At initial implementation: log the counter value but do not fire.\n\nEVENT_DELTA_THRESHOLD\
    \ = 10  # tunable default\n\nfor process in device.ospf.processes:\n  for area in process.areas:\n    for intf in area.interfaces:\n\
    \      for neighbor in intf.neighbors:\n        current_count = neighbor.statistics.nbr_event_count\n        previous_count\
    \ = context.previous_run.get_neighbor_event_count(\n          device.hostname, intf.name, neighbor.neighbor_router_id\n\
    \        )\n        if current_count is None or previous_count is None:\n          continue\n        delta = current_count\
    \ - previous_count\n        if delta > EVENT_DELTA_THRESHOLD:\n          finding(\n            severity=\"warning\",\n\
    \            message=(\n              f\"OSPF neighbor {neighbor.neighbor_router_id} on {intf.name} \"\n             \
    \ f\"of {device.hostname} had {delta} state-machine events \"\n              f\"between runs — possible adjacency flapping\"\
    \n            ),\n            evidence={\n              \"interface\": intf.name,\n              \"neighbor_router_id\"\
    : neighbor.neighbor_router_id,\n              \"event_count_current\": current_count,\n              \"event_count_previous\"\
    : previous_count,\n              \"delta\": delta,\n              \"threshold\": EVENT_DELTA_THRESHOLD\n            }\n\
    \          )\n"
  notes: '# Deferred to (requires run_comparison engine feature).

    # At collect the counter but skip evaluation.

    # tunable default: what constitutes "high"? 1 event = hello timeout or manual clear.

    # 10 events between 5-minute collection intervals = 2/min = adjacency flapping.

    # Tune threshold after observing baseline in stable lab.

    '
  remediation:
    ios_xe: |
      ! High OSPF neighbor event rate indicates adjacency instability.
      ! Investigate the cause:
      !   show ip ospf neighbor {neighbor_router_id} detail
      !   show logging | include OSPF
      ! Common fixes: stabilize the link, tune timers, or add BFD:
      interface {interface}
       ip ospf bfd
    iosxr: |
      ! High OSPF neighbor event rate — adjacency instability.
      !   show ospf neighbor {neighbor_router_id} detail
      !   show logging | include OSPF
      ! Stabilize with BFD:
      router ospf {process_id}
       area {area_id}
        interface {interface}
         bfd fast-detect
- rule_id: OSPF_ROUTER_ID_DUPLICATE
  severity: critical
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: Two or more OSPF routers share the same router ID — LSDB corruption will occur
  genie_source:
    file: ospf.py
    line_range: 37-39
    add_leaf_ref: show ip ospf → [vrf][vrf][address_family][af][instance][instance][router_id]
  required_fields:
  - path: device.ospf.processes[].router_id
    type: string
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].process_id
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/router-id
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/summary/ospf-summary/router-id
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/global/state/router-id
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: topology
  cross_device_compare: global_consistency
  check_logic: "# Phase 1: build index of router_id → [devices]\n# (engine runs this rule once with all devices' data)\nrouter_id_index\
    \ = {}\nfor device in all_devices:\n  for process in device.ospf.processes:\n    rid = process.router_id\n    if rid is\
    \ None:\n      continue\n    key = (rid, process.process_id)  # scope per process_id to handle multi-process\n    router_id_index.setdefault(key,\
    \ []).append(device.hostname)\n\n# Phase 2: flag any router_id seen on more than one device\nfor (rid, pid), hostnames\
    \ in sorted(router_id_index.items()):\n  if len(hostnames) > 1:\n    finding(\n      severity=\"critical\",\n      element_type=\"\
    device\",\n      element_id=hostnames[0],   # flag the first occurrence; message names all\n      message=(\n        f\"\
    OSPF router ID {rid} is shared by {len(hostnames)} devices \"\n        f\"in process {pid}: {', '.join(sorted(hostnames))}.\
    \ \"\n        f\"LSDB corruption will occur.\"\n      ),\n      evidence={\n        \"router_id\": rid,\n        \"process_id\"\
    : pid,\n        \"devices\": sorted(hostnames)\n      }\n    )\n"
  notes: '# Router ID duplicates are rare in well-managed networks but common after:

    #   - Copying device configs without changing the static router-id

    #   - Auto-selected router ID based on loopback that was duplicated

    # In a multi-VRF or multi-instance OSPF deployment, the same router ID can

    # appear in different process IDs on different devices if the processes are in

    # different domains — scope the check by process_id as above.

    # note: must populate process.process_id to enable scoping.

    '
  remediation:
    ios_xe: |
      ! Duplicate OSPF router ID causes LSDB corruption.
      ! Assign a unique router ID on each device:
      router ospf {process_id}
       router-id <UNIQUE_IP>
    iosxr: |
      ! Duplicate OSPF router ID causes LSDB corruption.
      ! Assign a unique router ID on each device:
      router ospf {process_id}
       router-id <UNIQUE_IP>
- rule_id: OSPF_NEIGHBOR_DEAD_TIMER_EXPIRING
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: deep
  description: OSPF neighbor dead timer is critically low — hello packets may have stopped arriving
  genie_source:
    file: ospf.py
    line_range: 725-730
    add_leaf_ref: show ip ospf neighbor detail → [areas][area][interfaces][intf][neighbors][neighbor][dead_timer]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].dead_timer
    type: string
    healthy_value: null
    threshold: 5
  collection:
    show_commands:
    - show ip ospf neighbor detail
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/ospf-neighbor/dead-timer
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "import re\nDEAD_TIMER_THRESHOLD_SEC = 5  # tunable default\n\ndef parse_timer_seconds(timer_str):\n  # Parse \"HH:MM:SS\"\
    \ or \"MM:SS\" format to total seconds\n  if timer_str is None:\n    return None\n  m = re.match(r\"(\\d+):(\\d+):(\\\
    d+)\", timer_str)\n  if m:\n    return int(m.group(1))*3600 + int(m.group(2))*60 + int(m.group(3))\n  m = re.match(r\"\
    (\\d+):(\\d+)\", timer_str)\n  if m:\n    return int(m.group(1))*60 + int(m.group(2))\n  return None\n\nfor process in\
    \ device.ospf.processes:\n  for area in process.areas:\n    for intf in area.interfaces:\n      for neighbor in intf.neighbors:\n\
    \        remaining = parse_timer_seconds(neighbor.dead_timer)\n        if remaining is None:\n          continue\n   \
    \     if remaining < DEAD_TIMER_THRESHOLD_SEC:\n          finding(\n            severity=\"warning\",\n            message=(\n\
    \              f\"OSPF neighbor {neighbor.neighbor_router_id} on {intf.name} \"\n              f\"of {device.hostname}\
    \ has only {remaining}s until declared dead \"\n              f\"— hellos may have stopped arriving\"\n            ),\n\
    \            evidence={\n              \"interface\": intf.name,\n              \"neighbor_router_id\": neighbor.neighbor_router_id,\n\
    \              \"dead_timer\": neighbor.dead_timer,\n              \"remaining_seconds\": remaining,\n              \"\
    threshold_seconds\": DEAD_TIMER_THRESHOLD_SEC\n            }\n          )\n"
  notes: '# HIGH FALSE POSITIVE RISK. The dead timer resets on every hello (every 10s by default).

    # If collection coincidentally occurs in the last 5 seconds of the cycle, this fires

    # spuriously. recommendation: suppress this rule unless the same neighbor

    # has dead_timer < threshold in TWO consecutive runs (requires run_comparison).

    # Until run_comparison is available, treat findings as advisory only.

    # tunable default: threshold of 5s may need raising to 8s to reduce false positives.

    '
  remediation:
    ios_xe: |
      ! Dead timer critically low — hellos may have stopped.
      ! Verify link and neighbor health:
      !   show ip ospf neighbor {neighbor_router_id} detail
      !   show ip ospf interface {interface}
      ! If persistent, check for interface errors or congestion:
      !   show interface {interface}
    iosxr: |
      ! Dead timer critically low — hellos may have stopped.
      !   show ospf neighbor {neighbor_router_id} detail
      !   show interface {interface}
- rule_id: OSPF_INTERFACE_STATE_UNEXPECTED
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF interface is in an unexpected state — DR election may be stalled or interface is down
  genie_source:
    file: ospf.py
    line_range: 961-966
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][state]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].state
    type: string
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].passive
    type: boolean
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].interface_type
    type: string
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/state
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/interfaces/interface/state
      confidence: high
    yang_openconfig:
      path: openconfig-network-instance:network-instances/network-instance/protocols/protocol/ospf/areas/area/interfaces/interface/state/adjacency-state
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# States that indicate the interface is healthy\nHEALTHY_STATES = {\"DR\", \"BDR\", \"DROTHER\", \"POINT_TO_POINT\"\
    , \"LOOP\"}\n# States that indicate a problem\nPROBLEM_STATES = {\"WAITING\", \"DOWN\"}\n# \"WAITING\" = DR election in\
    \ progress; OK briefly at startup, problem if persistent\n# \"DOWN\" = interface no longer sending hellos\n\nfor process\
    \ in device.ospf.processes:\n  for area in process.areas:\n    for intf in area.interfaces:\n      # Passive interfaces\
    \ don't have a meaningful OSPF state — skip\n      if intf.passive is True:\n        continue\n      state = intf.state\n\
    \      if state is None:\n        continue\n      if state in PROBLEM_STATES:\n        finding(\n          severity=\"\
    warning\",\n          message=(\n            f\"OSPF interface {intf.name} on {device.hostname} (area {area.area_id})\
    \ \"\n            f\"is in state '{state}' — expected DR/BDR/DROTHER/POINT_TO_POINT\"\n          ),\n          evidence={\n\
    \            \"interface\": intf.name,\n            \"area_id\": area.area_id,\n            \"state\": state,\n      \
    \      \"interface_type\": intf.interface_type\n          }\n        )\n"
  notes: '# "WAITING" at startup is normal (lasts up to wait_timer seconds, typically 40s).

    # If collected during initial convergence it will generate a false positive.

    # suppress if state returns to healthy within the next run.

    # "LOOP" on loopbacks is intentional — loopback interfaces are always LOOP state.

    # Make sure populates interface_type so we can skip loopbacks if needed.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*.areas.*.interfaces.*
    condition:
      field: enable
      operator: equals
      value: 'false'
    element_id: '{hostname}/ospf/{vrf}/{instance}/area/{areas}/intf/{interfaces}'
    evidence: interface={name}, enabled={enable}
    skip_if_missing: true
  remediation:
    generic: '! OSPF interface in unexpected state.

      ! Verify network type and neighbor configuration:

      !   show ip ospf interface'
- rule_id: OSPF_INTERFACE_NO_AUTHENTICATION
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF interface has no cryptographic authentication configured — route injection attacks possible
  genie_source:
    file: ospf.py
    line_range: 944-947
    add_leaf_ref: show ip ospf interface → [areas][area][interfaces][intf][authentication][auth_trailer_key][crypto_algorithm]
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].authentication.auth_trailer_key.crypto_algorithm
    type: string
    healthy_value: null
    threshold: null
  - path: device.ospf.processes[].areas[].interfaces[].passive
    type: boolean
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/ospf-area/ospf-interface/auth-type
      iosxr_path: Cisco-IOS-XR-ipv4-ospf-oper:ospf-oper/processes/process/default-vrf/areas/area/interfaces/interface/authentication-type
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for process in device.ospf.processes:\n  for area in process.areas:\n    for intf in area.interfaces:\n  \
    \    # Passive interfaces don't send/receive OSPF packets — no auth needed\n      if intf.passive is True:\n        continue\n\
    \      # If auth field is absent or null, no authentication is configured\n      crypto = intf.authentication.auth_trailer_key.crypto_algorithm\n\
    \      if crypto is None:\n        finding(\n          severity=\"warning\",\n          message=(\n            f\"OSPF\
    \ interface {intf.name} on {device.hostname} (area {area.area_id}) \"\n            f\"has no cryptographic authentication\
    \ — route injection attacks possible\"\n          ),\n          evidence={\n            \"interface\": intf.name,\n  \
    \          \"area_id\": area.area_id,\n            \"crypto_algorithm\": None\n          }\n        )\n"
  notes: '# Simple password authentication (type 1, clear-text) is also insecure but

    # Genie populates the same crypto_algorithm field. If the value is "simple" or

    # absent, the interface is vulnerable. A separate rule (OSPF_INTERFACE_WEAK_AUTH)

    # checks for simple password specifically.

    # The IOS XE CIS benchmark does not have an explicit OSPF auth item but the

    # principle is covered by routing protocol security recommendations.

    # Note: area-level authentication configuration (not captured in this Genie path)

    # can override per-interface settings. must verify the Genie parser

    # captures interface-effective auth, not just interface-configured auth.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*.areas.*.interfaces.*
    python_severity: low
    condition:
      field: authentication
      operator: is_null

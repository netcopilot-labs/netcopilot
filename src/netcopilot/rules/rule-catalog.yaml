- rule_id: INTF_INPUT_UTILIZATION_HIGH
  severity: warning
  category: interface_health
  protocol: interface
  tier: deep
  description: 'Interface input utilization (in_rate / bandwidth) exceeds threshold. Sustained high utilization degrades latency
    and can cause drops. Default threshold: 80%. Applies to physical and logical interfaces where bandwidth is known.

    '
  genie_source:
    file: interface.py
    line_range: 328-341
    add_leaf_ref: 'show interfaces → info[interface][counters][rate][in_rate] (in_rate in req_keys line 329) and info[interface][bandwidth]
      (bandwidth in req_keys line 34)

      '
  required_fields:
  - path: device.interfaces[].counters.rate.in_rate
    type: integer
    healthy_value: null
    threshold: in_rate / (bandwidth * 1000) < 0.80
  - path: device.interfaces[].bandwidth
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show interfaces
    yang_cisco_native:
      path: Cisco-IOS-XE-interfaces-oper:interfaces/interface[name=*]/statistics/in-octets-rate
      iosxr_path: Cisco-IOS-XR-pfi-im-cmd-oper:interfaces/interface-xr/interface[interface-name=*]/data-rates/input-data-rate
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/state/counters/in-octets
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "THRESHOLD = 0.80  # configurable per deployment\nfor intf in device.interfaces:\n  bw_kbps = intf.get(\"bandwidth\"\
    )          # Genie returns bandwidth in Kbps\n  in_rate_bps = intf.counters.rate.get(\"in_rate\")  # Genie returns in_rate\
    \ in bps\n  if bw_kbps and in_rate_bps:\n    utilization = in_rate_bps / (bw_kbps * 1000)\n    if utilization > THRESHOLD:\n\
    \      finding(\n        severity=\"warning\",\n        message=(\n          f\"Interface {intf.name} on {device.hostname}\
    \ input utilization \"\n          f\"{utilization*100:.1f}% exceeds threshold ({THRESHOLD*100:.0f}%)\"\n        ),\n \
    \       evidence={\n          \"interface\": intf.name,\n          \"in_rate_bps\": in_rate_bps,\n          \"bandwidth_kbps\"\
    : bw_kbps,\n          \"utilization_pct\": round(utilization * 100, 1)\n        }\n      )\n"
  notes: '# in_rate from Genie/IOS is a 5-minute rolling average by default (load_interval=300s).

    # bandwidth field is the configured or negotiated bandwidth in Kbps.

    # make THRESHOLD configurable per-device-type or per-interface-role.

    # verify in_rate units in Genie model (bps — IOS shows bps in "show interfaces").

    # YANG rate fields: IOS XE oper may not expose instantaneous rates; may need telemetry.

    '
  remediation:
    ios_xe: |
      ! Input utilization is high on {interface}.
      ! Identify top talkers:
      !   show interface {interface}
      !   show ip nbar protocol-discovery interface {interface}
      ! Consider upgrading link speed or applying QoS input policy:
      interface {interface}
       service-policy input <QOS_POLICY>
    iosxr: |
      ! Input utilization high on {interface}:
      !   show interface {interface}
      ! Apply QoS or upgrade link capacity:
      interface {interface}
       service-policy input <QOS_POLICY>

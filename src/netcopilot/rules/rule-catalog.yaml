    falseticker (bad reference clock) and will follow any server it is configured with, even if inaccurate. Best practice
    is three or more sources for Meinberg algorithm accuracy.

    '
  genie_source:
    file: ntp.py
    line_range: 120-160
    add_leaf_ref: show ntp associations → info[peer][ip][reachability]
  required_fields:
  - path: device.ntp.associations

      ! Reduce to the minimum required hop count:
      router bgp {asn}
       neighbor {neighbor} ebgp-multihop 2
      ! Or use TTL security instead:
       neighbor {neighbor} ttl-security hops 254
    iosxr: |
      ! eBGP multihop TTL is excessive — reduce or use TTL security:

      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "for vlan_id, vlan in device.vlans.items():\n  if vlan.get(\"state\") == \"suspend\":\n    finding(\n     \
    \ severity=\"critical\",\n      message=f\"VLAN {vlan_id} ({vlan.get('name','')}) is in SUSPEND state — traffic silently\
    \ dropped\",\n      evidence={\"vlan_id\": vlan_id, \"name\": vlan.get(\"name\"), \"state\": \"suspend\"}\n    )\n"
  notes: '# Genie: vlan.py → show vlan → info[vlans][<id>][state]


- rule_id: OSPF_RETRANSMIT_INTERVAL_MISMATCH
  severity: low
  category: cross_device
  protocol: ospf
  tier: deep
  description: OSPF retransmit interval differs between neighbors on the same link, causing unnecessary LSA retransmissions
  genie_source: null
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].retransmit_interval
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf interface
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare OSPF retransmit interval on each end of a link
  check_logic: |
    for each link between OSPF-enabled interfaces:
      retrans_a = device_a.interface.retransmit_interval
      retrans_b = device_b.interface.retransmit_interval
      if retrans_a != retrans_b:
        finding(low, device_a, device_b, retrans_a, retrans_b)
  notes: Retransmit interval mismatch is cosmetic but indicates configuration drift.
  remediation:
    ios_xe: |
      ! OSPF retransmit interval mismatch with {peer}.
      interface {interface}
       ip ospf retransmit-interval {interval}
    iosxr: |
      ! OSPF retransmit interval mismatch with {peer}.
      router ospf {process_id}
       area {area_id}
        interface {interface}
         retransmit-interval {interval}

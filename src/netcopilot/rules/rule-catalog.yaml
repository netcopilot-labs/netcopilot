    from NVRAM, no break on boot). Non-standard values (e.g., 0x2100 ROMmon, 0x2142 ignore NVRAM) indicate a misconfiguration
    or a device left in a recovery state.

    '
  genie_source:
    file: platform.py
    line_range: 72-75
    add_leaf_ref: 'ShowVersion → config_register (src: [version][curr_config_register])'
  required_fields:
  - path: device.platform.config_register
    type: string
    healthy_value: '0x2102'
    threshold: null
  collection:
    show_commands:
    - show version
    yang_cisco_native:
      path: Cisco-IOS-XE-native:native/boot/config-register
      iosxr_path: null
      confidence: medium
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "EXPECTED_VALUE = \"0x2102\"\nreg = getattr(device.platform, \"config_register\", None)\nif reg is not None\
    \ and reg.lower() != EXPECTED_VALUE:\n  severity = \"critical\" if reg in {\"0x2100\", \"0x2142\"} else \"warning\"\n\
    \  finding(\n    severity=severity,\n    message=(\n      f\"Config register on {device.hostname} is {reg} (expected {EXPECTED_VALUE})\"\
    \n    ),\n    evidence={\n      \"config_register\": reg,\n      \"device_type\": getattr(device.platform, \"rtr_type\"\
    , \"unknown\"),\n      \"os_version\": getattr(device.platform, \"version\", \"unknown\")\n    }\n  )\n"
  notes: '# Known dangerous values:

    #   0x2100 = boot from ROMmon (device stays in ROMmon on next reload)


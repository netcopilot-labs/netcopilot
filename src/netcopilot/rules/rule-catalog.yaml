    bootvar\", {})\nboot_var = bootvar.get(\"boot_variable\") or bootvar.get(\"next_reload_boot_variable\")\nif not boot_var:\n\
    \    finding(severity=\"warning\",\n            message=\"No boot variable configured — device may boot unexpected image\

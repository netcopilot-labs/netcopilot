    block all routes when applied as an inbound/outbound filter, potentially causing routing black-holes.
  genie_source:
    file: docs/reference/genie_ops/route_policy.py
    line_range: 74-91
    add_leaf_ref: info[*].statements[*].actions.route_disposition
  required_fields:

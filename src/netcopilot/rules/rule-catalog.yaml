  requires: null
  check_logic: "for link in model.links:\n  a_native = get_interface(link.endpoint_a.device, link.endpoint_a.interface).native_vlan\n\
    \  b_native = get_interface(link.endpoint_b.device, link.endpoint_b.interface).native_vlan\n  if a_native is not None\
    \ and b_native is not None and a_native != b_native:\n    finding(\n      severity=\"critical\",\n      message=(\n  \
    \      f\"Native VLAN mismatch: {link.endpoint_a.device}:{link.endpoint_a.interface} \"\n        f\"native={a_native}\
    \ vs {link.endpoint_b.device}:{link.endpoint_b.interface} native={b_native}\"\n      ),\n      evidence={\"link\": link.id,\
    \ \"endpoint_a_native\": a_native, \"endpoint_b_native\": b_native}\n    )\n"
  notes: '# Native VLAN mismatch is STP warning CDP-4-NATIVE_VLAN_MISMATCH.

    # add native_vlan to interface model from ''show interfaces trunk''.


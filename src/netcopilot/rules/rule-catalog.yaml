    - show bgp all summary
    yang_cisco_native:
      path: Cisco-IOS-XE-bgp-oper:bgp-state-data/address-families/address-family/bgp-neighbor-summaries/bgp-neighbor-summary/prefixes-received
      iosxr_path: Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor/af-data/prefixes-accepted
      confidence: high
    yang_openconfig:
      path: openconfig-bgp:bgp/neighbors/neighbor/afi-safis/afi-safi/state/prefixes/received
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    for neighbor in vrf.neighbors:\n \
    \     # Only check Established sessions — non-established have 0 prefixes legitimately\n      if neighbor.session_state\
    \ != \"Established\":\n        continue\n      for af in neighbor.address_family:\n        pfx = af.state_pfxrcd\n   \
    \     if pfx is None:\n          continue\n        if pfx == 0:\n          finding(\n            severity=\"warning\"\
    ,\n            message=(\n              f\"BGP neighbor {neighbor.neighbor_id} (AS {neighbor.remote_as}) \"\n        \
    \      f\"on {device.hostname} ({af.af_name}) is Established but has \"\n              f\"sent 0 prefixes — check peer\
    \ route policy or stub configuration\"\n            ),\n            evidence={\n              \"neighbor_id\": neighbor.neighbor_id,\n\
    \              \"remote_as\": neighbor.remote_as,\n              \"address_family\": af.af_name,\n              \"prefixes_received\"\
    : 0\n            }\n          )\n"
  notes: '# False positive scenarios:

    # 1. Stub eBGP peer that only originates a default route (0.0.0.0/0)

    #    — the default route IS counted in state_pfxrcd. True stub = legitimately 0.

    # 2. Route server / reflector relationships where the peer sends routes

    #    via a different AF than being checked

    # 3. iBGP peer in another AS cluster that relies on the RR to reflect routes

    # consider suppressing for neighbors with remote_as matching

    # a known stub-AS list, or for neighbors configured as route-reflector-clients.

    '
  remediation:
    ios_xe: |
      ! BGP neighbor is established but receiving zero prefixes.
      ! Check route-maps, prefix-lists, and address-family config:
      !   show bgp neighbors {neighbor} routes
      !   show bgp neighbors {neighbor} policy
      ! Verify the neighbor is advertising routes:
      !   show bgp neighbors {neighbor} advertised-routes
    iosxr: |
      ! BGP neighbor established but zero prefixes received.
      !   show bgp neighbors {neighbor} routes
      !   show bgp neighbors {neighbor} route-policy

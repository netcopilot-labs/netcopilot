  description: Multiple switches have the same STP priority for a VLAN, causing non-deterministic root bridge election
  genie_source: null
  required_fields:
  - path: device.stp.vlans[].bridge_priority
    type: integer
    healthy_value: null
    threshold: null
  - path: device.stp.vlans[].designated_root_priority
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show spanning-tree
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare STP bridge priority per VLAN across all switches
  check_logic: |
    for each VLAN:
      priority_groups = group switches by bridge_priority
      if any priority value has > 1 switch:
        finding(low, vlan_id, priority, conflicting_switches)
  notes: Tie-breaking uses MAC address, which is non-deterministic. Set explicit priorities.
  remediation:
    ios_xe: |
      ! STP root bridge conflict for VLAN {vlan_id}.

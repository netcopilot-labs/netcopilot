    \ or no switchover history\nreason_lower = reason.lower()\nif not any(p in reason_lower for p in PLANNED_REASONS):\n \
    \ finding(\n    severity=\"warning\",\n    message=(\n      f\"Last RP switchover on {device.hostname} was not a planned\

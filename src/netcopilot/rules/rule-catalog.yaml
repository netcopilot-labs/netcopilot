    \ 0]\nif len(reachable) < 2:\n  finding(severity=\"warning\",\n          message=f\"Only {len(reachable)} reachable NTP\
    \ source(s) — minimum 2 recommended for falseticker detection\",\n          evidence={\"reachable_sources\": len(reachable),\
    \ \"configured_sources\": len(associations)})\n"
  notes: '# Genie: ntp.py → info[peer][ip][reachability] (integer 0-255)


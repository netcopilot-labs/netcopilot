      confidence: high
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/state/counters/in-errors
      confidence: high
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  requires: run_comparison
  check_logic: "# Requires two runs (t0 and t1) to compute delta\nfor intf in device.interfaces:\n  in_err_delta  = intf.counters.in_errors\
    \  - prev.interfaces[intf.name].counters.in_errors\n  out_err_delta = intf.counters.out_errors - prev.interfaces[intf.name].counters.out_errors\n\
    \  if in_err_delta > 0 or out_err_delta > 0:\n    finding(\n      severity=\"warning\",\n      message=(\n        f\"\
    Interface {intf.name} on {device.hostname} has incrementing errors: \"\n        f\"in_errors +{in_err_delta}, out_errors\
    \ +{out_err_delta}\"\n      ),\n      evidence={\n        \"interface\": intf.name,\n        \"in_errors_delta\": in_err_delta,\n\
    \        \"out_errors_delta\": out_err_delta,\n        \"in_errors_total\": intf.counters.in_errors,\n        \"out_errors_total\"\
    : intf.counters.out_errors\n      }\n    )\n"
  notes: '# feature: run_comparison requires storing t0 state between collections.

    # Single-run fallback: flag if in_errors or out_errors > threshold (e.g. > 1000 total).


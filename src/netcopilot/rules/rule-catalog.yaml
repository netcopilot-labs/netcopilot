  notes: '# CIS FortiGate Benchmark v1.1.0 — Check 2.3.1, Level 1, auto=True

    # If SNMP monitoring is required, cross-check 2.3.2: must be SNMPv3-only.

    # Where the device uses SNMPv2c community ''TestCommunity'' — will produce a finding (expected).

    '
  # Surface eval disabled (eval_deferred): single-source check fired on any
  # SNMP-enabled box, false-positiving on SNMPv3-only configs. Superseded by the
  # Python rule CisFgSnmpV3OnlyRule (cis_fg_snmp.py), which cross-checks the
  # v1/v2c community list and only fires when an insecure community exists.
  eval_deferred:
    source: fortigate_snmp_sysinfo
    condition:
      field: results.status
      operator: equals
      value: enable
    element_id: '{hostname}/cis/fg/2.3.1/snmp'
    evidence: SNMP agent is enabled, verify SNMPv3-only configuration
    skip_if_missing: true
  remediation:
    fortios: "config system snmp community\n edit 1\n  set name <COMMUNITY>\n  config hosts\n   edit 1\n    set ip <MGMT_HOST>\
      \ 255.255.255.255\n   next\n  end\n next\nend"
- rule_id: CIS_FG_2_3_2
  severity: informational
  category: cis_benchmark
  protocol: fortigate
  tier: surface
  description: CIS 2.3.2 L2 — Ensure only SNMPv3 is enabled (no v1/v2c communities)
  genie_source: null
  required_fields:
  - path: fortigate.system.snmp.community[].name
    type: string
    healthy_value: configured
    threshold: null
  collection:
    show_commands: []
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest:
    - /api/v2/cmdb/system/snmp/community
    - /api/v2/cmdb/system/snmp/user
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "communities = fortigate_rest(\"/api/v2/cmdb/system/snmp/community\")\nif communities:\n  finding(\n    f\"\
    Found {len(communities)} SNMP v1/v2c communities — remove all and use SNMPv3 only\",\n    evidence={\"names\": [c.get(\"\
    name\") for c in communities]}\n  )\nv3_users = fortigate_rest(\"/api/v2/cmdb/system/snmp/user\")\nif not v3_users:\n\
    \  finding(\"No SNMPv3 users configured — if SNMP monitoring is needed, add SNMPv3 users\")\n"
  notes: '# CIS FortiGate Benchmark v1.1.0 — Check 2.3.2, Level 2, auto=True

    # SNMPv1/v2c transmit community strings in plaintext — vulnerable to network sniffing.

    # Where the device uses v2c community ''TestCommunity'' — will fail this check (expected in lab).

    '
  remediation:
    fortios: |
      ! Remove SNMPv1/v2c communities and use SNMPv3 only:
      config system snmp community
       delete 1
      end
      config system snmp user
       edit <USERNAME>
        set security-level auth-priv
        set auth-proto sha256
        set auth-pwd <AUTH_PASSWORD>
        set priv-proto aes256
        set priv-pwd <PRIV_PASSWORD>
       next
      end

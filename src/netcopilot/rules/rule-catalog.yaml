- rule_id: RIP_ROUTE_EXPIRING
  severity: warning
  category: routing_health
  protocol: rip
  tier: deep
  description: RIP route expiration timer is near zero — route is about to be withdrawn and reachability lost
  genie_source:
    file: rip.py
    line_range: 275-305
    add_leaf_ref: show ipv6 rip vrf {vrf} database → info[vrf][af][instance][routes][route][index][expire_time]
  required_fields:
  - path: device.rip.vrfs[*].address_families[*].instances[*].routes[*].expire_time
    type: string
    healthy_value: null
    threshold: tunable default
  collection:
    show_commands:
    - show ip rip database vrf {vrf}
    - show ipv6 rip vrf {vrf} database
    yang_cisco_native:
      path: Cisco-IOS-XE-rip-oper:rip-oper-data/rip-state/vrf-states/vrf-state[vrf-name=*]/rip-route[prefix=*]/expire-time
      confidence: low
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "# expire_time in Genie is a timer string. Parse to seconds.\n# RIP route expires after invalid_interval (default\
    \ 180s) without update.\n# If expire_time < threshold, the next-hop router is no longer sending updates.\nthreshold_sec\
    \ = 30  # tunable default\nfor routes in get_all_rip_routes(device):\n    exp_sec = parse_timer_to_seconds(routes.expire_time)\n\
    \    if exp_sec is not None and exp_sec < threshold_sec:\n        finding(severity=\"warning\",\n                message=f\"\
    RIP route {routes.prefix} expiring in {exp_sec}s — peer may be down\")\n"
  notes: '# Default RIP timers: update=30s, invalid=180s, holddown=180s, flush=240s.

    # expire_time tracks the invalid timer countdown. Near-zero means ~6 missed updates.

    '
- rule_id: RIP_REDISTRIBUTE_NO_FILTER
  severity: warning
  category: routing_health
  protocol: rip
  tier: surface
  description: RIP is redistributing from another protocol without a route-map filter — unintended routes may be imported
  genie_source:

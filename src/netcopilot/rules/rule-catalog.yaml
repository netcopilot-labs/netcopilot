  cross_device: true
  cross_device_compare: Groups all interfaces across all devices by IP address
  check_logic: "ip_to_interfaces = {} (IP -> list of {interface_id, device_id})\nfor each interface in model.interfaces:\n\
    \  if ip_address is None or in (\"unassigned\",\"none\",\"null\",\"\"): skip\n  ip_to_interfaces[ip_address].append(interface_info)\n\
    for each ip with len(interfaces) > 1:\n  finding(critical, ip_address, interfaces_list, count)\n"
  notes: 'Cross-device rule — iterates all interfaces in the model.

    Finds conflicts across different devices on the same or different segments.

    '
  remediation:
    generic: |
      ! Duplicate IP {ip_address} detected on multiple interfaces.
      ! This requires network-wide coordination to resolve:
      !   1. Identify which device should own the IP address
      !   2. Re-address the conflicting interface(s)
      !   3. Update any static routes or DNS entries referencing the old IP
      !   4. Verify ARP tables have cleared after the change

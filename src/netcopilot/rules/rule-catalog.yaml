    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  check_logic: |
    for each eBGP neighbor (remote_as != local_as):
      if neighbor is not directly connected (no shared subnet):
        if not ebgp_multihop and not ttl_security:
          finding(info, neighbor, remote_as)
  notes: Only applies to eBGP sessions. iBGP uses update-source loopback and does not need multihop.
  remediation:
    ios_xe: |
      ! eBGP neighbor {neighbor} may need multihop.
      router bgp {local_as}
       neighbor {neighbor} ebgp-multihop {hop_count}
      ! Or use TTL security instead (preferred):
       neighbor {neighbor} ttl-security hops {hop_count}
    iosxr: |
      ! eBGP neighbor {neighbor} may need multihop.
      router bgp {local_as}
       neighbor {neighbor}
        ebgp-multihop {hop_count}

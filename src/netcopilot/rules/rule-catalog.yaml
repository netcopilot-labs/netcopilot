      confidence: medium
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for instance in device.bgp.instances:\n  for vrf in instance.vrfs:\n    local_as = instance.bgp_id  # BGP\
    \ ASN of this router\n    # TBD: must populate local_as at the instance level\n\n    for neighbor in vrf.neighbors:\n\
    \      # Only check eBGP neighbors (remote_as != local_as)\n      # iBGP neighbors may legitimately have no inbound filter\n\
    \      if neighbor.remote_as == local_as:\n        continue   # iBGP — skip\n\n      for af in neighbor.address_family:\n\
    \        if af.route_map_name_in is None:\n          finding(\n            severity=\"warning\",\n            message=(\n\
    \              f\"eBGP neighbor {neighbor.neighbor_id} (AS {neighbor.remote_as}) \"\n              f\"on {device.hostname}\
    \ ({af.af_name}) has no inbound route-map \"\n              f\"— all advertised prefixes are accepted without filtering\"\
    \n            ),\n            evidence={\n              \"neighbor_id\": neighbor.neighbor_id,\n              \"remote_as\"\
    : neighbor.remote_as,\n              \"address_family\": af.af_name,\n              \"route_map_name_in\": None\n    \
    \        }\n          )\n"
  notes: '# must populate local_as for the check_logic to work correctly.

    # iBGP neighbors often have no inbound filter by design — they''re in the same AS

    # and the RR controls what they receive. Filtering only eBGP is correct behavior.

    # Some operators use prefix-lists instead of route-maps for inbound filtering.

    # extend to check for prefix-list assignment as an alternative to route-map.

    '
  eval:
    source: genie_bgp
    iterate: instance.*.vrf.*.neighbor.*
    condition:

  check_logic: "# Topology-wide: collect area addresses per instance, flag mismatches\n# Important nuance: L2-only routers\
    \ CAN have different areas and still form adjacency.\n# L1 routers MUST share the same area address.\n# This rule flags\
    \ the mismatch; severity depends on level configuration.\nareas_by_instance = {}  # {instance: {area_addr: [device_list]}}\n\
    for device in all_devices:\n    for inst_name, inst in device.isis.instances.items():\n        for vrf_data in inst.vrfs.values():\n\
    \            area = vrf_data.get(\"area_address\")\n            if area:\n                areas_by_instance.setdefault(inst_name,\
    \ {}).setdefault(area, []).append(device.hostname)\nfor inst, area_map in areas_by_instance.items():\n    if len(area_map)\
    \ > 1:\n        finding(severity=\"critical\",\n                message=f\"IS-IS instance {inst}: multiple area addresses\
    \ found — {dict(area_map)}\")\n"
  notes: '# Genie source: isis.py line 375-380, ShowClnsProtocol manual_area_address → area_address.

    # In media production network deployments, IS-IS typically runs as flat L2 backbone where area mismatch

    # is acceptable. But L1/L2 boundary issues can cause silent routing failures.

    # correlate with level_type to determine if mismatch actually blocks adjacency.

    '
- rule_id: ISIS_METRIC_TYPE_INCONSISTENT
  severity: warning
  category: routing_health
  protocol: isis
  tier: surface
  description: IS-IS metric type (wide/narrow/both) differs across routers in the same instance — routes may have incompatible
    metric scales
  genie_source:
    file: isis.py
    line_range: 388-392
    add_leaf_ref: ShowClnsProtocol → info[instance][vrf][metric_type] via get_metric_type()
  cis_source: null
  required_fields:
  - path: device.isis.instances[*].vrfs[*].metric_type
    type: dict
    healthy_value: wide-only across all routers
    threshold: null
  collection:
    show_commands:
    - show clns protocol
    yang_cisco_native:
      path: Cisco-IOS-XE-isis-oper:isis-oper-data/isis-instance[instance-id=*]/metric-type
      confidence: low
    yang_openconfig:
      path: null
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: topology
  cross_device_compare:
    type: global_consistency
    fields:
    - device.isis.instances[*].vrfs[*].metric_type
    logic: All routers in same IS-IS instance should use same metric type (ideally wide-only). Mixed narrow/wide causes metric
      scale mismatch.
  check_logic: "# Topology-wide: compare metric_type values across routers in same instance\n# metric_type is a dict with\
    \ level_1/level_2 keys, each having 'value' = wide-only/old-only/both\n# Mixed metric types: router A uses wide (0-16777215),\
    \ router B uses narrow (0-63)\n# This makes shortest-path computation inconsistent across the domain\nmetric_types_by_instance\
    \ = {}\nfor device in all_devices:\n    for inst_name, inst in device.isis.instances.items():\n        for vrf_data in\
    \ inst.vrfs.values():\n            mt = vrf_data.get(\"metric_type\", {})\n            for level_key, level_data in mt.items():\n\
    \                val = level_data.get(\"value\", \"unknown\")\n                key = f\"{inst_name}:{level_key}\"\n  \
    \              metric_types_by_instance.setdefault(key, {}).setdefault(val, []).append(device.hostname)\nfor key, type_map\
    \ in metric_types_by_instance.items():\n    if len(type_map) > 1:\n        finding(severity=\"warning\",\n           \
    \     message=f\"IS-IS {key}: mixed metric types — {dict(type_map)}\")\n"
  notes: '# Genie source: isis.py line 388-392, ShowClnsProtocol metrics → get_metric_type().

    # Parses generate_narrow, accept_narrow, generate_wide, accept_wide into

    # per-level values of ''wide-only'', ''old-only'', or ''both''.

    # Modern networks should use wide metrics exclusively (supports MPLS TE, larger metric range).

    # ''both'' is a migration state; ''old-only'' is legacy. Mixing types = metric scale conflict.

    '

    yang_cisco_native:
      path: Cisco-IOS-XE-interfaces-oper:interfaces/interface[name=Port-channel*]/lag-oper-data
      iosxr_path: Cisco-IOS-XR-pfi-im-cmd-oper:interfaces/interface-xr/interface[interface-name=Bundle-Ether*]
      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/aggregation/state/member
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for po_name, po_data in device.lag.get(\"interfaces\", {}).items():\n  for mem_name, mem_data in po_data.get(\"\
    members\", {}).items():\n    if mem_data.get(\"bundled\") is False:\n      finding(\n        severity=\"warning\",\n \
    \       message=(\n          f\"Port-channel {po_name} member {mem_name} on {device.hostname} \"\n          f\"is NOT\
    \ bundled (bundled=False)\"\n        ),\n        evidence={\n          \"port_channel\": po_name,\n          \"member\"\
    : mem_name,\n          \"bundled\": False,\n          \"protocol\": po_data.get(\"protocol\"),\n          \"partner_id\"\
    : mem_data.get(\"partner_id\"),\n          \"oper_key\": mem_data.get(\"oper_key\"),\n          \"activity\": mem_data.get(\"\
    activity\")\n        }\n      )\n"
  notes: '# Unbundled member = physical link is up but LACP negotiation failed or mismatched.

    # Key diagnostic fields: oper_key (must match all members), activity (active/passive),

    # partner_id (confirms remote side sees this member in the same bundle).

    # add cross-device check — if member is unbundled on one side, check


  check_logic: "# Topology-wide check: collect all system_ids, find duplicates\nall_system_ids = {}\nfor device in all_devices:\n\
    \    for instance in device.isis.instances.values():\n        for vrf_data in instance.vrfs.values():\n            sid\
    \ = vrf_data.system_id\n            if sid:\n                if sid in all_system_ids:\n                    finding(severity=\"\
    critical\",\n                            message=f\"Duplicate IS-IS system-ID {sid}: {device.hostname} and {all_system_ids[sid]}\"\
    )\n                else:\n                    all_system_ids[sid] = device.hostname\n"

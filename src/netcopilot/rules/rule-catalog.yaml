    yang_cisco_native:
      path: Cisco-IOS-XE-route-map-oper:route-map-oper-data
      confidence: medium
    yang_openconfig:
      path: openconfig-routing-policy:routing-policy/policy-definitions
      confidence: medium
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "for policy_name, policy in device.route_policy.info.items():\n    statements = policy.get('statements', {})\n\
    \    if not statements:\n        continue\n    dispositions = [s.get('actions', {}).get('route_disposition', 'permit')\n\
    \                    for s in statements.values()]\n    if all(d == 'deny' for d in dispositions):\n        finding(severity='warning',\
    \ device=device.name,\n                detail=f'Route-map {policy_name} has all-deny disposition')\n"

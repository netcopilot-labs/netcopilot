      ! Dual-attached device has a DAD link down — split-brain protection is lost.
      ! Check cable, SFP, and port status on both ends.
      ! Verify the DAD interface is not administratively shut down.
      ! If hardware fault, replace cable or SFP and bring interface up.
- rule_id: DUPLICATE_IP
  severity: critical
  category: genie_infrastructure
  protocol: interface
  tier: deep
  description: The same IP address is assigned to multiple interfaces across the network, causing routing and ARP conflicts
  genie_source:
    file: duplicate_ip.py
    line_range: 61-148
  required_fields:
  - path: model.interfaces[].ip_address
    type: string
    healthy_value: null
    threshold: null

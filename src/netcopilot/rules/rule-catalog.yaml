    \ immediately)\n# tunable default: alert threshold depends on SA cache size expected in deployment\nthreshold = 100  # tunable default\n\
    for vrf_data in device.msdp.vrfs.values():\n    for peer_addr, peer in vrf_data.peers.items():\n        q = peer.statistics.queue\
    \ if peer.statistics else None\n        if q and q.size_in > threshold:\n            finding(severity=\"warning\",\n \

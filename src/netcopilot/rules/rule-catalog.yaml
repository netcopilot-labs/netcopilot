- rule_id: OSPF_MTU_MISMATCH_DBD
  severity: low
  category: cross_device
  protocol: ospf
  tier: deep
  description: OSPF neighbors stuck in EXSTART/EXCHANGE state likely due to MTU mismatch on the connecting link
  genie_source: null
  required_fields:
  - path: device.ospf.processes[].areas[].interfaces[].neighbors[].state
    type: string
    healthy_value: FULL
    threshold: null
  - path: device.interfaces[].mtu
    type: integer
    healthy_value: null
    threshold: null
  collection:
    show_commands:
    - show ip ospf neighbor detail
    - show interfaces
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: true
  cross_device_compare: Compare interface MTU on both ends when OSPF is stuck in EXSTART/EXCHANGE
  check_logic: |
    for each OSPF neighbor stuck in EXSTART or EXCHANGE:
      mtu_a = device_a link interface MTU
      mtu_b = device_b link interface MTU
      if mtu_a != mtu_b:
        finding(low, device_a, device_b, mtu_a, mtu_b, state)
  notes: MTU mismatch is the most common cause of EXSTART/EXCHANGE stuck state.
  remediation:
    ios_xe: |
      ! OSPF stuck in {state} — likely MTU mismatch ({mtu_a} vs {mtu_b}).
      ! Fix MTU to match:
      interface {interface}
       mtu {correct_mtu}
      ! Or ignore MTU in OSPF (workaround):
      interface {interface}
       ip ospf mtu-ignore
    iosxr: |
      ! OSPF stuck in {state} — likely MTU mismatch.
      interface {interface}
       mtu {correct_mtu}
      ! Or ignore MTU in OSPF:
      router ospf {process_id}
       area {area_id}
        interface {interface}
         mtu-ignore

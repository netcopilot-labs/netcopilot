- rule_id: OSPF_GRACEFUL_RESTART_DISABLED
  severity: warning
  category: genie_infrastructure
  protocol: ospf
  tier: surface
  description: OSPF Graceful Restart is not configured — process restarts will cause full reconvergence
  genie_source:
    file: ospf.py
    line_range: 138-141
    add_leaf_ref: show ip ospf → [vrf][vrf][address_family][af][instance][instance][graceful_restart][gr_type][enable]
  required_fields:
  - path: device.ospf.processes[].graceful_restart[].enable
    type: boolean
    healthy_value: true
    threshold: null
  collection:
    show_commands:
    - show ip ospf
    yang_cisco_native:
      path: Cisco-IOS-XE-ospf-oper:ospf-oper-data/ospf-state/ospf-instance/gr-helper-info/gr-enabled
      iosxr_path: null
      confidence: low
    yang_openconfig:
      path: null
      confidence: null
    fortigate_rest: null
    data_type: configuration
    rpc: get-config
  cross_device: false
  cross_device_compare: null
  check_logic: "for process in device.ospf.processes:\n  # graceful_restart is a dict keyed by type (\"ietf\", \"cisco\")\n\
    \  # Check if at least one type has enable=True\n  any_gr_enabled = False\n  for gr_type, gr_config in process.graceful_restart.items():\n\
    \    if gr_config.get(\"enable\") is True:\n      any_gr_enabled = True\n      break\n  if not any_gr_enabled:\n    finding(\n\
    \      severity=\"warning\",\n      message=(\n        f\"OSPF process {process.process_id} on {device.hostname} has no\
    \ \"\n        f\"Graceful Restart configured — process restart causes full reconvergence\"\n      ),\n      evidence={\n\
    \        \"process_id\": process.process_id,\n        \"graceful_restart_types_found\": list(process.graceful_restart.keys())\n\
    \      }\n    )\n"
  notes: '# NSR (OSPF_NSR_DISABLED) and GR (this rule) are complementary:

    # - NSR: hitless on planned RP switchover (dual-RP only)

    # - GR: reduces reconvergence on any process restart

    # Both should be configured on production core/distribution routers.

    # GR requires neighbor devices to act as GR helpers — if the peer doesn''t

    # support GR, the restart is not graceful. In practice, modern IOS XE/XR

    # devices are GR-capable by default.

    # graceful_restart model path — confirm Genie stores this as a

    # dict keyed by type string (ietf/cisco) vs a flat structure.

    '
  eval:
    source: genie_ospf
    iterate: vrf.*.address_family.ipv4.instance.*
    condition:
      field: graceful_restart.ietf.enable
      operator: not_equals
      value: 'true'
    element_id: '{hostname}/ospf/{vrf}/{instance}/graceful-restart'
    evidence: instance={instance}, graceful_restart=disabled
    skip_if_missing: true
    python_severity: info   # downgraded 2026-06-26: optional HA feature, advisory only
  remediation:
    ios_xe: "router ospf {process}\n nsf ietf"
    iosxr: "router ospf {process}\n nsf ietf"

  tier: surface
  description: CIS XE 1.2.3/1.2.6/1.2.7/1.2.8 L1 — AUX no-exec, and exec-timeout <= 10 min on all lines
  genie_source: null
  required_fields:
  - path: device.security_config.lines.exec_timeout_sec
    type: integer
    healthy_value: null
    threshold: tunable default
  collection:
    show_commands:
    - show running-config
    yang_cisco_native: null
    yang_openconfig: null
    fortigate_rest: null
    data_type: config
    rpc: null
  cross_device: false
  cross_device_compare: null
  requires: null
  check_logic: "config = show_running_config(device)\nimport re\ncur_line = None\nhas_no_exec = False\nfor line in config.splitlines():\n\
    \  lm = re.match(r'\\s*(line (aux|con|vty)\\s+\\S+)', line)\n  if lm:\n    cur_line = lm.group(1).strip()\n    has_no_exec\
    \ = False\n  elif cur_line:\n    if \"no exec\" in line and \"aux\" in cur_line:\n      has_no_exec = True\n    m = re.match(r'\\\
    s*exec-timeout (\\d+)\\s*(\\d*)', line)\n    if m:\n      mins = int(m.group(1))\n      if mins == 0:\n        finding(f\"\
    '{cur_line}': exec-timeout 0 0 (never) — sessions never expire\")\n      elif mins > 10:\n        finding(f\"'{cur_line}':\
    \ exec-timeout {mins} min — CIS requires <= 10 minutes\")\n# Check AUX has no exec\nif \"line aux\" in config and not\
    \ has_no_exec:\n  finding(\"line aux 0: 'no exec' not configured — AUX port can spawn interactive session (1.2.3)\")\n"
  notes: '# CIS IOS XE Benchmark v2.2.1 — Checks 1.2.3/1.2.6/1.2.7/1.2.8, Level 1, Automated

    # AUX: ''no exec'' disables interactive exec; exec-timeout provides fallback.

    # Console/VTY: exec-timeout <= 10 minutes prevents unattended session hijacking.

    '

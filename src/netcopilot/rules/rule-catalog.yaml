      confidence: medium
    yang_openconfig:
      path: openconfig-interfaces:interfaces/interface[name=*]/state/counters/out-octets
      confidence: low
    fortigate_rest: null
    data_type: operational
    rpc: get
  cross_device: false
  cross_device_compare: null
  check_logic: "THRESHOLD = 0.80  # configurable per deployment\nfor intf in device.interfaces:\n  bw_kbps = intf.get(\"bandwidth\"\
    )\n  out_rate_bps = intf.counters.rate.get(\"out_rate\")\n  if bw_kbps and out_rate_bps:\n    utilization = out_rate_bps\
    \ / (bw_kbps * 1000)\n    if utilization > THRESHOLD:\n      finding(\n        severity=\"warning\",\n        message=(\n\
    \          f\"Interface {intf.name} on {device.hostname} output utilization \"\n          f\"{utilization*100:.1f}% exceeds\
    \ threshold ({THRESHOLD*100:.0f}%)\"\n        ),\n        evidence={\n          \"interface\": intf.name,\n          \"\
    out_rate_bps\": out_rate_bps,\n          \"bandwidth_kbps\": bw_kbps,\n          \"utilization_pct\": round(utilization\
    \ * 100, 1)\n        }\n      )\n"
  notes: '# Same notes as INTF_INPUT_UTILIZATION_HIGH.

    # Output utilization is typically the more critical direction for WAN/uplink interfaces.


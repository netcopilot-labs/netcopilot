name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword123
        ports:
          - 7687:7687
          - 7474:7474
    env:
      NETCOPILOT_LIVE_TESTS: "1"
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # The live-test fixture waits for Neo4j to accept connections, so no extra wait step.
      - run: pytest -q

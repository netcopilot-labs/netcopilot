name: secret-scan

# Secret scanning with gitleaks. We run the open-source gitleaks binary directly
# (the gitleaks-action requires a paid licence for organisation-owned repos).
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          VER=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --no-banner --redact

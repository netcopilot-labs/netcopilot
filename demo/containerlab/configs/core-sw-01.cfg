hostname core-sw-01
!
ip routing
!
vrf definition RED
 rd 64496:10
 address-family ipv4
 exit-address-family
!
vrf definition BLUE
 rd 64496:20
 address-family ipv4
 exit-address-family
!
! Per-VRF transit VLANs for the dual-VRF link to acc-sw-03 (SVI-over-trunk).
vlan 10
 name TRANSIT-RED
!
vlan 20
 name TRANSIT-BLUE
!
interface Loopback0
 ip address 198.51.100.100 255.255.255.255
!
interface GigabitEthernet1/0/1
 description core fabric to bdr-rtr-01
 no switchport
 ip address 198.51.100.2 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/2
 description core fabric to bdr-rtr-02
 no switchport
 ip address 198.51.100.6 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/3
 description core fabric to bdr-rtr-03
 no switchport
 ip address 198.51.100.10 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/4
 description to edge-fw-01
 no switchport
 ip address 198.51.100.13 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/5
 description to acc-sw-03 (dual-VRF trunk: RED=vlan10, BLUE=vlan20)
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 no shutdown
!
interface GigabitEthernet1/0/6
 description to acc-sw-04 (VRF BLUE)
 no switchport
 vrf forwarding BLUE
 ip address 198.51.100.29 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface Vlan10
 description RED transit to acc-sw-03
 vrf forwarding RED
 ip address 198.51.100.25 255.255.255.252
 ip ospf network point-to-point
 no autostate
!
interface Vlan20
 description BLUE transit to acc-sw-03
 vrf forwarding BLUE
 ip address 198.51.100.33 255.255.255.252
 ip ospf network point-to-point
 no autostate
!
router ospf 1
 router-id 198.51.100.100
 passive-interface Loopback0
 network 198.51.100.100 0.0.0.0 area 0
 network 198.51.100.0 0.0.0.3 area 0
 network 198.51.100.4 0.0.0.3 area 0
 network 198.51.100.8 0.0.0.3 area 0
 network 198.51.100.12 0.0.0.3 area 0
!
router ospf 10 vrf RED
 router-id 198.51.100.225
 network 198.51.100.24 0.0.0.3 area 0
!
router ospf 20 vrf BLUE
 router-id 198.51.100.229
 network 198.51.100.28 0.0.0.3 area 0
 network 198.51.100.32 0.0.0.3 area 0
!
router bgp 64496
 bgp router-id 198.51.100.100
 bgp log-neighbor-changes
 neighbor 198.51.100.101 remote-as 64496
 neighbor 198.51.100.101 description iBGP-RRC-bdr-rtr-01
 neighbor 198.51.100.101 update-source Loopback0
 neighbor 198.51.100.102 remote-as 64496
 neighbor 198.51.100.102 description iBGP-RRC-bdr-rtr-02
 neighbor 198.51.100.102 update-source Loopback0
 neighbor 198.51.100.103 remote-as 64496
 neighbor 198.51.100.103 description iBGP-RRC-bdr-rtr-03
 neighbor 198.51.100.103 update-source Loopback0
 !
 address-family ipv4
  network 198.51.100.100 mask 255.255.255.255
  neighbor 198.51.100.101 activate
  neighbor 198.51.100.101 route-reflector-client
  neighbor 198.51.100.102 activate
  neighbor 198.51.100.102 route-reflector-client
  neighbor 198.51.100.103 activate
  neighbor 198.51.100.103 route-reflector-client
 exit-address-family
!
end

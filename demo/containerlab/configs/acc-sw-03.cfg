hostname acc-sw-03
!
ip routing
!
! Dual-VRF access switch (RED + BLUE) — the multi-tenant example.
! The uplink to core-sw-01 is an 802.1Q trunk carrying one transit VLAN per VRF
! (cat9kv has no L3 sub-interfaces, so VRF-lite rides SVIs over the trunk).
vrf definition RED
 address-family ipv4
 exit-address-family
!
vrf definition BLUE
 address-family ipv4
 exit-address-family
!
vlan 10
 name TRANSIT-RED
!
vlan 20
 name TRANSIT-BLUE
!
vlan 30
 name RED-USERS-CAMPUS
!
vlan 31
 name BLUE-USERS-CAMPUS
!
interface Loopback0
 ip address 198.51.100.113 255.255.255.255
!
interface GigabitEthernet1/0/1
 description uplink to core-sw-01 (trunk: RED=vlan10, BLUE=vlan20)
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 no shutdown
!
interface GigabitEthernet1/0/2
 description user access port (RED)
 switchport mode access
 switchport access vlan 30
 no shutdown
!
interface Vlan10
 description RED transit to core-sw-01
 vrf forwarding RED
 ip address 198.51.100.26 255.255.255.252
 ip ospf network point-to-point
 no autostate
!
interface Vlan20
 description BLUE transit to core-sw-01
 vrf forwarding BLUE
 ip address 198.51.100.34 255.255.255.252
 ip ospf network point-to-point
 no autostate
!
interface Vlan30
 description RED-USERS-CAMPUS gateway
 vrf forwarding RED
 ip address 198.51.100.65 255.255.255.240
!
interface Vlan31
 description BLUE-USERS-CAMPUS gateway
 vrf forwarding BLUE
 ip address 198.51.100.97 255.255.255.240
 no autostate
!
router ospf 10 vrf RED
 router-id 198.51.100.113
 passive-interface Vlan30
 network 198.51.100.24 0.0.0.3 area 0
 network 198.51.100.64 0.0.0.15 area 0
!
router ospf 20 vrf BLUE
 router-id 198.51.100.115
 passive-interface Vlan31
 network 198.51.100.32 0.0.0.3 area 0
 network 198.51.100.96 0.0.0.15 area 0
!
end

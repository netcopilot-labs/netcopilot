hostname bdr-rtr-03
!
username admin
 group root-lr
 group cisco-support
 secret admin
!
interface Loopback0
 ipv4 address 198.51.100.103 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description eBGP to isp-03
 ipv4 address 203.0.113.9 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description core fabric to core-sw-01
 ipv4 address 198.51.100.9 255.255.255.252
 no shutdown
!
route-policy PASS
  pass
end-policy
!
router ospf 1
 router-id 198.51.100.103
 area 0
  interface Loopback0
   passive enable
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
  !
 !
!
router bgp 64496
 bgp router-id 198.51.100.103
 address-family ipv4 unicast
  network 198.51.100.103/32
 !
 neighbor 203.0.113.10
  remote-as 64499
  description eBGP-isp-03
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
 neighbor 198.51.100.100
  remote-as 64496
  description iBGP-RR-core-sw-01
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
  !
 !
!
end

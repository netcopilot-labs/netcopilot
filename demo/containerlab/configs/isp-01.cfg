hostname isp-01
!
username admin
 group root-lr
 group cisco-support
 secret admin
!
interface Loopback0
 ipv4 address 203.0.113.101 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description eBGP to bdr-rtr-01
 ipv4 address 203.0.113.2 255.255.255.252
 no shutdown
!
route-policy PASS
  pass
end-policy
!
router static
 address-family ipv4 unicast
  203.0.113.160/27 Null0
 !
!
router bgp 64497
 bgp router-id 203.0.113.101
 address-family ipv4 unicast
  network 203.0.113.101/32
  network 203.0.113.160/27
 !
 neighbor 203.0.113.1
  remote-as 64496
  description eBGP-bdr-rtr-01
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
!
end

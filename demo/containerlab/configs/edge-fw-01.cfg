config system global
    set hostname "edge-fw-01"
end
config system interface
    edit "port2"
        set mode static
        set ip 198.51.100.14 255.255.255.252
        set allowaccess ping
        set description "to core-sw-01"
    next
    edit "port3"
        set mode static
        set ip 198.51.100.17 255.255.255.252
        set allowaccess ping
        set description "to acc-sw-01"
    next
end
config router ospf
    set router-id 198.51.100.120
    config area
        edit 0.0.0.0
        next
    end
    config ospf-interface
        edit "to-core"
            set interface "port2"
            set network-type point-to-point
        next
        edit "to-acc1"
            set interface "port3"
            set network-type point-to-point
        next
    end
    config network
        edit 1
            set prefix 198.51.100.12 255.255.255.252
        next
        edit 2
            set prefix 198.51.100.16 255.255.255.252
        next
    end
end
config firewall policy
    edit 1
        set name "access-to-core"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 2
        set name "core-to-access"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end

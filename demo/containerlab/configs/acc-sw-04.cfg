hostname acc-sw-04
!
ip routing
!
! Single-VRF access switch (BLUE) — the simple tenant example (contrast acc-sw-03,
! which is dual-VRF). The routed uplink to core-sw-01 (Gi1/0/6 is BLUE on the core
! side) and the user SVI both live in VRF BLUE, with a VRF-aware OSPF process.
vrf definition BLUE
 address-family ipv4
 exit-address-family
!
vlan 40
 name BLUE-USERS-BRANCH
!
interface Loopback0
 ip address 198.51.100.114 255.255.255.255
!
interface GigabitEthernet1/0/1
 description uplink to core-sw-01 (VRF BLUE)
 no switchport
 vrf forwarding BLUE
 ip address 198.51.100.30 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/2
 description user access port
 switchport mode access
 switchport access vlan 40
 no shutdown
!
interface Vlan40
 description BLUE-USERS-BRANCH gateway
 vrf forwarding BLUE
 ip address 198.51.100.81 255.255.255.240
 no autostate
!
router ospf 20 vrf BLUE
 router-id 198.51.100.114
 passive-interface Vlan40
 network 198.51.100.28 0.0.0.3 area 0
 network 198.51.100.80 0.0.0.15 area 0
!
end

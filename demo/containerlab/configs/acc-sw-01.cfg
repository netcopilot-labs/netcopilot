hostname acc-sw-01
!
ip routing
!
vlan 50
 name GUEST-USERS
!
interface Loopback0
 ip address 198.51.100.111 255.255.255.255
!
interface GigabitEthernet1/0/1
 description uplink to edge-fw-01
 no switchport
 ip address 198.51.100.18 255.255.255.252
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet1/0/2
 description user access port
 switchport mode access
 switchport access vlan 50
 no shutdown
!
interface Vlan50
 description GUEST-USERS gateway
 ip address 198.51.100.49 255.255.255.240
!
router ospf 1
 router-id 198.51.100.111
 passive-interface Loopback0
 passive-interface Vlan50
 network 198.51.100.111 0.0.0.0 area 0
 network 198.51.100.16 0.0.0.3 area 0
 network 198.51.100.48 0.0.0.15 area 0
!
end

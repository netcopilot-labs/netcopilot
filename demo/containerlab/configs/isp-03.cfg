hostname isp-03
!
username admin
 group root-lr
 group cisco-support
 secret admin
!
interface Loopback0
 ipv4 address 203.0.113.103 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description eBGP to bdr-rtr-03
 ipv4 address 203.0.113.10 255.255.255.252
 no shutdown
!
route-policy PASS
  pass
end-policy
!
router static
 address-family ipv4 unicast
  203.0.113.224/27 Null0
 !
!
router bgp 64499
 bgp router-id 203.0.113.103
 address-family ipv4 unicast
  network 203.0.113.103/32
  network 203.0.113.224/27
 !
 neighbor 203.0.113.9
  remote-as 64496
  description eBGP-bdr-rtr-03
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
!
end
